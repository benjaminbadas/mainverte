    function renderTable(tableId, dataArray, columnsDef) {
        const table = document.getElementById(tableId);
        let headerHTML = "<tr>";
        columnsDef.forEach(col => headerHTML += `<th>${col.label}</th>`);
        headerHTML += "</tr>";
        table.innerHTML = headerHTML;

        dataArray.forEach((item, idx) => {
            let rowHTML = "<tr>";
            columnsDef.forEach(col => {
                let val = item[col.key] !== undefined ? item[col.key] : "";
                if(col.type === 'text' || col.type === 'large') {
                    rowHTML += `<td><input type="text" class="${col.type==='large'?'input-large':''}" data-idx="${idx}" data-key="${col.key}" value="${val}"></td>`;
                } else if (col.type === 'number') {
                    rowHTML += `<td><input type="number" data-idx="${idx}" data-key="${col.key}" value="${val}"></td>`;
                }
            });
            rowHTML += "</tr>";
            table.innerHTML += rowHTML;
        });
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    function extractData(tableId) {
        let rows = document.getElementById(tableId).querySelectorAll('tr');
        let res = [];
        for(let i=1; i<rows.length; i++) {
            let inputs = rows[i].querySelectorAll('input');
            let obj = {};
            inputs.forEach(inp => {
                let key = inp.getAttribute('data-key');
                let val = inp.value;
                if(inp.type === 'number') obj[key] = parseInt(val) || 0;
                else if((key === 'sm' || key === 'rc') && val !== "") obj[key] = val.split(',').map(s=>s.trim()); 
                else obj[key] = val;
            });
            res.push(obj);
        }
        return res;
    }

    function multiplierCartes(tableau, targetDeck, extraAttributes = {}) {
        tableau.forEach(item => {
            let quantity = item.qte || 0;
            for(let i = 0; i < quantity; i++) {
                let { qte, ...carteFinale } = item;
                targetDeck.push({ ...carteFinale, ...extraAttributes });
            }
        });
    }

        multiplierCartes(extractData('table-legumes'), finalDecks.C, { cat: 'L' });
        multiplierCartes(extractData('table-arbres'), finalDecks.C, { cat: 'A' });
        
        multiplierCartes(extractData('table-compagnes'), finalDecks.S, { cat: 'S' });
        multiplierCartes(extractData('table-soutien'), finalDecks.S, { cat: 'S' });
        
        multiplierCartes(extractData('table-auxiliaires'), finalDecks.A, { cat: 'X' });
        multiplierCartes(extractData('table-objectifs'), finalDecks.O, {});
        multiplierCartes(extractData('table-events'), finalDecks.E, { cat: 'E' });
        multiplierCartes(extractData('table-ravageurs'), finalDecks.R, { cat: 'R' });

        dbConfig.set(finalDecks).then(() => {
            alert("✅ Base de données complète générée et envoyée à Firebase avec succès !");
        }).catch(err => {
            alert("❌ Erreur : " + err.message);
        });
    }

    window.onload = init;
</script>
