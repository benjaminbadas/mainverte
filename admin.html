<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration - La Main Verte</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f1;
            color: #263238;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        .admin-panel {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 6px solid #2e7d32;
            text-align: center;
            max-width: 600px;
        }
        h1 { color: #2e7d32; }
        .btn-push {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-push:hover {
            background-color: #f57c00;
            transform: scale(1.05);
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1em;
            color: #1565c0;
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>⚙️ Base de Données "La Main Verte"</h1>
        <p>Ce panneau permet d'injecter toutes les cartes (Cultures, Soutiens, Auxiliaires, Objectifs) et les paramètres du jeu dans votre base de données Firebase.</p>
        <p style="color: #d32f2f; font-size: 0.9em;">⚠️ Attention : Cliquer sur le bouton écrasera la configuration actuelle du serveur.</p>
        
        <button class="btn-push" onclick="pushToFirebase()">📤 Envoyer les données au Serveur</button>
        
        <div id="status">En attente...</div>
    </div>

    <script>
        // 1. Configuration Firebase (La même que dans ton index.html)
        var firebaseConfig = {
            apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
            authDomain: "main-verte-72483.firebaseapp.com",
            databaseURL: "https://main-verte-72483-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "main-verte-72483",
            storageBucket: "main-verte-72483.firebasestorage.app"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        // On cible spécifiquement le nœud de configuration
        var dbConfig = firebase.database().ref("game-config");

        // 2. Définition de toutes tes données (Cartes + Paramètres)
        var adminData = {
            settings: { 
                costArroserTemps: 1, costAmenderTemps: 1, costRecolterTemps: 1, costComposterTemps: 1,
                costAmenagerPotagerOr: 3, costAmenagerPotagerTemps: 3,
                costSerreOr: 8, costComposteurOr: 5, costLocalOr: 5,
                costUp2Or: 4, costUp2Temps: 3, costUp3Or: 8, costUp3Temps: 5,
                jardSlot1Temps: 1, jardSlot1Pioches: 1, jardSlot2Temps: 2, jardSlot2Pioches: 2,
                jardSlot3Temps: 3, jardSlot3Pioches: 3, jardSlot4Temps: 4, jardSlot4Pioches: 4
            },
            decks: {
                C: [
                    // --- CULTURES (Légumes classiques) ---
                    { nom: "Tomates", cat: 'L', p: 2, g: 4, e: 2, s: 2, t: 1, sm: ["P"], rc: ["E", "A"] },
                    { nom: "Carottes", cat: 'L', p: 1, g: 3, e: 1, s: 1, t: 1, sm: ["P", "E"], rc: ["E", "A", "H"] },
                    { nom: "Salade", cat: 'L', p: 1, g: 2, e: 2, s: 1, t: 1, sm: ["P", "A"], rc: ["E", "H"] },
                    { nom: "Pommes de terre", cat: 'L', p: 2, g: 5, e: 1, s: 2, t: 1, sm: ["P"], rc: ["A"] },
                    { nom: "Courgette", cat: 'L', p: 2, g: 4, e: 3, s: 2, t: 1, sm: ["P"], rc: ["E"] },
                    { nom: "Radis", cat: 'L', p: 1, g: 2, e: 1, s: 1, t: 1, sm: ["P", "A"], rc: ["P", "A"] },
                    { nom: "Poireau", cat: 'L', p: 2, g: 4, e: 2, s: 1, t: 1, sm: ["P", "E"], rc: ["A", "H"] },
                    
                    // --- PETITS FRUITS ---
                    { nom: "Fraise", cat: 'L', p: 3, g: 5, e: 2, s: 2, t: 1, sm: ["P"], rc: ["E"] },
                    { nom: "Melon", cat: 'L', p: 3, g: 6, e: 3, s: 3, t: 1, sm: ["P"], rc: ["E"] },
                    { nom: "Pastèque", cat: 'L', p: 3, g: 6, e: 3, s: 3, t: 1, sm: ["P"], rc: ["E"] },
                    
                    // --- GRIMPANTES ---
                    { nom: "Haricot", cat: 'L', p: 2, g: 3, e: 2, s: 2, t: 1, sm: ["P", "E"], rc: ["E", "A"] },
                    { nom: "Pois", cat: 'L', p: 2, g: 3, e: 2, s: 1, t: 1, sm: ["P", "A"], rc: ["P", "E"] },
                    { nom: "Concombre", cat: 'L', p: 2, g: 4, e: 3, s: 2, t: 1, sm: ["P"], rc: ["E"] }
                ],
                S: [
                    // --- OUTILS ---
                    { nom: "Arrosoir", cat: 'S', p: 3, t: 1, desc: "Outil : Permet d'arroser les plantes (+2💧 par action)." },
                    { nom: "Tuyau", cat: 'S', p: 4, t: 1, desc: "Outil : Arrosage très efficace (+2💧 sans consommer la réserve)." },
                    { nom: "Brouette", cat: 'S', p: 4, t: 1, desc: "Outil : Permet d'amender 2 fois plus vite (2💩 d'un coup)." },
                    { nom: "Sécateur", cat: 'S', p: 3, t: 1, desc: "Outil : Génère du compost en fin de saison si vous avez un Verger ou une Haie." },
                    { nom: "Cagette", cat: 'S', p: 4, t: 1, desc: "Outil : Permet de récolter deux cultures identiques en une seule action." },
                    { nom: "Tuteur", cat: 'S', p: 2, t: 1, desc: "Outil : Indispensable pour planter des Grimpantes (Haricots, Pois...)." },
                    
                    // --- COMPAGNES (Fleurs/Aromatiques) ---
                    { nom: "Basilic", cat: 'S', p: 1, t: 1, desc: "Compagne : Protège et améliore la croissance." },
                    { nom: "Œillet d'Inde", cat: 'S', p: 1, t: 1, desc: "Compagne : Protège les racines des nématodes." },
                    { nom: "Capucine", cat: 'S', p: 1, t: 1, desc: "Compagne : Attire les pucerons loin des légumes." },
                    { nom: "Bourrache", cat: 'S', p: 1, t: 1, desc: "Compagne : Attire les pollinisateurs." },
                    { nom: "Menthe", cat: 'S', p: 1, t: 1, desc: "Compagne : Repousse de nombreux ravageurs." },
                    
                    // --- COMPOST ET AUTRES ---
                    { nom: "Fumier", cat: 'S', p: 2, t: 1, desc: "Compost : À recycler dans le composteur (+2💩)." },
                    { nom: "Épluchures", cat: 'S', p: 1, t: 1, desc: "Compost : À recycler dans le composteur (+2💩)." },
                    { nom: "Paillage", cat: 'S', p: 2, t: 1, desc: "Effet Immédiat : Retire 2💧 et 1☀️ requis pour toutes les plantes d'une zone." },
                    { nom: "Corne torréfiée", cat: 'S', p: 3, t: 1, desc: "Effet Immédiat : Ajoute +2💰 au rendement de toutes les plantes d'une zone." }
                ],
                A: [
                    // --- ARBRES (Verger) ---
                    { nom: "Pommier", cat: 'A', p: 4, g: 6, e: 3, s: 3, t: 1, sm: ["H", "P"], rc: ["A"] },
                    { nom: "Poirier", cat: 'A', p: 4, g: 6, e: 3, s: 3, t: 1, sm: ["H", "P"], rc: ["A"] },
                    { nom: "Cerisier", cat: 'A', p: 5, g: 7, e: 2, s: 3, t: 1, sm: ["H", "P"], rc: ["E"] },
                    
                    // --- DÉFENSEURS (Auxiliaires) ---
                    { nom: "Coccinelle", cat: 'X', prot: "Pucerons", p: 3, t: 1, desc: "Protège définitivement contre les pucerons." },
                    { nom: "Hérisson", cat: 'X', prot: "Limaces", p: 3, t: 1, desc: "Protège définitivement contre les limaces." },
                    { nom: "Grenouille", cat: 'X', prot: "Moustiques", p: 3, t: 1, desc: "Protège définitivement contre les moustiques/mouches." },
                    { nom: "Mésange", cat: 'X', prot: "Chenilles", p: 3, t: 1, desc: "Protège définitivement contre les chenilles." }
                ],
                O: [
                    // --- OBJECTIFS DE LA FOIRE ---
                    { nom: "Ferme Autonome", desc: "Avoir 1 Serre, 1 Local Outils et 1 Composteur (7 PV)" },
                    { nom: "Grande Diversité", desc: "Avoir 4 légumes différents en même temps sur le plateau (5 PV)" },
                    { nom: "Monoculture", desc: "Avoir 4 fois le même légume en même temps sur le plateau (5 PV)" },
                    { nom: "Beau Verger", desc: "Avoir 3 arbres plantés (6 PV)" }
                ]
            }
        };

        // 3. Fonction pour envoyer les données
        function pushToFirebase() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Envoi en cours...";
            statusDiv.style.color = "#f57f17";

            dbConfig.set(adminData)
                .then(() => {
                    statusDiv.innerText = "✅ Succès ! Toutes les cartes et paramètres sont dans la base de données. Vous pouvez lancer le jeu.";
                    statusDiv.style.color = "#2e7d32";
                })
                .catch((error) => {
                    statusDiv.innerText = "❌ Erreur : " + error.message;
                    statusDiv.style.color = "#d32f2f";
                    console.error("Erreur Firebase :", error);
                });
        }
    </script>
</body>
</html>
