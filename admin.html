    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; padding: 20px; color: #263238; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #2e7d32; text-align: center; font-size: 2.5em; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #546e7a; margin-bottom: 20px; }
        
        /* SYSTÈME D'ONGLETS */
        .tabs { display: flex; border-bottom: 2px solid #2e7d32; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; background: #e8f5e9; border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; margin-right: 5px; color: #2e7d32; transition: 0.2s; }
        .tab:hover { background: #c8e6c9; }
        .tab.active { background: #2e7d32; color: white; border-color: #2e7d32; }
        .tab-content { display: none; }
        .tab-content.active { display: block; overflow-x: auto; }

        /* TABLEAUX */
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th { background: #37474f; color: white; padding: 10px; text-align: left; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #cfd8dc; }
        tr:hover { background: #f5f5f5; }
        input[type="text"], input[type="number"] { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #b0bec5; border-radius: 4px; }
        input[type="number"] { width: 60px; text-align: center; }
        .input-large { width: 250px !important; }

        .btn-save { display: block; width: 100%; background: #ff9800; color: white; border: none; padding: 15px; font-size: 1.5em; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 30px; transition: 0.3s; box-shadow: 0 4px 10px rgba(255,152,0,0.4); }
        .btn-save:hover { background: #f57c00; transform: scale(1.02); }
    </style>
</head>
<body>

    <p class="subtitle">Modifiez les statistiques du jeu. Saisons valides : P, E, A, H (séparées par des virgules).</p>

    <div class="tabs">

        <div class="tab" onclick="switchTab('soutien')">🛠️ Soutiens</div>
        <div class="tab" onclick="switchTab('auxiliaires')">🦊 Auxiliaires</div>
        <div class="tab" onclick="switchTab('events')">⚡ Événements</div>
    </div>

    <div id="legumes" class="tab-content active"><table id="table-legumes"></table></div>
    <div id="arbres" class="tab-content"><table id="table-arbres"></table></div>
    <div id="compagnes" class="tab-content"><table id="table-compagnes"></table></div>
    <div id="soutien" class="tab-content"><table id="table-soutien"></table></div>
    <div id="auxiliaires" class="tab-content"><table id="table-auxiliaires"></table></div>
    <div id="events" class="tab-content"><table id="table-events"></table></div>

    <button class="btn-save" onclick="saveToFirebase()">💾 Sauvegarder toute la base dans Firebase</button>
</div>

<script>

    // --- DONNÉES PAR DÉFAUT (Extraites de ta liste) ---

        { nom: "Maïs", p: 1, t: 2, g: 5, e: 4, s: 2, sm: "P,E", rc: "E,A", qte: 2 },
        { nom: "Patate Douce", p: 1, t: 2, g: 5, e: 5, s: 2, sm: "P", rc: "A", qte: 2 },
        { nom: "Poireau", p: 1, t: 1, g: 4, e: 4, s: 2, sm: "P", rc: "H,A", qte: 2 },

        { nom: "Radis", p: 1, t: 1, g: 4, e: 1, s: 1, sm: "P,E,A,H", rc: "P,E,A,H", qte: 3 },
        { nom: "Tomate", p: 1, t: 1, g: 3, e: 5, s: 2, sm: "P,E", rc: "E,A", qte: 2 }

    const dataArbres = [
        { nom: "Abricotier", p: 3, t: 3, g: 10, e: 9, s: 4, sm: "E", qte: 1 },

    ];

    const dataCompagnes = [

        { nom: "Aneth", p: 1, t: 1, e: 4, s: 2, desc: "+1 besoin comblé pour culture", qte: 2 },
        { nom: "Basilic", p: 1, t: 1, e: 4, s: 2, desc: "+1 besoin comblé pour culture", qte: 2 },
        { nom: "Bourrache", p: 1, t: 1, e: 4, s: 2, desc: "+1 besoin comblé pour culture", qte: 2 },
        { nom: "Capucine", p: 1, t: 1, e: 4, s: 2, desc: "+1 besoin comblé pour culture", qte: 2 },

        { nom: "Épinard", p: 1, t: 1, e: 3, s: 2, desc: "+1 besoin comblé pour culture", qte: 2 },

    ];

    const dataSoutien = [
        { nom: "Arrosoir 10L", p: 2, t: 1, desc: "+2 Eau lors d'un arrosage", qte: 2 },
        { nom: "Brouette", p: 2, t: 1, desc: "-1 Temps pour 2 pts d'amendement (req. Local)", qte: 2 },
        { nom: "Serre", p: 3, t: 4, desc: "Avance le semis d'1 saison, prolonge la récolte d'1 saison", qte: 3 },
        { nom: "Tuteur", p: 1, t: 1, desc: "Permet de cultiver des plantes grimpantes sans prendre de place", qte: 3 },
        { nom: "Récupérateur d'eau", p: 3, t: 2, desc: "Stocke jusqu'à 7 unités d'Eau", qte: 1 },
        { nom: "Poules", p: 2, t: 1, desc: "-1 Temps => +1 Rendement (req. Clôture + Prairie)", qte: 2 },

    ];

    const dataAuxiliaires = [
        { nom: "Hérisson", p: 2, t: 1, prereq: "Haie", prot: "Limaces", qte: 2 },
        { nom: "Grenouille", p: 2, t: 1, prereq: "Mare", prot: "Mouches", qte: 2 },
        { nom: "Coccinelle", p: 1, t: 1, prereq: "Prairie", prot: "Pucerons", qte: 3 },
        { nom: "Rapace", p: 3, t: 1, prereq: "Forêt", prot: "Campagnols", qte: 1 },
        { nom: "Chauve-souris", p: 2, t: 1, prereq: "Forêt", prot: "Carpocapse", qte: 2 }
    ];

    const dataEvents = [
        { nom: "Saison exceptionnelle", type: "Positif", desc: "+2 sous à la récolte", qte: 1 },
        { nom: "Travail en musique", type: "Positif", desc: "+2 Temps disponible", qte: 1 },
        { nom: "Aide de la région", type: "Positif", desc: "Gain immédiat de 2 sous", qte: 1 },
        { nom: "Grêle", type: "Négatif", desc: "Serres indisponibles, -2 rendement sur fruitiers", qte: 1 },
        { nom: "Sécheresse", type: "Négatif", desc: "Lancez 1 dé précipitation en moins", qte: 1 },
        { nom: "Blessure", type: "Négatif", desc: "Un jardinier en moins cette saison", qte: 1 }
    ];

    // --- GÉNÉRATION DES TABLEAUX UI ---
    function renderTable(tableId, dataArray, columnsDef) {
        const table = document.getElementById(tableId);
        let headerHTML = "<tr>";
        columnsDef.forEach(col => headerHTML += `<th>${col.label}</th>`);
        headerHTML += "</tr>";
        table.innerHTML = headerHTML;

        dataArray.forEach((item, idx) => {
            let rowHTML = "<tr>";
            columnsDef.forEach(col => {
                let val = item[col.key] !== undefined ? item[col.key] : "";
                if(col.type === 'text' || col.type === 'large') {
                    rowHTML += `<td><input type="text" class="${col.type==='large'?'input-large':''}" data-idx="${idx}" data-key="${col.key}" value="${val}"></td>`;
                } else if (col.type === 'number') {
                    rowHTML += `<td><input type="number" data-idx="${idx}" data-key="${col.key}" value="${val}"></td>`;
                }
            });
            rowHTML += "</tr>";
            table.innerHTML += rowHTML;
        });
    }

    function init() {
        renderTable("table-legumes", dataLegumes, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Achat(💰)", key: "p", type: "number"}, {label: "Temps(⏳)", key: "t", type: "number"},
            {label: "Gain(💰)", key: "g", type: "number"}, {label: "Eau(💧)", key: "e", type: "number"}, {label: "Soleil(☀️)", key: "s", type: "number"},
            {label: "Semis", key: "sm", type: "text"}, {label: "Récolte", key: "rc", type: "text"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
        renderTable("table-arbres", dataArbres, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Achat(💰)", key: "p", type: "number"}, {label: "Temps(⏳)", key: "t", type: "number"},
            {label: "Gain(💰)", key: "g", type: "number"}, {label: "Eau(💧)", key: "e", type: "number"}, {label: "Soleil(☀️)", key: "s", type: "number"},
            {label: "Plantation", key: "sm", type: "text"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
        renderTable("table-compagnes", dataCompagnes, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Achat(💰)", key: "p", type: "number"}, {label: "Temps(⏳)", key: "t", type: "number"},
            {label: "Eau(💧)", key: "e", type: "number"}, {label: "Soleil(☀️)", key: "s", type: "number"}, {label: "Effet", key: "desc", type: "large"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
        renderTable("table-soutien", dataSoutien, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Achat(💰)", key: "p", type: "number"}, {label: "Temps(⏳)", key: "t", type: "number"},
            {label: "Effet / Bonus", key: "desc", type: "large"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
        renderTable("table-auxiliaires", dataAuxiliaires, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Achat(💰)", key: "p", type: "number"}, {label: "Temps(⏳)", key: "t", type: "number"},
            {label: "Prérequis", key: "prereq", type: "text"}, {label: "Cible (Protège de)", key: "prot", type: "text"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
        renderTable("table-events", dataEvents, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Type", key: "type", type: "text"}, {label: "Description", key: "desc", type: "large"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
    }

    // --- LOGIQUE UI ONGLETS ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    // --- SAUVEGARDE FIREBASE ---
    function extractData(tableId, baseArray) {
        let rows = document.getElementById(tableId).querySelectorAll('tr');
        let res = [];
        for(let i=1; i<rows.length; i++) { // Skip header
            let inputs = rows[i].querySelectorAll('input');
            let obj = {};
            inputs.forEach(inp => {
                let key = inp.getAttribute('data-key');
                let val = inp.value;
                if(inp.type === 'number') obj[key] = parseInt(val) || 0;
                else if(key === 'sm' || key === 'rc') obj[key] = val.split(',').map(s=>s.trim()); // Parse arrays for seasons
                else obj[key] = val;
            });
            res.push(obj);
        }
        return res;
    }

    function saveToFirebase() {
        let finalDecks = { C: [], S: [], A: [], E: [] };

        // Parsing Légumes (C) et ajout du tag 'cat'
        extractData('table-legumes', dataLegumes).forEach(c => finalDecks.C.push({...c, cat: 'L'}));
        // Parsing Arbres (C)
        extractData('table-arbres', dataArbres).forEach(c => finalDecks.C.push({...c, cat: 'A', rc: c.sm})); // Récolte = Semis par défaut pour l'arbre
        
        // Parsing Soutien & Compagnes (S)
        extractData('table-compagnes', dataCompagnes).forEach(c => finalDecks.S.push({...c, cat: 'S'}));
        extractData('table-soutien', dataSoutien).forEach(c => finalDecks.S.push({...c, cat: 'S'}));
        
        // Parsing Auxiliaires (A)
        extractData('table-auxiliaires', dataAuxiliaires).forEach(c => finalDecks.A.push({...c, cat: 'X'}));
        
        // Parsing Events (E)
        extractData('table-events', dataEvents).forEach(c => finalDecks.E.push({...c, cat: 'E'}));

        // Envoi
        dbConfig.set(finalDecks).then(() => {
            alert("✅ Base de données mise à jour avec succès dans Firebase !");
        }).catch(err => {
            console.error(err);
            alert("❌ Erreur lors de la sauvegarde.");
        });
    }

    // Lancement
    window.onload = init;
</script>
</body>
</html>
