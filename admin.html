<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - Base de Données (Mega-Extension)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #263238; color: white; padding: 40px; text-align: center; }
        .container { background: #37474f; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 800px; margin: 0 auto; }
        h1 { color: #81c784; font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.2em; color: #b0bec5; margin-bottom: 30px; }
        .btn { background: #ff9800; color: white; border: none; padding: 20px 40px; font-size: 1.5em; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,152,0,0.4); }
        .btn:hover { background: #f57c00; transform: scale(1.05); }
        .log { margin-top: 30px; background: #1e272b; padding: 20px; border-radius: 8px; color: #a5d6a7; font-family: monospace; text-align: left; height: 300px; overflow-y: auto; }
        .stats { display: flex; justify-content: space-around; margin-top: 20px; font-size: 1.2em; font-weight: bold; color: #ffccbc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 Base de Données Centrale</h1>
    <p>Générateur de cartes (Légumes, Arbres, Auxiliaires, Soutiens, Ravageurs et Événements).</p>
    
    <button class="btn" onclick="generateAndPushDatabase()">🚀 Générer et Injecter la Mega-Extension</button>
    
    <div class="stats" id="stats-banner"></div>
    <div class="log" id="console-log">En attente de génération...</div>
</div>

<script>
    // --- CONNEXION FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
        authDomain: "main-verte-72483.firebaseapp.com",
        databaseURL: "https://main-verte-72483-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "main-verte-72483",
        storageBucket: "main-verte-72483.firebasestorage.app",
        messagingSenderId: "633454274346",
        appId: "1:633454274346:web:7261efcfe1b9cecdd6e053"
    };
    firebase.initializeApp(firebaseConfig);
    const dbConfig = firebase.database().ref("game-config");

    function log(msg) {
        const c = document.getElementById('console-log');
        c.innerHTML += `<div>> ${msg}</div>`;
        c.scrollTop = c.scrollHeight;
    }

    // ==========================================
    // LES LISTES DE DONNÉES BRUTES
    // ==========================================
    const listLegumes = ["Artichaut", "Aubergine", "Betterave", "Carotte", "Céleri", "Chayotte", "Chou", "Concombre", "Cornichon", "Courge", "Courgette", "Côtes de blette", "Fève", "Fraise", "Fenouil", "Haricot", "Laitue", "Mâche", "Maïs", "Melon", "Navet", "Panais", "Pastèque", "Patate Douce", "Piment fort", "Poireau", "Pois", "Poivron", "Pomme de terre", "Radis", "Tomate"];
    const listArbres = ["Abricotier", "Actinidier", "Amandier", "Brugnonier", "Cassissier", "Cerisier", "Châtaignier", "Citronnier", "Cognassier", "Combava", "Figuier", "Framboisier", "Grenadier", "Groseillier", "Kumquat", "Mandarinier", "Mûrier", "Myrtillier", "Noisetier", "Noyer", "Olivier", "Oranger", "Pamplemoussier", "Pêcher", "Physalis", "Plaqueminier", "Poirier", "Pommier", "Prunier", "Vigne"];
    const listCompagnes = ["Ail", "Aneth", "Agastache", "Basilic", "Bleuet", "Bourrache", "Capucine", "Cébette", "Cerfeuil", "Ciboulette", "Coriandre", "Cosmos", "Echalote", "Épinard", "Estragon", "Lin", "Marguerite", "Mélilot Blanc", "Mélisse", "Menthe", "Moutarde", "Oignon", "Origan", "Oeillet d'Inde", "Persil", "Romarin", "Sarriette", "Sauge", "Serpolet", "Souci", "Tanaisie", "Thym", "Tournesol"];
    const listOutils = ["Animaux", "Arrosoir 10L", "Brouette", "Barrière", "Enrouleur", "Gants", "Filet de protection", "Piège", "Piège à phéromones", "Sécateur", "Treillage", "Tunnel", "Tuteur", "Tuyau d'arrosage", "Voile de forçage", "Voile de protection", "Arrosage automatique", "Goutte à goutte", "Épandeur", "Motoculteur", "Semoir", "Clôture", "Forage", "Récupérateur d'eau", "Nichoir", "Ruche", "Baissières", "Paysagiste"];
    // Mots-clés reconnus par le moteur du jeu (Fumier, Ortie, Paillage, Corne)
    const listTechniques = ["Fumier", "Purin d'ortie", "Paillage", "Corne broyée", "Bel Étalage", "Cagette", "Ceinture lombaire", "Décoction d'ail", "Halloween", "Formations", "Pass VIP", "Carte Fidélité", "Ventes privées", "Entraide", "Produits de la ferme"];
    const listAuxiliaires = ["Lézard", "Carabe", "Araignée", "Grenouille", "Chauve-souris", "Chat", "Rapace", "Hérisson", "Chrysope", "Passereaux", "Syrphe", "Coccinelle", "Lampyre", "Crapaud", "Staphylin"];
    const listRavageurs = ["Carpocapse", "Cécidomyie", "Campagnol", "Altise", "Cochenilles", "Acariens", "Étourneau", "Lapin de Garenne", "Limaces", "Escargots", "Doryphore", "Merle", "Loir", "Phalène brumeuse", "Pucerons", "Mouches", "Punaise", "Sanglier", "Rat taupier", "Teigne", "Thrips"];
    const listEvents = ["Biodynamie", "Grève des fournisseurs", "Grêle", "Cueillette à la ferme", "Augmentation TVA", "Saison nuageuse", "Sécheresse", "Bonne saison", "Mauvaise saison"];
    const listObjectifs = ["Roi du compost", "Crésus", "Constructor", "Aquaman", "Inspecteur gadgets", "Naturalis", "Biodiversité", "Main verte", "Trésorerie"];

    const saisons = ["P", "E", "A", "H"];

    function randomRange(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function getRandomSeasons(count) {
        let res = [];
        let pool = [...saisons];
        for(let i=0; i<count; i++) {
            if(pool.length === 0) break;
            let idx = Math.floor(Math.random()*pool.length);
            res.push(pool.splice(idx, 1)[0]);
        }
        return res;
    }

    async function generateAndPushDatabase() {
        document.getElementById('console-log').innerHTML = "";
        log("Démarrage de la génération procédurale...");

        let decks = { C: [], S: [], A: [], E: [], O: [] };
        let ravPool = [];

        // 1. GÉNÉRATION DES LÉGUMES (Deck C)
        listLegumes.forEach(nom => {
            decks.C.push({
                nom: nom, cat: 'L', t: 1, 
                p: randomRange(1, 2),        // Prix d'achat faible
                g: randomRange(5, 12),       // Gain modéré
                e: randomRange(2, 4),        // Besoin Eau
                s: randomRange(2, 4),        // Besoin Soleil
                sm: getRandomSeasons(2),     // 2 saisons de semis
                rc: getRandomSeasons(1),     // 1 saison de récolte
                qte: 2
            });
        });
        log(`${listLegumes.length} Légumes générés.`);

        // 2. GÉNÉRATION DES ARBRES FRUITIERS (Deck C)
        listArbres.forEach(nom => {
            decks.C.push({
                nom: nom, cat: 'A', t: 2, 
                p: randomRange(3, 5),        // Prix d'achat élevé
                g: randomRange(15, 25),      // Gain massif
                e: randomRange(4, 6),        // Besoin Eau lourd
                s: randomRange(4, 6),        // Besoin Soleil lourd
                sm: getRandomSeasons(1),     
                rc: getRandomSeasons(1),     
                qte: 1
            });
        });
        log(`${listArbres.length} Arbres Fruitiers générés.`);

        // 3. GÉNÉRATION DES SOUTIENS & COMPAGNES (Deck S)
        [...listCompagnes, ...listOutils, ...listTechniques].forEach(nom => {
            // Description générique basée sur le nom
            let desc = "Apporte un bonus à votre exploitation.";
            if(nom.includes("Fumier")) desc = "Ajoute +2 Compost immédiatement.";
            else if(nom.includes("ortie")) desc = "Réduit le besoin en Eau d'une culture de 4💧.";
            else if(nom.includes("Paillage")) desc = "Réduit le besoin de 2💧 et 1☀️ d'une culture.";
            else if(nom.includes("Corne")) desc = "Augmente le gain de la récolte de +2💰.";
            
            decks.S.push({
                nom: nom, cat: 'S', t: 1, 
                p: randomRange(1, 3), 
                desc: desc, 
                qte: 2
            });
        });
        log(`${listCompagnes.length + listOutils.length + listTechniques.length} Cartes Soutien générées.`);

        // 4. GÉNÉRATION DES RAVAGEURS (Pool de menaces)
        listRavageurs.forEach(nom => {
            ravPool.push({
                nom: nom, 
                d: randomRange(3, 8), // Dégâts en pièces d'or
                qte: 1
            });
        });
        log(`${listRavageurs.length} Ravageurs générés.`);

        // 5. GÉNÉRATION DES AUXILIAIRES (Deck A)
        // On assigne à chaque auxiliaire un ravageur aléatoire à protéger
        listAuxiliaires.forEach(nom => {
            let targetRav = listRavageurs[Math.floor(Math.random() * listRavageurs.length)];
            decks.A.push({
                nom: nom, cat: 'X', t: 1, 
                p: randomRange(1, 2), 
                prot: targetRav, 
                qte: 2
            });
        });
        log(`${listAuxiliaires.length} Auxiliaires générés.`);

        // 6. ÉVÉNEMENTS ET OBJECTIFS (Pour usage futur du moteur)
        listEvents.forEach(nom => { decks.E.push({ nom: nom, type: 'Event' }); });
        listObjectifs.forEach(nom => { decks.O.push({ nom: nom, type: 'Objectif' }); });
        log("Événements et Objectifs préparés.");

        // Conservation des paramètres d'équilibrage s'ils existent déjà
        let currentSettings = {};
        try {
            const snap = await dbConfig.child("settings").once("value");
            if(snap.exists()) currentSettings = snap.val();
        } catch(e) {}

        // SAUVEGARDE FINALE DANS FIREBASE
        const finalData = {
            decks: decks,
            ravageurs: ravPool,
            settings: currentSettings // On ne supprime pas tes prix !
        };

        try {
            await dbConfig.set(finalData);
            log("✅ INJECTION TERMINÉE AVEC SUCCÈS !");
            
            let totalCards = decks.C.length + decks.S.length + decks.A.length;
            document.getElementById('stats-banner').innerHTML = `
                <span>🌾 Cultures: ${decks.C.length}</span>
                <span>🛠️ Soutiens: ${decks.S.length}</span>
                <span>🦊 Auxiliaires: ${decks.A.length}</span>
                <span>🐛 Ravageurs: ${ravPool.length}</span>
            `;
            alert(`Succès ! La mega-extension (${totalCards} cartes) a été injectée dans le jeu.`);
        } catch(err) {
            log("❌ ERREUR LORS DE L'INJECTION : " + err.message);
        }
    }
</script>
</body>
</html>
