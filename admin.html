        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; padding: 20px; color: #263238; margin: 0;}

        p.subtitle { text-align: center; color: #546e7a; margin-bottom: 20px; }
        
        /* SYSTÈME D'ONGLETS */
        .tabs { display: flex; border-bottom: 2px solid #2e7d32; margin-bottom: 20px; flex-wrap: wrap; gap: 5px;}
        .tab { padding: 10px 20px; cursor: pointer; font-weight: bold; background: #e8f5e9; border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; color: #2e7d32; transition: 0.2s; }
        .tab:hover { background: #c8e6c9; }
        .tab.active { background: #2e7d32; color: white; border-color: #2e7d32; }
        .tab-content { display: none; }
        .tab-content.active { display: block; overflow-x: auto; }

        /* TABLEAUX */
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th { background: #37474f; color: white; padding: 10px; text-align: left; position: sticky; top: 0; white-space: nowrap;}
        td { padding: 8px; border-bottom: 1px solid #cfd8dc; }
        tr:hover { background: #f5f5f5; }
        input[type="text"], input[type="number"] { width: 100%; padding: 6px; box-sizing: border-box; border: 1px solid #b0bec5; border-radius: 4px; font-family: inherit;}
        input[type="number"] { width: 70px; text-align: center; }
        .input-large { min-width: 300px !important; }

        .btn-save { display: block; width: 100%; background: #ff9800; color: white; border: none; padding: 15px; font-size: 1.5em; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 30px; transition: 0.3s; box-shadow: 0 4px 10px rgba(255,152,0,0.4); }
        .btn-save:hover { background: #f57c00; transform: scale(1.02); }

        { nom: "Travail en musique", type: "Positif", desc: "+2 Temps disponible", qte: 1 },
        { nom: "Aide de la région", type: "Positif", desc: "Gain immédiat de 2 sous", qte: 1 },
        { nom: "Grêle", type: "Négatif", desc: "Serres indisponibles, -2 rendement sur fruitiers", qte: 1 },
        { nom: "Sécheresse", type: "Négatif", desc: "Lancez 1 dé précipitation en moins", qte: 1 },
        { nom: "Blessure", type: "Négatif", desc: "Un jardinier (temps) en moins cette saison", qte: 1 }
    ];

    // --- GÉNÉRATION DES TABLEAUX UI ---
    function renderTable(tableId, dataArray, columnsDef) {
        const table = document.getElementById(tableId);
        let headerHTML = "<tr>";
        columnsDef.forEach(col => headerHTML += `<th>${col.label}</th>`);
        headerHTML += "</tr>";
        table.innerHTML = headerHTML;

        dataArray.forEach((item, idx) => {
            let rowHTML = "<tr>";
            columnsDef.forEach(col => {
                let val = item[col.key] !== undefined ? item[col.key] : "";
                if(col.type === 'text' || col.type === 'large') {
                    rowHTML += `<td><input type="text" class="${col.type==='large'?'input-large':''}" data-idx="${idx}" data-key="${col.key}" value="${val}"></td>`;
                } else if (col.type === 'number') {
                    rowHTML += `<td><input type="number" data-idx="${idx}" data-key="${col.key}" value="${val}"></td>`;
                }
            });
            rowHTML += "</tr>";
            table.innerHTML += rowHTML;
        });
    }

    function init() {
        renderTable("table-legumes", dataLegumes, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Achat(💰)", key: "p", type: "number"}, {label: "Temps(⏳)", key: "t", type: "number"},
            {label: "Gain(💰)", key: "g", type: "number"}, {label: "Eau(💧)", key: "e", type: "number"}, {label: "Soleil(☀️)", key: "s", type: "number"},
            {label: "Semis", key: "sm", type: "text"}, {label: "Récolte", key: "rc", type: "text"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);

            {label: "Gain(💰)", key: "g", type: "number"}, {label: "Eau(💧)", key: "e", type: "number"}, {label: "Soleil(☀️)", key: "s", type: "number"},
            {label: "Plantation", key: "sm", type: "text"}, {label: "Récolte", key: "rc", type: "text"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
        renderTable("table-compagnes", dataCompagnes, [
            {label: "Nom", key: "nom", type: "text"}, {label: "Achat(💰)", key: "p", type: "number"}, {label: "Temps(⏳)", key: "t", type: "number"},
            {label: "Eau(💧)", key: "e", type: "number"}, {label: "Soleil(☀️)", key: "s", type: "number"}, 
            {label: "Semis", key: "sm", type: "text"}, {label: "Récolte", key: "rc", type: "text"},

            {label: "Prérequis", key: "prereq", type: "text"}, {label: "Cible (Protège de)", key: "prot", type: "text"}, {label: "Qté Deck", key: "qte", type: "number"}
        ]);
        renderTable("table-objectifs", dataObjectifs, [

    // --- LOGIQUE UI ONGLETS ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    // --- SAUVEGARDE FIREBASE ---
    function extractData(tableId) {
        let rows = document.getElementById(tableId).querySelectorAll('tr');
        let res = [];
        for(let i=1; i<rows.length; i++) { // Skip header
            let inputs = rows[i].querySelectorAll('input');
            let obj = {};
            inputs.forEach(inp => {
                let key = inp.getAttribute('data-key');
                let val = inp.value;
                if(inp.type === 'number') obj[key] = parseInt(val) || 0;
                // Parse arrays for seasons
                else if((key === 'sm' || key === 'rc') && val !== "") {
                    obj[key] = val.split(',').map(s=>s.trim()); 
                }
                else obj[key] = val;
            });
            res.push(obj);
        }
        return res;
    }

    // Fonction de multiplication des cartes en fonction de la colonne `qte`
    function multiplierCartes(tableau, targetDeck, extraAttributes = {}) {
        tableau.forEach(item => {
            let quantity = item.qte || 0;
            // On clone la carte autant de fois que la quantité demandée
            for(let i = 0; i < quantity; i++) {
                // On crée une copie propre de la carte, SANS l'attribut 'qte' (qui ne sert à rien dans le jeu)
                let { qte, ...carteFinale } = item;
                targetDeck.push({ ...carteFinale, ...extraAttributes });
            }
        });
    }

    function saveToFirebase() {
        let finalDecks = { C: [], S: [], A: [], O: [], E: [] };

        // Extraction depuis les tableaux HTML
        let legumesExt = extractData('table-legumes');
        let arbresExt = extractData('table-arbres');
        let compagnesExt = extractData('table-compagnes');
        let soutienExt = extractData('table-soutien');
        let auxExt = extractData('table-auxiliaires');
        let objExt = extractData('table-objectifs');
        let eventsExt = extractData('table-events');

        // Application des multiplicateurs et des catégories
        // Le Deck C (Cultures) regroupe Légumes et Arbres
        multiplierCartes(legumesExt, finalDecks.C, { cat: 'L' });
        multiplierCartes(arbresExt, finalDecks.C, { cat: 'A' });
        
        // Le Deck S (Soutiens) regroupe Outils, Compagnes, Compost
        multiplierCartes(compagnesExt, finalDecks.S, { cat: 'S' });
        multiplierCartes(soutienExt, finalDecks.S, { cat: 'S' });
        
        // Le Deck A (Auxiliaires) 
        multiplierCartes(auxExt, finalDecks.A, { cat: 'X' });

        // Le Deck O (Objectifs) - Vital pour la Foire
        multiplierCartes(objExt, finalDecks.O, {});
        
        // Le Deck E (Events) - Pour le futur
        multiplierCartes(eventsExt, finalDecks.E, { cat: 'E' });

        // Envoi final
        dbConfig.set(finalDecks).then(() => {
            alert("✅ Decks générés et envoyés à Firebase avec succès ! Lancez une nouvelle partie pour voir les changements.");
        }).catch(err => {
            console.error(err);
            alert("❌ Erreur lors de la sauvegarde : " + err.message);
        });
    }

    window.onload = init;
</script>
