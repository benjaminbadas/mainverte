    function renderTable(tId, arr, cols) {
        let t = document.getElementById(tId); 
        let h = "<tr>"; cols.forEach(c => h += `<th>${c.label}</th>`); h += "</tr>"; 
        t.innerHTML = h;

        if(!arr) return;
        arr.forEach((item, i) => {
            let r = "<tr>"; 
            cols.forEach(c => {
                let v = item[c.key] !== undefined ? item[c.key] : "";
                r += c.type === 'number' 
                    ? `<td><input type="number" data-idx="${i}" data-key="${c.key}" value="${v}"></td>` 
                    : `<td><input type="text" class="${c.type==='large'?'input-large':''}" data-idx="${i}" data-key="${c.key}" value="${v}"></td>`;
            }); 
            t.innerHTML += r + "</tr>";
        });
    }

    function renderAdmin(src, settings) {
        const sGrid = document.getElementById('settings-grid');
        sGrid.innerHTML = '';
        for(let key in settings) {
            sGrid.innerHTML += `<div class="setting-item"><label>${key}</label><input type="number" id="set-${key}" value="${settings[key]}"></div>`;
        }

        renderTable("table-legumes", src.legumes, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Gain💰",key:"g",type:"number"},{label:"Eau💧",key:"e",type:"number"},{label:"Soleil☀️",key:"s",type:"number"},{label:"Semis",key:"sm",type:"text"},{label:"Récolte",key:"rc",type:"text"},{label:"Sensible 🐌",key:"rav",type:"text"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-arbres", src.arbres, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Gain💰",key:"g",type:"number"},{label:"Eau💧",key:"e",type:"number"},{label:"Soleil☀️",key:"s",type:"number"},{label:"Plantation",key:"sm",type:"text"},{label:"Récolte",key:"rc",type:"text"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-compagnes", src.compagnes, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Eau💧",key:"e",type:"number"},{label:"Soleil☀️",key:"s",type:"number"},{label:"Semis",key:"sm",type:"text"},{label:"Récolte",key:"rc",type:"text"},{label:"Effet",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-soutien", src.soutien, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Effet",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-auxiliaires", src.auxiliaires, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Protège",key:"prot",type:"text"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-ravageurs", src.ravageurs, [{label:"Nom",key:"nom",type:"text"},{label:"Dégâts💰",key:"d",type:"number"},{label:"Description",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-objectifs", src.objectifs, [{label:"Nom",key:"nom",type:"text"},{label:"Description",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-events", src.events, [{label:"Nom",key:"nom",type:"text"},{label:"Type",key:"type",type:"text"},{label:"Description",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
    }

    window.switchTab = function(id) { 
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); 
        event.target.classList.add('active'); 
        document.getElementById(id).classList.add('active'); 
    }
    
    // Le secret est de garder sm et rc en tant que string dans l'adminSource, 
    // et de les transformer en array [P, E] uniquement pour le deck de jeu final.
    function extract(id) {
        let r = []; 
        document.getElementById(id).querySelectorAll('tr').forEach((row, i) => {
            if(i === 0) return; 
            let o = {}; 
            row.querySelectorAll('input').forEach(inp => { 
                let k = inp.getAttribute('data-key');
                let v = inp.value; 
                if(inp.type === 'number') o[k] = parseInt(v) || 0; 
                else o[k] = v; 
            }); 
            r.push(o);
        }); 
        return r;
    }
    
    function buildDeckFromSource(sourceArray, deckArray, extraProps) {
        sourceArray.forEach(item => {
            let q = item.qte || 0;
            for(let j=0; j<q; j++) {
                let {qte, ...cardData} = item;
                
                // Transformation des chaînes de texte "P, E" en véritables tableaux de jeu ["P", "E"]
                if (typeof cardData.sm === 'string') cardData.sm = cardData.sm.split(',').map(s=>s.trim()).filter(s=>s);
                if (typeof cardData.rc === 'string') cardData.rc = cardData.rc.split(',').map(s=>s.trim()).filter(s=>s);
                
                deckArray.push({...cardData, ...extraProps});
            }
        });
    }

    // =================================================================================
    // LOGIQUE DE CHARGEMENT ET DE SAUVEGARDE
    // =================================================================================

    window.onload = function() {
        let status = document.getElementById('status');
        dbConfig.once('value').then(snap => {
            let dbData = snap.val();
            if (dbData && dbData.adminSource) {
                status.innerText = "✅ Données récupérées depuis Firebase avec succès !";
                status.style.background = "#e8f5e9"; status.style.color = "#2e7d32"; status.style.borderColor = "#4caf50";
                renderAdmin(dbData.adminSource, dbData.settings || defaultSettings);
            } else {
                status.innerText = "⚠️ Aucune donnée sur Firebase. Chargement des cartes par défaut. (Cliquez sur Sauvegarder pour les enregistrer)";
                renderAdmin(defaultAdminSource, defaultSettings);
            }
        }).catch(err => {
            status.innerHTML = `❌ <b>ERREUR DE LECTURE FIREBASE :</b> ${err.message}<br>Avez-vous bien autorisé la lecture/écriture dans les règles de la base de données ?`;
            status.style.background = "#ffebee"; status.style.color = "#c62828"; status.style.borderColor = "#ef9a9a";
            renderAdmin(defaultAdminSource, defaultSettings);
        });
    }
    
    window.saveToFirebase = function() {
        let status = document.getElementById('status');
        status.innerText = "⏳ Envoi en cours..."; status.style.background = "#fff3e0"; status.style.color = "#e65100"; status.style.borderColor = "#ffb300";

        try {
            let finalSettings = {};
            document.querySelectorAll('.setting-item input').forEach(inp => {
                let key = inp.id.replace('set-', ''); 
                finalSettings[key] = Number(inp.value);
            });

            // 1. Sauvegarde des tableaux sources EXACTEMENT tels qu'ils sont (pour le rechargement de l'admin)
            let currentAdminSource = {
                legumes: extract('table-legumes'), arbres: extract('table-arbres'),
                compagnes: extract('table-compagnes'), soutien: extract('table-soutien'),
                auxiliaires: extract('table-auxiliaires'), ravageurs: extract('table-ravageurs'),
                objectifs: extract('table-objectifs'), events: extract('table-events')
            };

            // 2. Fabrication des paquets de jeu (Decks) injectés directement dans le jeu
            let d = {C:[], S:[], A:[], O:[], E:[], R:[]};
            buildDeckFromSource(currentAdminSource.legumes, d.C, {cat:'L'});
            buildDeckFromSource(currentAdminSource.arbres, d.C, {cat:'A'});
            buildDeckFromSource(currentAdminSource.compagnes, d.S, {cat:'S'});
            buildDeckFromSource(currentAdminSource.soutien, d.S, {cat:'S'});
            buildDeckFromSource(currentAdminSource.auxiliaires, d.A, {cat:'X'});
            buildDeckFromSource(currentAdminSource.events, d.E, {cat:'E'});
            buildDeckFromSource(currentAdminSource.ravageurs, d.R, {cat:'R'});
            buildDeckFromSource(currentAdminSource.objectifs, d.O, {});

            // ENVOI À FIREBASE (Settings, AdminSource, Decks)
            dbConfig.update({ settings: finalSettings, adminSource: currentAdminSource, decks: d })
                .then(() => {
                    status.innerText = "✅ SUCCÈS ! Base de données, cartes et paramètres enregistrés sur Firebase.";
                    status.style.background = "#e8f5e9"; status.style.color = "#2e7d32"; status.style.borderColor = "#4caf50";
                })
                .catch(e => {
                    status.innerHTML = `❌ <b>ERREUR FIREBASE (Permission refusée) :</b> ${e.message}<br><br>Dans votre console Firebase > Realtime Database > Règles, assurez-vous d'avoir ".read": "true" et ".write": "true"`;
                    status.style.background = "#ffebee"; status.style.color = "#c62828"; status.style.borderColor = "#ef9a9a";
                });
                
        } catch(error) {
            status.innerText = "❌ ERREUR DE CODE LOCAL : " + error.message;
            status.style.background = "#ffebee"; status.style.color = "#c62828"; status.style.borderColor = "#ef9a9a";
        }
    }
</script>
