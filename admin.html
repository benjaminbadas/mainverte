    // 4. MOTEUR D'AFFICHAGE ET D'EXTRACTION
    function renderTable(tId, arr, cols) {
        let t = document.getElementById(tId); 
        let h = "<tr>"; 
        cols.forEach(c => h += `<th>${c.label}</th>`); 
        h += "</tr>"; 
        t.innerHTML = h;

        arr.forEach((item, i) => {
            let r = "<tr>"; 
            cols.forEach(c => {
                let v = item[c.key] !== undefined ? item[c.key] : "";
                r += c.type === 'number' 
                    ? `<td><input type="number" data-idx="${i}" data-key="${c.key}" value="${v}"></td>` 
                    : `<td><input type="text" class="${c.type==='large'?'input-large':''}" data-idx="${i}" data-key="${c.key}" value="${v}"></td>`;
            }); 
            t.innerHTML += r + "</tr>";
        });
    }

    function init() {
        const sGrid = document.getElementById('settings-grid');
        for(let key in defaultSettings) {
            sGrid.innerHTML += `<div class="setting-item"><label>${key}</label><input type="number" id="set-${key}" value="${defaultSettings[key]}"></div>`;
        }

        renderTable("table-legumes", dataLegumes, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Gain💰",key:"g",type:"number"},{label:"Eau💧",key:"e",type:"number"},{label:"Soleil☀️",key:"s",type:"number"},{label:"Semis",key:"sm",type:"text"},{label:"Récolte",key:"rc",type:"text"},{label:"Sensible 🐌",key:"rav",type:"text"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-arbres", dataArbres, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Gain💰",key:"g",type:"number"},{label:"Eau💧",key:"e",type:"number"},{label:"Soleil☀️",key:"s",type:"number"},{label:"Plantation",key:"sm",type:"text"},{label:"Récolte",key:"rc",type:"text"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-compagnes", dataCompagnes, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Eau💧",key:"e",type:"number"},{label:"Soleil☀️",key:"s",type:"number"},{label:"Semis",key:"sm",type:"text"},{label:"Récolte",key:"rc",type:"text"},{label:"Effet",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-soutien", dataSoutien, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Effet",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-auxiliaires", dataAuxiliaires, [{label:"Nom",key:"nom",type:"text"},{label:"Achat💰",key:"p",type:"number"},{label:"Temps⏳",key:"t",type:"number"},{label:"Protège",key:"prot",type:"text"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-ravageurs", dataRavageurs, [{label:"Nom",key:"nom",type:"text"},{label:"Dégâts💰",key:"d",type:"number"},{label:"Description",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);
        renderTable("table-events", dataEvents, [{label:"Nom",key:"nom",type:"text"},{label:"Type",key:"type",type:"text"},{label:"Description",key:"desc",type:"large"},{label:"Qté",key:"qte",type:"number"}]);

    window.switchTab = function(id) { 
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); 
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); 
        event.target.classList.add('active'); 
        document.getElementById(id).classList.add('active'); 
    }
    
    function extract(id) {
        let r = []; 
        document.getElementById(id).querySelectorAll('tr').forEach((row, i) => {
            if(i === 0) return; 
            let o = {}; 
            row.querySelectorAll('input').forEach(inp => { 
                let k = inp.getAttribute('data-key');
                let v = inp.value; 
                if(inp.type === 'number') o[k] = parseInt(v) || 0; 
                else if((k === 'sm' || k === 'rc') && v !== "") o[k] = v.split(',').map(s => s.trim()); 
                else o[k] = v; 
            }); 
            r.push(o);
        }); 
        return r;
    }
    
    function multiply(arr, deck, extra) { 
        arr.forEach(i => { 
            let q = i.qte || 0; 
            for(let j = 0; j < q; j++) { 
                let {qte, ...c} = i; 
                deck.push({...c, ...extra}); 
            } 
        }); 
    }
    
    // 5. FONCTION DE SAUVEGARDE ET DEBUG
    window.saveToFirebase = function() {
        let status = document.getElementById('status');
        status.innerText = "⏳ Préparation des données...";
        status.style.background = "#fff3e0";
        status.style.color = "#e65100";
        status.style.borderColor = "#ffb300";

        try {
            // Extraction des paramètres
            let finalSettings = {};
            document.querySelectorAll('.setting-item input').forEach(inp => {
                let key = inp.id.replace('set-', ''); 
                finalSettings[key] = Number(inp.value);
            });

            // Extraction des Decks
            let d = {C:[], S:[], A:[], O:[], E:[], R:[]};
            multiply(extract('table-legumes'), d.C, {cat:'L'}); 
            multiply(extract('table-arbres'), d.C, {cat:'A'});
            multiply(extract('table-compagnes'), d.S, {cat:'S'}); 
            multiply(extract('table-soutien'), d.S, {cat:'S'});
            multiply(extract('table-auxiliaires'), d.A, {cat:'X'}); 
            multiply(extract('table-events'), d.E, {cat:'E'}); 
            multiply(extract('table-ravageurs'), d.R, {cat:'R'});

            // Ajout des Objectifs de base
            let objs = [
                { nom: "Ferme Autonome", desc: "Avoir Serre, Local et Composteur (7 PV)" },
                { nom: "Grande Diversité", desc: "Avoir 4 légumes différents (5 PV)" },
                { nom: "Monoculture", desc: "Avoir 4 fois le même légume (5 PV)" },
                { nom: "Beau Verger", desc: "Avoir 3 arbres (6 PV)" }
            ];
            objs.forEach(o => d.O.push(o));

            status.innerText = `⏳ Envoi vers Firebase en cours...\n(${d.C.length} cultures, ${d.R.length} ravageurs générés)`;

            // ENVOI À FIREBASE
            dbConfig.update({ settings: finalSettings, decks: d })
                .then(() => {
                    status.innerText = "✅ SUCCÈS ! Base de données et paramètres enregistrés sur Firebase.";
                    status.style.background = "#e8f5e9";
                    status.style.color = "#2e7d32";
                    status.style.borderColor = "#4caf50";
                })
                .catch(e => {
                    console.error("Erreur Firebase:", e);
                    status.innerHTML = `❌ <b>ERREUR FIREBASE :</b> ${e.message}<br><br>👉 Avez-vous vérifié l'onglet "Règles" de votre base de données ?`;
                    status.style.background = "#ffebee";
                    status.style.color = "#c62828";
                    status.style.borderColor = "#ef9a9a";
                });
                
        } catch(error) {
            console.error("Erreur JS interne:", error);
            status.innerText = "❌ ERREUR DE CODE LOCAL : " + error.message;
            status.style.background = "#ffebee";
            status.style.color = "#c62828";
            status.style.borderColor = "#ef9a9a";
        }
    }

    window.onload = init;
</script>
