<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - V4.16z Le Grand Deck</title>
    <style>
        :root { --p1: #2e7d32; --bg: #f4f7f1; --potager: #81c784; --verger: #fff176; --amenag: #ffccbc; --batiment: #455a64; --dark: #263238; --gold: #ffd700; --serre: #e1f5fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .main-game { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .sidebar { width: 420px; background: white; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; }
        
        .hud { display: flex; justify-content: space-between; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; font-weight: bold; }
        .farm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #d7ccc8; padding: 10px; border-radius: 12px; }
        
        .zone { min-height: 155px; background: #efebe9; border: 2px dashed #bcaaa4; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 0.72em; cursor: pointer; text-align: center; }
        .zone.selected { border: 3px solid #ff9800 !important; box-shadow: 0 0 8px rgba(255,152,0,0.4); }
        .tuile-potager { background: var(--potager) !important; border: 2px solid #2e7d32 !important; }
        .tuile-verger { background: var(--verger) !important; border: 2px solid #fbc02d !important; }
        .tuile-amenag { background: var(--amenag) !important; border: 2px solid #ff5722 !important; }
        .tuile-batiment { background: var(--batiment) !important; border: 2px solid #263238 !important; color: white; }
        .has-serre { box-shadow: inset 0 0 15px rgba(3, 169, 244, 0.6); border: 3px solid #03a9f4 !important; background: var(--serre) !important; }

        .up-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
        .up-card { background: #f1f1f1; padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.75em; cursor: help; }
        .btn-up { width: 100%; font-size: 0.85em; cursor: pointer; margin-top: 4px; background: white; border: 1px solid #999; border-radius: 3px; font-weight: bold; }

        .card { border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin-bottom: 5px; background: white; font-size: 0.75em; cursor: help; position: relative; }
        .scroll-area { flex: 1; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 4px; }
        .logs { height: 80px; background: var(--dark); color: #a5d6a7; padding: 8px; font-family: monospace; font-size: 0.7em; overflow-y: auto; border-radius: 6px; }
        
        .btn-action { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.72em; margin-bottom: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-action:hover:not(:disabled) { filter: brightness(1.1); }
        .btn-cost { font-size: 0.8em; font-weight: normal; margin-top: 2px; opacity: 0.9; }
        .res-pill { background: #e8f5e9; padding: 2px 8px; border-radius: 10px; color: var(--p1); border: 1px solid var(--p1); }

        button:disabled, .btn-action:disabled, .btn-up:disabled { background: #cfd8dc !important; color: #78909c !important; cursor: not-allowed !important; box-shadow: none !important; border-color: #b0bec5 !important; transform: none !important; }
        button:disabled .btn-cost { opacity: 0.6; }

        .market-preview { background: #fffde7; padding: 6px; border: 1px solid #ffd54f; border-radius: 6px; font-size: 0.72em; margin-bottom: 6px; line-height: 1.4; }
        .market-preview b { color: #555; }

        .aux-tray { display: flex; gap: 5px; margin-bottom: 8px; min-height: 25px; background: #e3f2fd; padding: 5px 10px; border-radius: 5px; border: 1px solid #90caf9; flex-wrap: wrap; align-items: center; }
        .aux-icon { background: white; border: 1px solid #90caf9; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; display: flex; align-items: center; font-weight: bold; color: #1565c0; cursor: help; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 12px; width: 90%; max-width: 900px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; }
        .rayon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .rayon { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .rayon h3 { margin: 0 0 10px 0; text-align: center; color: var(--p1); font-size: 1.1em; }
        .btn-jard-action { width: 100%; margin-bottom: 5px; padding: 6px; background: #e0e0e0; border: 1px solid #999; border-radius: 4px; cursor: help; font-weight: bold; }
        .btn-jard-action:hover:not(:disabled) { background: #d5d5d5; }
        .jard-card { border: 2px solid #ddd; padding: 10px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; background: #fafafa; position: relative; }
        .jard-card:hover:not(.disabled-card) { border-color: var(--p1); background: #f1f8e9; }
        .disabled-card { filter: grayscale(100%); opacity: 0.6; cursor: not-allowed; }
        .price-tag { position: absolute; top: -8px; right: -8px; background: var(--gold); color: black; font-weight: bold; padding: 3px 6px; border-radius: 10px; border: 1px solid #b8860b; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="main-game">
    <div class="hud" title="Informations générales de votre exploitation">
        <div id="season-display">📅 Printemps - An 1</div>
        <div title="Sous gagnés par la vente et Temps restant pour agir">💰 <span id="res-money">5</span> | ⏳ <span id="res-time">10</span>/<span id="res-timemax">10</span>h</div>
        <div title="Le compost sert à amender les cultures pour augmenter leur valeur de 1💰">💩 Compost: <span id="res-compost" class="res-pill">3</span></div>
        <div id="meteo-display" style="color:#1565c0;" title="Dernier tirage des dés météo (Pluie / Soleil)">🎲 --</div>
    </div>

    <div id="ravageur-alert" style="background:#ffebee; color:#c62828; padding:5px; font-size:0.8em; text-align:center; display:none; border-radius:5px; margin-bottom:5px;"></div>
    
    <div id="aux-tray" class="aux-tray" style="display:none;">
        <span style="font-size: 0.8em; color: #1565c0; margin-right:5px;">🛡️ Protections Actives :</span>
    </div>

    <div class="farm-grid" id="farm-grid"></div>
    <div class="logs" id="game-logs">> Le grand jeu de cartes a été ajouté à la Jardinerie !</div>

    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-top:10px;">
        <button id="btn-act-p" class="btn-action" onclick="actionTuile('P')" style="background:#4caf50" title="Aménage une zone en POTAGER. Requis pour les Légumes.">
            🏗️ Potager <span class="btn-cost">-3h | -<span id="c-s-p">2</span>💰</span>
        </button>
        <button id="btn-act-v" class="btn-action" onclick="actionTuile('V')" style="background:#fbc02d; color:#333;" title="Aménage une zone en VERGER. Requis pour les Arbres.">
            🏗️ Verger <span class="btn-cost">-3h | -<span id="c-s-v">2</span>💰</span>
        </button>
        <button id="btn-act-n" class="btn-action" onclick="actionAmenager()" style="background:#ff5722" title="Aménage un espace Nature.">
            🌳 Nature <span class="btn-cost">-3h | -3💰</span>
        </button>
        <button id="btn-act-b" class="btn-action" onclick="actionConstruire()" style="background:#607d8b" title="Serre: sur Potager uniquement.&#10;Composteur/Local: sur Potager ou Nature.">
            🏠 Bâtiment <span class="btn-cost">-4h | -3 à 5💰</span>
        </button>
        <button id="btn-act-arr" class="btn-action" onclick="actionArroser()" style="background:#2196f3" title="Retire 2 cubes d'eau (💧) à la culture sélectionnée.">
            💧 Arroser <span class="btn-cost">-1h</span>
        </button>
        <button id="btn-act-amd" class="btn-action" onclick="actionAmender()" style="background:#795548" title="Ajoute un bonus permanent de +1💰 au gain de la culture ciblée.">
            💩 Amender <span class="btn-cost">-1h | -1💩</span>
        </button>
        <button id="btn-act-fin" class="btn-action" onclick="prochaineSaison()" style="background:#e53935; grid-column: span 2;" title="Lance la Météo, fait grandir les plantes et restaure le temps.">
            💤 Fin de Saison <span class="btn-cost">Passe au tour suivant</span>
        </button>
    </div>
</div>

<div class="sidebar">
    <h3 style="margin:0 0 5px 0; font-size:0.9em;">⚙️ Améliorations</h3>
    <div class="up-grid" id="up-grid"></div>
    
    <h3 style="margin:5px 0 2px 0; font-size:0.9em;">🛒 Jardinerie (En Vitrine)</h3>
    <div class="market-preview" id="market-preview"></div>
    
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;">
        <button id="btn-jard-1" class="btn-action" style="background:#8d6e63" onclick="ouvrirJardinerie(3, 5)">📦 Empl. 1 <span class="btn-cost">-<span id="jard-c1">3</span>h | 5 pioches</span></button>
        <button id="btn-jard-2" class="btn-action" style="background:#8d6e63" onclick="ouvrirJardinerie(2, 3)">📦 Empl. 2 <span class="btn-cost">-<span id="jard-c2">2</span>h | 3 pioches</span></button>
        <button id="btn-jard-3" class="btn-action" style="background:#8d6e63" onclick="ouvrirJardinerie(2, 2)">📦 Empl. 3 <span class="btn-cost">-<span id="jard-c3">2</span>h | 2 pioches</span></button>
        <button id="btn-jard-4" class="btn-action" style="background:#8d6e63" onclick="ouvrirJardinerie(1, 1)">📦 Empl. 4 <span class="btn-cost">-<span id="jard-c4">1</span>h | 1 pioche</span></button>
    </div>
    
    <h3 style="margin:5px 0; font-size:0.9em;">🎒 Ma Main</h3>
    <div class="scroll-area" id="player-hand"></div>
</div>

<div class="modal-overlay" id="jardinerie-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin:0; color:var(--p1);">🛒 La Jardinerie</h2>
            <div style="font-size:1.2em; font-weight:bold; color:#d32f2f;">Actions restantes : <span id="jard-picks">0</span></div>
            <div>💰 Vous avez: <span id="jard-money" style="font-weight:bold; color:var(--gold);"></span> sous</div>
        </div>
        <div class="rayon-grid">
            <div class="rayon" id="ray-C"><h3>🌾 Cultures</h3></div>
            <div class="rayon" id="ray-S"><h3>🛠️ Soutiens</h3></div>
            <div class="rayon" id="ray-A"><h3>🦊 Auxiliaires</h3></div>
        </div>
    </div>
</div>

<script>
    // --- NOUVEAUX DECKS COMPLETS ---
    const DECKS = {
        C: [
            { nom: "Radis", prix: 0, e: 1, s: 1, t: 1, g: 3, cat: 'L', semis: ['P','E','A','H'], rec: ['P','E','A','H'] },
            { nom: "Laitue", prix: 0, e: 2, s: 1, t: 1, g: 4, cat: 'L', semis: ['P','A'], rec: ['P','E','A'] },
            { nom: "Carotte", prix: 1, e: 4, s: 2, t: 1, g: 6, cat: 'L', semis: ['P','E'], rec: ['A','H'] },
            { nom: "Poireau", prix: 1, e: 3, s: 2, t: 1, g: 6, cat: 'L', semis: ['P','E'], rec: ['A','H'] },
            { nom: "Courgette", prix: 1, e: 5, s: 4, t: 1, g: 8, cat: 'L', semis: ['P'], rec: ['E','A'] },
            { nom: "Tomate", prix: 1, e: 6, s: 5, t: 1, g: 9, cat: 'L', semis: ['P'], rec: ['E','A'] },
            { nom: "Aubergine", prix: 2, e: 7, s: 6, t: 1, g: 11, cat: 'L', semis: ['P'], rec: ['E','A'] },
            { nom: "Pomme de Terre", prix: 2, e: 4, s: 3, t: 2, g: 10, cat: 'L', semis: ['P','E'], rec: ['A','H'] },
            { nom: "Fraise", prix: 2, e: 3, s: 4, t: 1, g: 8, cat: 'A', semis: ['P','A'], rec: ['E'] },
            { nom: "Noisetier", prix: 2, e: 8, s: 4, t: 3, g: 12, cat: 'A', semis: ['A','H'], rec: ['A'] },
            { nom: "Pommier", prix: 2, e: 12, s: 5, t: 3, g: 15, cat: 'A', semis: ['A','H'], rec: ['E','A'] },
            { nom: "Pêcher", prix: 3, e: 11, s: 6, t: 3, g: 16, cat: 'A', semis: ['A','H'], rec: ['E'] },
            { nom: "Cerisier", prix: 3, e: 10, s: 6, t: 3, g: 18, cat: 'A', semis: ['A','H'], rec: ['E'] }
        ],
        S: [
            { nom: "Purin d'Ortie", prix: 1, t: 1, g: 0, cat: 'Soutien', desc: "Arrosage express: -4💧 sur une zone." },
            { nom: "Paillage", prix: 1, t: 1, g: 0, cat: 'Soutien', desc: "Protection chaleur: -2💧 -1☀️ sur une zone." },
            { nom: "Compost Maison", prix: 1, t: 1, g: 0, cat: 'Soutien', desc: "Gain de +1💩 Compost." },
            { nom: "Fumier", prix: 2, t: 1, g: 0, cat: 'Soutien', desc: "Gain massif de +2💩 Compost." },
            { nom: "Corne Broyée", prix: 3, t: 1, g: 0, cat: 'Soutien', desc: "Super engrais: +2💰 sur la future récolte d'une zone." }
        ],
        A: [
            { nom: "Coccinelle", prix: 1, t: 1, g: 0, cat: 'Auxiliaire', prot: "Pucerons" },
            { nom: "Crapaud", prix: 1, t: 1, g: 0, cat: 'Auxiliaire', prot: "Campagnols" },
            { nom: "Hérisson", prix: 2, t: 1, g: 0, cat: 'Auxiliaire', prot: "Limaces" },
            { nom: "Mésange", prix: 2, t: 1, g: 0, cat: 'Auxiliaire', prot: "Carpocapses" }
        ]
    };

    const UP_NAMES = ["Agrandissement", "Efficacité", "Formation", "Qualité Sol", "Microclimat", "Bricoleur", "Fidélité", "Pass VIP"];
    const UP_DESC = [
        "Débloque la Zone 4 (L2) et la Zone 5 (L3).",
        "Passe le Temps Max à 14h (L2) et 18h (L3).",
        "Réduit le temps pour semer/planter de 1h (L2) et 2h (L3).",
        "Augmente tous les gains de récolte de +1💰 (L2) et +2💰 (L3).",
        "Ajoute un bonus de +1 aux dés Pluie/Soleil (L2).",
        "Réduit le coût des tuiles Potager/Verger à 1💰 (L2) et 0💰 (L3).",
        "Réduit de 1h le temps passé à la Jardinerie (L2). Remplissage direct (L3)",
        "Permet de nouvelles actions de revente."
    ];

    // Mise à jour des ravageurs
    const RAV_LIST = [
        {n:"Limaces", d:3, c:'L'},
        {n:"Pucerons", d:2, c:'L'},
        {n:"Campagnols", d:4, c:'L'},
        {n:"Carpocapses", d:5, c:'A'}
    ];
    const ALL_SEASONS = ["P","E","A","H"];

    let state = {
        annee: 1, saisonIdx: 0, money: 10, time: 10, timeMax: 10, compost: 3,
        upgrades: Array(8).fill(1), hand: [], auxActifs: [],
        zones: Array(6).fill(null).map((_, i) => ({ id: i, type: i === 0 ? "LIFE" : null, culture: null, batiment: null })),
        selZoneId: null, currentRav: null,
        market: { C: [], S: [], A: [] }, picksLeft: 0
    };

    function drawCard(cat) { return {...DECKS[cat][Math.floor(Math.random() * DECKS[cat].length)]}; }
    function initMarket() { ['C','S','A'].forEach(cat => { state.market[cat] = [drawCard(cat), drawCard(cat)]; }); }
    function addLog(m) { const l = document.getElementById('game-logs'); l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; }

    function calcSaisons(baseArr, isSerre, isSemis) {
        if(!isSerre) return baseArr;
        let res = new Set(baseArr);
        baseArr.forEach(c => { let i = ALL_SEASONS.indexOf(c); if(isSemis) res.add(ALL_SEASONS[(i+3)%4]); else res.add(ALL_SEASONS[(i+1)%4]); });
        return Array.from(res);
    }

    function updateMarketPreview() {
        const previewDiv = document.getElementById('market-preview');
        const cCards = state.market.C.map(c => `${c.nom}(<span style="color:#b8860b;font-weight:bold">${c.prix}💰</span>)`).join(', ') || "<i>Vide</i>";
        const sCards = state.market.S.map(c => `${c.nom}(<span style="color:#b8860b;font-weight:bold">${c.prix}💰</span>)`).join(', ') || "<i>Vide</i>";
        const aCards = state.market.A.map(c => `${c.nom}(<span style="color:#b8860b;font-weight:bold">${c.prix}💰</span>)`).join(', ') || "<i>Vide</i>";
        
        previewDiv.innerHTML = `
            🌾 <b>Cultures:</b> ${cCards}<br>
            🛠️ <b>Soutiens:</b> ${sCards}<br>
            🦊 <b>Auxiliaires:</b> ${aCards}
        `;
    }

    function render() {
        document.getElementById('res-money').innerText = state.money;
        document.getElementById('res-time').innerText = state.time;
        document.getElementById('res-timemax').innerText = state.timeMax;
        document.getElementById('res-compost').innerText = state.compost;
        document.getElementById('season-display').innerText = `📅 ${["Printemps","Été","Automne","Hiver"][state.saisonIdx]} - An ${state.annee}`;

        let costTuile = state.upgrades[5] >= 2 ? (state.upgrades[5] === 3 ? 0 : 1) : 2;
        document.getElementById('c-s-p').innerText = costTuile; document.getElementById('c-s-v').innerText = costTuile;
        
        let redJard = state.upgrades[6] >= 2 ? 1 : 0;
        let c1 = Math.max(0, 3 - redJard); document.getElementById('jard-c1').innerText = c1;
        let c2 = Math.max(0, 2 - redJard); document.getElementById('jard-c2').innerText = c2;
        let c3 = Math.max(0, 2 - redJard); document.getElementById('jard-c3').innerText = c3;
        let c4 = Math.max(0, 1 - redJard); document.getElementById('jard-c4').innerText = c4;

        document.getElementById('btn-act-p').disabled = (state.time < 3 || state.money < costTuile);
        document.getElementById('btn-act-v').disabled = (state.time < 3 || state.money < costTuile);
        document.getElementById('btn-act-n').disabled = (state.time < 3 || state.money < 3);
        document.getElementById('btn-act-b').disabled = (state.time < 4 || state.money < 3);
        document.getElementById('btn-act-arr').disabled = (state.time < 1);
        document.getElementById('btn-act-amd').disabled = (state.time < 1 || state.compost < 1);

        document.getElementById('btn-jard-1').disabled = (state.time < c1);
        document.getElementById('btn-jard-2').disabled = (state.time < c2);
        document.getElementById('btn-jard-3').disabled = (state.time < c3);
        document.getElementById('btn-jard-4').disabled = (state.time < c4);

        updateMarketPreview();

        const alertBox = document.getElementById('ravageur-alert');
        if(state.currentRav) { alertBox.style.display = "block"; alertBox.innerText = `👾 RAVAGEUR : ${state.currentRav.n} actif ! (-${state.currentRav.d}💰 si non protégé)`; }
        else alertBox.style.display = "none";

        const auxTray = document.getElementById('aux-tray');
        if (state.auxActifs.length > 0) {
            auxTray.style.display = "flex";
            let html = '<span style="font-size: 0.8em; color: #1565c0; margin-right:5px;">🛡️ Protections Actives :</span>';
            state.auxActifs.forEach(prot => { html += `<div class="aux-icon" title="Bloque les dégâts des ${prot}">🦊 Anti-${prot}</div>`; });
            auxTray.innerHTML = html;
        } else { auxTray.style.display = "none"; }

        const grid = document.getElementById('farm-grid'); grid.innerHTML = "";
        state.zones.forEach(z => {
            const d = document.createElement('div');
            const accessible = z.id <= (state.upgrades[0] === 1 ? 3 : (state.upgrades[0] === 2 ? 4 : 5));
            const isSerre = z.batiment === 'SERRE';
            let tClass = z.type ? 'tuile-'+z.type.toLowerCase() : '';
            if(z.batiment && !isSerre) tClass = 'tuile-batiment';
            if(isSerre) tClass += ' has-serre'; 
            
            d.className = `zone ${tClass} ${state.selZoneId === z.id ? 'selected' : ''}`;
            d.style.opacity = accessible ? "1" : "0.3";
            d.onclick = () => { if(accessible) { state.selZoneId = z.id; render(); } };
            
            let tooltip = "";
            if (z.id === 0) { tooltip = "Zone 0 (Maison)"; }
            else if (!accessible) { tooltip = "Zone verrouillée 🔒"; }
            else if (isSerre && !z.culture) { tooltip = `SERRE\nAvance les semis, retarde les récoltes.`; }
            else if (z.batiment && !isSerre) { tooltip = `Bâtiment: ${z.batiment}`; }
            else if (!z.type) { tooltip = `Zone ${z.id} vierge.`; }
            else if (!z.culture) { tooltip = `Tuile ${z.type}\nPrête pour un semis.`; }
            else { 
                const s_valides = calcSaisons(z.culture.semis, isSerre, true);
                const r_valides = calcSaisons(z.culture.rec, isSerre, false);
                const gain = z.culture.g + (state.upgrades[3]-1) + (z.culture.amend || 0);
                tooltip = `${z.culture.nom}\nGain: ${gain}💰\nBesoins: ${z.culture.eCur}💧 ${z.culture.sCur}☀️\nS: ${s_valides.join(',')} | R: ${r_valides.join(',')}`; 
            }
            d.title = tooltip;
            
            if(z.id === 0) d.innerHTML = "🏠 MAISON";
            else if(!z.type) d.innerHTML = `ZONE ${z.id}${accessible ? '' : '<br>🔒'}`;
            else {
                let entete = z.batiment && !isSerre ? `🏗️ ${z.batiment}` : (z.type === 'POTAGER' ? '🥬 POTAGER' : (z.type === 'VERGER' ? '🍎 VERGER' : z.type));
                if(isSerre) entete = "POTAGER + SERRE";
                d.innerHTML = `<span style="font-size:0.75em; opacity:0.7; font-weight:bold;">${entete}</span>`;
                
                if(z.culture) {
                    const s_valides = calcSaisons(z.culture.semis, isSerre, true);
                    const r_valides = calcSaisons(z.culture.rec, isSerre, false);
                    const mure = z.culture.eCur <= 0 && z.culture.sCur <= 0;
                    const canRec = r_valides.includes(ALL_SEASONS[state.saisonIdx]);
                    const gain = z.culture.g + (state.upgrades[3]-1) + (z.culture.amend || 0);
                    
                    d.innerHTML += `<br><b>${z.culture.nom}</b><br>💧${z.culture.eCur} ☀️${z.culture.sCur}<br>💰${gain}`;
                    
                    let recDisabled = state.time < 2 ? "disabled" : "";
                    if(mure && canRec) d.innerHTML += `<button ${recDisabled} onclick="actionRecolter(${z.id})" style="background:var(--p1); color:white; border:none; cursor:pointer; font-size:0.9em; margin-top:4px; padding:4px; border-radius:3px; font-weight:bold;">🧺 Récolter (-2h)</button>`;
                    else if(mure) d.innerHTML += `<br><i style="color:#e65100; font-size:0.9em;">Attend Saison R</i>`;
                }
            }
            grid.appendChild(d);
        });

        const upDiv = document.getElementById('up-grid'); upDiv.innerHTML = "";
        UP_NAMES.forEach((name, i) => {
            const card = document.createElement('div'); card.className = "up-card";
            let costLvl = state.upgrades[i] === 1 ? 3 : 5;
            card.title = `Amélioration: ${name}\nAvantage: ${UP_DESC[i]}`;
            card.innerHTML = `<b>${name}</b><br>L${state.upgrades[i]}`;
            const btn = document.createElement('button'); btn.className = "btn-up"; 
            if(state.upgrades[i] < 3) { 
                btn.innerHTML = `UP <span style="color:var(--p1); font-weight:normal">(-${costLvl}h)</span>`; 
                btn.onclick = () => upgrade(i); 
                btn.disabled = (state.time < costLvl);
            } 
            else { btn.innerHTML = "MAX"; btn.disabled = true; }
            upDiv.appendChild(card); card.appendChild(btn);
        });

        const hDiv = document.getElementById('player-hand'); hDiv.innerHTML = "";
        state.hand.forEach((c, i) => {
            const d = document.createElement('div'); d.className = "card";
            if(c.cat === 'Auxiliaire') { d.title = `Auxiliaire\nProtège: ${c.prot}`; } 
            else if(c.cat === 'Soutien') { d.title = `Soutien\nEffet: ${c.desc}`; }
            else { d.title = `Type: ${c.cat === 'L' ? 'Légume (Potager)' : 'Arbre (Verger)'}\nSemis: ${c.semis}\nRécolte: ${c.rec}`; }
            
            let btnText = c.cat === 'Auxiliaire' ? "🦊 Activer" : (c.cat === 'Soutien' ? "✨ Utiliser" : "🌱 Jouer");
            let cardCostT = Math.max(0, c.t - (state.upgrades[2] - 1)); // Réduction Formation
            let cardDisabled = state.time < cardCostT ? "disabled" : "";
            
            d.innerHTML = `<b>${c.nom}</b> [${c.cat === 'L' ? 'Légume' : (c.cat === 'A' ? 'Arbre' : c.cat)}]<br>
                <button ${cardDisabled} onclick="jouerCarte(${i})" style="width:100%; margin-top:4px; padding:4px; cursor:pointer; border:1px solid #ccc; border-radius:3px; background:#e8eaf6; font-weight:bold;">${btnText} (-${cardCostT}h)</button>`;
            hDiv.appendChild(d);
        });
    }

    function ouvrirJardinerie(cost, picks) {
        let finalCost = state.upgrades[6] >= 2 ? Math.max(0, cost - 1) : cost;
        if(state.time < finalCost) return addLog("Pas assez de temps !");
        state.time -= finalCost; state.picksLeft = picks;
        document.getElementById('jardinerie-modal').style.display = 'flex';
        renderJardinerie();
    }

    function renderJardinerie() {
        document.getElementById('jard-picks').innerText = state.picksLeft;
        document.getElementById('jard-money').innerText = state.money;
        
        ['C', 'S', 'A'].forEach(cat => {
            const cont = document.getElementById('ray-' + cat);
            let title = cat === 'C' ? '🌾 Cultures' : (cat === 'S' ? '🛠️ Soutiens' : '🦊 Auxiliaires');
            cont.innerHTML = `<h3>${title}</h3>
                <button class="btn-jard-action" title="Pioche à l'aveugle." onclick="piocheAveugle('${cat}')">❓ Pioche Aveugle (1 act)</button>
                <button class="btn-jard-action" title="Défausse les cartes visibles et en révèle 2 nouvelles." onclick="renouvelerRayon('${cat}')">🔄 Renouveler (1 act)</button>
                <hr style="border:0; border-top:1px solid #eee;">`;
            
            if(state.market[cat].length === 0) { cont.innerHTML += `<i>Rayon vide pour ce tour.</i>`; }
            
            state.market[cat].forEach((c, i) => {
                const d = document.createElement('div'); d.className = "jard-card";
                
                const canAfford = state.money >= c.prix;
                if(!canAfford) { d.classList.add('disabled-card'); d.title = "Fonds insuffisants !"; d.onclick = () => alert("Vous n'avez pas assez de sous !"); }
                else { d.title = `Cliquez pour acheter (Coût: ${c.prix}💰)`; d.onclick = () => acheterVisible(cat, i); }
                
                if(c.prix > 0) d.innerHTML += `<div class="price-tag">${c.prix}💰</div>`;
                let detail = (c.cat === 'L' || c.cat === 'A') ? `S:${c.semis} | R:${c.rec}` : `<i>${c.prot || c.desc}</i>`;
                d.innerHTML += `<b>${c.nom}</b><br><span style="font-size:0.8em">${detail}<br>⏳${c.t}h</span>`;
                cont.appendChild(d);
            });
        });
    }

    function consumePick() {
        state.picksLeft--;
        if(state.picksLeft <= 0) {
            document.getElementById('jardinerie-modal').style.display = 'none';
            ['C','S','A'].forEach(cat => { while(state.market[cat].length < 2) state.market[cat].push(drawCard(cat)); });
            render(); addLog("Fin des achats à la Jardinerie.");
        } else { renderJardinerie(); updateMarketPreview(); }
    }

    function renouvelerRayon(cat) { state.market[cat] = [drawCard(cat), drawCard(cat)]; addLog(`Rayon renouvelé.`); consumePick(); }
    function acheterVisible(cat, idx) {
        let c = state.market[cat][idx]; if(state.money < c.prix) return alert("Pas assez de sous !");
        state.money -= c.prix; state.hand.push(c); state.market[cat].splice(idx, 1);
        if(state.upgrades[6] >= 3) state.market[cat].push(drawCard(cat)); 
        consumePick();
    }
    function piocheAveugle(cat) {
        let c = drawCard(cat);
        if(c.prix > 0) {
            if(state.money >= c.prix && confirm(`Pioche : ${c.nom} (${c.prix}💰). L'acheter ?`)) { state.money -= c.prix; state.hand.push(c); alert("Achetée !"); } 
            else { alert(`Défaussée.`); }
        } else { state.hand.push(c); alert(`Pioche gratuite : ${c.nom} !`); }
        consumePick();
    }

    // --- ACTIONS CLASSIQUES ---
    function actionConstruire() {
        if(state.selZoneId === null || state.selZoneId === 0) return addLog("Sélectionnez une zone (1 à 5).");
        let z = state.zones[state.selZoneId];
        
        if(z.batiment) return addLog("Erreur: Bâtiment déjà présent sur cette zone.");
        if(z.type !== 'POTAGER' && z.type !== 'AMÉNAGEMENT') return addLog("Erreur: Nécessite un Potager ou une zone Nature.");
        if(state.time < 4) return addLog("Pas assez de temps (4h requises) !");

        const choix = prompt("Construire (4h) - Tapez le chiffre :\n1: Serre (3💰) -> Sur Potager uniquement\n2: Composteur (4💰) -> Sur Potager ou Nature\n3: Local Outils (5💰) -> Sur Potager ou Nature");
        if(!choix) return;

        if(choix === "1") {
            if(z.type !== 'POTAGER') return addLog("Erreur: La Serre se construit uniquement sur un Potager.");
            if(state.money < 3) return addLog("Pas assez de sous (3💰).");
            state.money -= 3; state.time -= 4; z.batiment = "SERRE";
        } 
        else if(choix === "2") {
            if(state.money < 4) return addLog("Pas assez de sous (4💰).");
            state.money -= 4; state.time -= 4; z.batiment = "COMPOSTEUR";
        } 
        else if(choix === "3") {
            if(state.money < 5) return addLog("Pas assez de sous (5💰).");
            state.money -= 5; state.time -= 4; z.batiment = "LOCAL OUTILS";
        } 
        else { return addLog("Choix annulé ou invalide."); }
        
        addLog(`🏠 Construction terminée : ${z.batiment}`); render();
    }

    function actionAmenager() { if(state.selZoneId && state.money >= 3 && state.time >= 3) { state.money -= 3; state.time -= 3; state.zones[state.selZoneId].type = 'AMÉNAGEMENT'; render(); } }
    function actionTuile(t) { let cost = state.upgrades[5] >= 2 ? (state.upgrades[5] === 3 ? 0 : 1) : 2; if(state.selZoneId && state.money >= cost && state.time >= 3) { state.money -= cost; state.time -= 3; state.zones[state.selZoneId].type = t === 'P' ? 'POTAGER' : 'VERGER'; render(); } }

    function jouerCarte(i) {
        let c = state.hand[i];
        let cardCostT = Math.max(0, c.t - (state.upgrades[2] - 1)); // L'amélioration Formation réduit le temps !
        if(state.time < cardCostT) return addLog("Pas assez de temps.");
        
        if(c.cat === 'Auxiliaire') { state.time -= cardCostT; state.auxActifs.push(c.prot); state.hand.splice(i,1); addLog(`🦊 Protection Anti-${c.prot} ajoutée !`); render(); }
        else if(c.cat === 'Soutien') {
            state.time -= cardCostT; state.hand.splice(i,1);
            if(c.nom === "Fumier") { state.compost += 2; addLog("+2 Compost !"); }
            if(c.nom === "Compost Maison") { state.compost += 1; addLog("+1 Compost !"); }
            if(c.nom === "Purin d'Ortie" && state.selZoneId) { let z = state.zones[state.selZoneId]; if(z.culture) z.culture.eCur = Math.max(0, z.culture.eCur - 4); addLog("Arrosage express !"); }
            if(c.nom === "Paillage" && state.selZoneId) { let z = state.zones[state.selZoneId]; if(z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur - 2); z.culture.sCur = Math.max(0, z.culture.sCur - 1); } addLog("Paillage appliqué !"); }
            if(c.nom === "Corne Broyée" && state.selZoneId) { let z = state.zones[state.selZoneId]; if(z.culture) { z.culture.amend = (z.culture.amend || 0) + 2; } addLog("Corne broyée : +2💰 à la récolte !"); }
            render();
        } else {
            let z = state.zones[state.selZoneId];
            if(!z || !z.type || z.culture) return addLog("Sélectionnez une zone vierge adaptée.");
            if(c.cat === 'L' && z.type !== 'POTAGER') return addLog("Les légumes se plantent sur un POTAGER.");
            if(c.cat === 'A' && z.type !== 'VERGER') return addLog("Les arbres se plantent sur un VERGER.");
            
            const isSerre = z.batiment === 'SERRE';
            const s_valides = calcSaisons(c.semis, isSerre, true);
            if(!s_valides.includes(ALL_SEASONS[state.saisonIdx])) return addLog("Ce n'est pas la bonne saison de semis !");

            state.time -= cardCostT; z.culture = {...c, eCur: c.e, sCur: c.s, amend:0}; state.hand.splice(i,1); render();
        }
    }

    function actionRecolter(id) { 
        let z = state.zones[id]; if(state.time < 2) return; 
        state.time -= 2; 
        let gain = z.culture.g + (state.upgrades[3]-1) + (z.culture.amend || 0);
        
        if(state.currentRav && state.currentRav.c === z.culture.cat) {
            if(!state.auxActifs.includes(state.currentRav.n)) { gain -= state.currentRav.d; addLog(`Dégâts subis (-${state.currentRav.d}💰)`); } 
            else { addLog(`🦊 Protection efficace contre les ${state.currentRav.n} !`); }
        }
        
        state.money += Math.max(1, gain); z.culture = null; addLog(`Récolte vendue pour ${Math.max(1, gain)}💰 !`); render(); 
    }

    function actionAmender() { let z = state.zones[state.selZoneId]; if(z && z.culture && state.time >= 1 && state.compost > 0) { state.time -= 1; state.compost -= 1; z.culture.amend = (z.culture.amend || 0) + 1; render(); } }
    function actionArroser() { let z = state.zones[state.selZoneId]; if(z && z.culture && state.time >= 1) { state.time -= 1; z.culture.eCur = Math.max(0, z.culture.eCur - 2); render(); } }
    function upgrade(idx) { let cost = state.upgrades[idx] === 1 ? 3 : 5; if(state.time >= cost && state.upgrades[idx] < 3) { state.time -= cost; state.upgrades[idx]++; if(idx === 1) state.timeMax += 4; render(); } }

    function prochaineSaison() {
        state.saisonIdx++; if(state.saisonIdx > 3) { state.saisonIdx = 0; state.annee++; }
        let p = Math.floor(Math.random()*2)+1; let s = Math.floor(Math.random()*2);
        document.getElementById('meteo-display').innerText = `🎲 🌧️${p} ☀️${s}`;
        state.currentRav = Math.random() > 0.5 ? RAV_LIST[Math.floor(Math.random()*RAV_LIST.length)] : null;
        
        state.zones.forEach(z => { 
            if(z.culture) { 
                z.culture.eCur = Math.max(0, z.culture.eCur-p); z.culture.sCur = Math.max(0, z.culture.sCur-s);
                const isSerre = z.batiment === 'SERRE';
                const s_valides = calcSaisons(z.culture.semis, isSerre, true);
                const r_valides = calcSaisons(z.culture.rec, isSerre, false);
                if(!r_valides.includes(ALL_SEASONS[state.saisonIdx]) && !s_valides.includes(ALL_SEASONS[state.saisonIdx])) {
                    addLog(`🥀 ${z.culture.nom} a péri (hors saison).`); z.culture = null;
                }
            }
        });
        state.time = state.timeMax; state.compost += 1; render();
    }

    initMarket(); 
    state.hand.push(drawCard('C')); state.hand.push(drawCard('S')); // Main de départ
    render();
</script>
</body>
</html>
