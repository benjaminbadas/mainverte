
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - V28 (Capacité Multi-Cultures)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --p1: #2e7d32; --p2: #1565c0; --bg: #f4f7f1; --potager: #81c784; --verger: #fff176; --amenag: #ffccbc; --batiment: #455a64; --dark: #263238; --gold: #ffd700; --serre: #e1f5fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #lobby { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-lobby { background: var(--p1); color: white; border: none; padding: 12px 25px; font-size: 1.1em; border-radius: 8px; margin: 8px; cursor: pointer; width: 320px; transition: 0.2s; font-weight: bold;}

        .main-game { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .sidebar { width: 400px; background: white; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; overflow-y: auto;}
        
        .hud { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 5px; font-size: 0.85em; border-top: 4px solid var(--p1); }
        
        /* PLATEAU HEXAGONAL */
        .farm-grid { position: relative; width: 100%; min-height: 480px; background: #d7ccc8; padding: 10px; border-radius: 12px; }
        .zone {
            position: absolute; width: 110px; height: 125px; background: #efebe9; border: 1px solid #bcaaa4;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.2s; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1;
        }
        .zone.selected { border: 4px solid #ff9800 !important; z-index: 10; transform: scale(1.05);}
        
        /* STYLE DES SLOTS DE CULTURE À L'INTÉRIEUR D'UNE ZONE */
        .slot-container { display: flex; flex-direction: column; gap: 2px; width: 80%; pointer-events: none; }
        .mini-culture { 
            background: rgba(255,255,255,0.6); border-radius: 4px; padding: 2px; font-size: 0.8em; 
            border: 1px solid rgba(0,0,0,0.1); line-height: 1.1;
        }
        .compagne-tag { color: #e91e63; font-weight: bold; font-size: 0.7em; }

        /* POSITIONNEMENT HEXAGONES */
        .zone-id-0 { top: 10px; left: 10px; }   .zone-id-1 { top: 10px; left: 130px; }  .zone-id-2 { top: 10px; left: 250px; }  
        .zone-id-3 { top: 10px; left: 370px; }  .zone-id-4 { top: 10px; left: 490px; }  .zone-id-5 { top: 110px; left: 70px; }  
        .zone-id-6 { top: 110px; left: 190px; } .zone-id-7 { top: 110px; left: 310px; } .zone-id-8 { top: 110px; left: 430px; } 
        .zone-id-9 { top: 210px; left: 130px; } .zone-id-10 { top: 210px; left: 250px; } .zone-id-11 { top: 210px; left: 370px; } 
        .zone-id-12 { top: 210px; left: 490px; } .zone-id-13 { top: 310px; left: 490px; } .zone-id-14 { top: 210px; left: 10px; } 

        .tuile-potager { background: var(--potager) !important; }
        .tuile-verger { background: var(--verger) !important; }
        .tuile-amenag { background: var(--amenag) !important; }
        .has-serre { box-shadow: inset 0 0 15px #03a9f4; border: 2px solid #03a9f4 !important; }

        .card { border: 1px solid #ddd; border-radius: 6px; padding: 6px; margin-bottom: 4px; background: white; font-size: 0.75em; border-left: 4px solid var(--p1); }
        .btn-action { width: 100%; padding: 6px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.75em; margin-bottom: 2px; }
        .logs { height: 120px; background: var(--dark); color: #a5d6a7; padding: 8px; font-family: monospace; font-size: 0.7em; overflow-y: auto; border-radius: 6px; margin-top:5px;}
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 15px; border-radius: 12px; width: 95%; max-width: 1000px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3em; margin-bottom: 10px;">🌱 La Main Verte</h1>
    <button class="btn-lobby" onclick="startNewGame('SOLO')">👤 Jouer en Solo</button>
    <button class="btn-lobby" style="background:#ff9800" onclick="startNewGame('IA_SOLO')">🤖 Mode Spectateur IA</button>
</div>

<div class="main-game">
    <div class="hud" id="my-hud">
        <div id="season-display">📅 Saison...</div>
        <div>💰 <span id="res-money">0</span> | ⏳ <span id="res-time">0</span>h | 💩 <span id="res-compost">0</span></div>
        <button id="auto-train-btn" onclick="toggleAutoTrain()" style="background:#009688; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer;">🧬 Auto-Train: OFF</button>
        <button onclick="confirmReset()" style="background:#ff5252; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer;">🧹 Reset</button>
    </div>
    
    <div class="farm-grid" id="farm-grid"></div>
    <div class="logs" id="game-logs"></div>
    <div id="action-buttons-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-top:5px;"></div>
</div>

<div class="sidebar">
    <h3 style="margin:0 0 5px 0;">⚙️ Améliorations</h3>
    <div id="up-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
    <h3 style="margin:10px 0 5px 0;">🛒 Jardinerie</h3>
    <div id="jard-buttons-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
    <h3 style="margin:10px 0 5px 0;">🎒 Ma Main</h3>
    <div id="player-hand" style="flex:1; overflow-y:auto;"></div>
</div>

<div class="modal-overlay" id="jardinerie-modal"><div class="modal-content" id="modal-content-inner"></div></div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
        authDomain: "main-verte-72483.firebaseapp.com",
        databaseURL: "https://main-verte-72483-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "main-verte-72483",
        storageBucket: "main-verte-72483.firebasestorage.app",
        messagingSenderId: "633454274346",
        appId: "1:633454274346:web:7261efcfe1b9cecdd6e053"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("game-session-001");
    const dbConfig = firebase.database().ref("game-config");

    const UP_NAMES = ["Terrain", "Énergie", "Savoir", "Sol", "Climat", "Outils", "Vente", "VIP"];
    const ALL_SEASONS = ["P","E","A","H"];
    const zoneNumbersMap = [0, 1, 1, 4, 4, 2, 3, 3, 5, 2, 3, 4, 5, 5, null];

    let state = null; let myId = 1; let localSelectedId = null; let localModalOpen = false; let localPicksLeft = 0;

    function generatePlayer() {
        return { 
            money: 10, time: 10, timeMax: 10, compost: 0, upgrades: Array(8).fill(1), hand: [], zones: zoneNumbersMap.map((num, i) => ({ 
                id: i, num: num, type: (i === 14 ? "POTAGER" : (num === 0 ? "LIFE" : null)), 
                slots: [], // Contiendra max 2 cultures
                compagnes: [], // Cultures compagnes associées
                batiment: null 
            })) 
        };
    }

    async function initNewGame(creatorId, mode) {
        const snapConf = await dbConfig.once("value");
        let config = snapConf.val();
        state = { 
            mode: mode, turn: 1, annee: 1, saisonIdx: 0, gameOver: false, settings: config.settings,
            decks: config.decks, market: { C: [], S: [], A: [] }, currentMeteo: {p:1, s:1}, p1: generatePlayer(), p2: generatePlayer(), gameLogs: ["> Partie Initialisée."] 
        };
        ['C','S','A'].forEach(cat => { for(let i=0; i<2; i++) state.market[cat].push(draw(cat)); });
        db.set(state);
    }

    function draw(cat) {
        if(!state.decks[cat] || state.decks[cat].length === 0) return null;
        return state.decks[cat].splice(Math.floor(Math.random()*state.decks[cat].length), 1)[0];
    }

    db.on("value", snap => { if(snap.val()) { state = snap.val(); render(); } });

    function render() {
        if(!state) return;
        const me = state['p'+myId]; const s = state.settings;
        
        // HUD
        document.getElementById('res-money').innerText = me.money;
        document.getElementById('res-time').innerText = me.time;
        document.getElementById('res-compost').innerText = me.compost;
        document.getElementById('season-display').innerText = `📅 An ${state.annee} - Saison ${ALL_SEASONS[state.saisonIdx]}`;

        // GRID
        const grid = document.getElementById('farm-grid'); grid.innerHTML = "";
        me.zones.forEach((z, i) => {
            const acc = (z.num !== null && z.num <= (me.upgrades[0] === 1 ? 3 : (me.upgrades[0] === 2 ? 4 : 5))) || z.id === 14 || z.id === 0;
            const div = document.createElement('div');
            div.className = `zone zone-id-${i} ${z.type?'tuile-'+z.type.toLowerCase():''} ${z.batiment==='SERRE'?'has-serre':''} ${localSelectedId===z.id?'selected':''}`;
            div.style.opacity = acc ? "1" : "0.2";
            div.onclick = () => { if(acc) { localSelectedId = z.id; render(); } };

            // Affichage des cultures dans les slots
            let htmlSlots = '<div class="slot-container">';
            if(z.id === 0) htmlSlots += "🏠 MAISON";
            else if(!z.type) htmlSlots += `Z${z.num}`;
            else {
                z.slots.forEach((c, idx) => {
                    htmlSlots += `<div class="mini-culture" onclick="event.stopPropagation(); harvest(${z.id}, ${idx})">${c.nom} ${c.eCur}💧</div>`;
                });
                z.compagnes.forEach(c => {
                    htmlSlots += `<div class="mini-culture compagne-tag">${c.nom} ✨</div>`;
                });
            }
            htmlSlots += '</div>';
            div.innerHTML = htmlSlots;
            grid.appendChild(div);
        });

        // BOUTONS ACTIONS
        renderActionButtons(me, s);

        // MAIN DU JOUEUR
        const hDiv = document.getElementById('player-hand'); hDiv.innerHTML = "";
        (me.hand || []).forEach((c, i) => {
            const btn = document.createElement('div'); btn.className = "card";
            btn.innerHTML = `<b>${c.nom}</b><br><small>${c.cat==='L'?'Légume':(c.cat==='A'?'Arbre':'Spécial')}</small><br><button onclick="playCard(${i})">Jouer</button>`;
            hDiv.appendChild(btn);
        });

        // MODAL JARDINERIE
        document.getElementById('jardinerie-modal').style.display = localModalOpen ? 'flex' : 'none';
        if(localModalOpen) renderJardModal(me);
    }

    function renderActionButtons(me, s) {
        const container = document.getElementById('action-buttons-container');
        container.innerHTML = `
            <button class="btn-action" style="background:#4caf50" onclick="amenager('POTAGER')">🏗️ Potager (2💰)</button>
            <button class="btn-action" style="background:#fbc02d;color:#333" onclick="amenager('VERGER')">🏗️ Verger (2💰)</button>
            <button class="btn-action" style="background:#2196f3" onclick="arroserTout()">💧 Arroser Zone</button>
            <button class="btn-action" style="background:#e53935" onclick="finTour()">⏭️ Fin Saison</button>
        `;

        // Upgrades
        const upG = document.getElementById('up-grid'); upG.innerHTML = "";
        UP_NAMES.forEach((n, i) => {
            upG.innerHTML += `<button class="btn-action" style="background:#90a4ae" onclick="upgrade(${i})">${n} L${me.upgrades[i]}</button>`;
        });

        // Jardinerie slots
        const jCont = document.getElementById('jard-buttons-container'); jCont.innerHTML = "";
        [[3,5],[2,2]].forEach((config, i) => {
            jCont.innerHTML += `<button class="btn-action" style="background:#8d6e63" onclick="openJard(${config[0]},${config[1]})">📦 Marché ${i+1}</button>`;
        });
    }

    // --- LOGIQUE DE JEU ---

    function playCard(idx) {
        const me = state['p'+myId]; const card = me.hand[idx]; const zone = me.zones[localSelectedId];
        if(!zone || !zone.type) return alert("Sélectionnez une zone aménagée !");

        // RÈGLE : Compagnes (ne prennent pas de place)
        if(card.nom.includes("Compagne") || ["Basilic","Oeillet","Souci"].includes(card.nom)) {
            zone.compagnes.push({...card, eCur: card.e, sCur: card.s});
            me.hand.splice(idx, 1);
        }
        // RÈGLE : Verger (1 Arbre ou Petits fruits)
        else if(zone.type === 'VERGER') {
            if(zone.slots.length >= 1) return alert("Verger plein !");
            zone.slots.push({...card, eCur: card.e, sCur: card.s});
            me.hand.splice(idx, 1);
        }
        // RÈGLE : Potager (2 places)
        else if(zone.type === 'POTAGER') {
            let isGrimpante = card.nom.includes("Haricot") || card.nom.includes("Pois"); // Exemple
            if(!isGrimpante && zone.slots.length >= 2) return alert("Potager plein !");
            zone.slots.push({...card, eCur: card.e, sCur: card.s});
            me.hand.splice(idx, 1);
        }
        
        me.time -= 1; db.set(state);
    }

    function harvest(zId, slotIdx) {
        const me = state['p'+myId]; const z = me.zones[zId];
        const plant = z.slots[slotIdx];
        if(plant.eCur > 0) return alert("Pas encore prêt !");
        me.money += plant.g;
        z.slots.splice(slotIdx, 1);
        db.set(state);
    }

    function amenager(type) {
        const me = state['p'+myId]; const z = me.zones[localSelectedId];
        if(type === 'POTAGER' && z.num > 2 && z.id !== 14) return alert("Zone 1 ou 2 uniquement !");
        z.type = type; me.money -= 2; me.time -= 3; db.set(state);
    }

    function arroserTout() {
        const me = state['p'+myId]; const z = me.zones[localSelectedId];
        if(!z || z.slots.length === 0) return;
        z.slots.forEach(c => c.eCur = Math.max(0, c.eCur - 2));
        me.time -= 1; db.set(state);
    }

    function openJard(h, p) { state['p'+myId].time -= h; localPicksLeft = p; localModalOpen = true; db.set(state); }

    function renderJardModal(me) {
        const inner = document.getElementById('modal-content-inner');
        inner.innerHTML = `<h2>🛒 Marché (${localPicksLeft} actions)</h2><div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;"></div>`;
        ['C','S','A'].forEach(cat => {
            const div = document.createElement('div'); div.innerHTML = `<h4>${cat}</h4>`;
            state.market[cat].forEach((c, idx) => {
                const item = document.createElement('div'); item.style.border="1px solid #ccc";
                item.innerHTML = `${c.nom} (${c.p}💰)<br>📈 +${c.g}💰`;
                item.onclick = () => { 
                    if(me.money >= c.p) {
                        me.money -= c.p; me.hand.push(c); state.market[cat][idx] = draw(cat); 
                        localPicksLeft--; if(localPicksLeft<=0) localModalOpen = false;
                        db.set(state);
                    }
                };
                div.appendChild(item);
            });
            inner.querySelector('div').appendChild(div);
        });
    }

    function finTour() {
        state.saisonIdx++; if(state.saisonIdx > 3) { state.saisonIdx = 0; state.annee++; }
        [1,2].forEach(p => {
            const player = state['p'+p]; player.time = player.timeMax;
            player.zones.forEach(z => {
                z.slots.forEach(c => { c.eCur = Math.max(0, c.eCur - 1); });
            });
        });
        db.set(state);
    }

    function startNewGame(mode) { document.getElementById('lobby').style.display='none'; initNewGame(1, mode); }
    function confirmReset() { if(confirm("Reset ?")) initNewGame(1, state.mode); }
    function sync() { db.set(state); }
</script>
</body>
</html>
