<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - Multijoueur Live (Reset)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --p1: #2e7d32; --bg: #f4f7f1; --potager: #81c784; --verger: #fff176; --amenag: #ffccbc; --batiment: #455a64; --dark: #263238; --gold: #ffd700; --serre: #e1f5fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main-game { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .sidebar { width: 420px; background: white; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; }
        .hud { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; font-weight: bold; }
        .farm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #d7ccc8; padding: 10px; border-radius: 12px; }
        .zone { min-height: 155px; background: #efebe9; border: 2px dashed #bcaaa4; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 0.72em; cursor: pointer; text-align: center; transition: 0.2s; }
        .zone.selected { border: 3px solid #ff9800 !important; box-shadow: 0 0 8px rgba(255,152,0,0.4); }
        .tuile-potager { background: var(--potager) !important; border: 2px solid #2e7d32 !important; }
        .tuile-verger { background: var(--verger) !important; border: 2px solid #fbc02d !important; }
        .tuile-amenag { background: var(--amenag) !important; border: 2px solid #ff5722 !important; }
        .tuile-batiment { background: var(--batiment) !important; border: 2px solid #263238 !important; color: white; }
        .has-serre { box-shadow: inset 0 0 15px rgba(3, 169, 244, 0.6); border: 3px solid #03a9f4 !important; background: var(--serre) !important; }
        .up-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
        .up-card { background: #f1f1f1; padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.75em; }
        .btn-up { width: 100%; font-size: 0.85em; cursor: pointer; margin-top: 4px; background: white; border: 1px solid #999; border-radius: 3px; font-weight: bold; }
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin-bottom: 5px; background: white; font-size: 0.75em; border-left: 4px solid var(--p1); }
        .scroll-area { flex: 1; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 4px; }
        .logs { height: 80px; background: var(--dark); color: #a5d6a7; padding: 8px; font-family: monospace; font-size: 0.7em; overflow-y: auto; border-radius: 6px; }
        .btn-action { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.72em; margin-bottom: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-cost { font-size: 0.8em; font-weight: normal; margin-top: 2px; opacity: 0.9; }
        button:disabled { background: #cfd8dc !important; color: #78909c !important; cursor: not-allowed !important; }
        .btn-reset { background: #ff5252; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 0.8em; }
        .btn-reset:hover { background: #d32f2f; }
        .market-preview { background: #fffde7; padding: 6px; border: 1px solid #ffd54f; border-radius: 6px; font-size: 0.72em; margin-bottom: 6px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 12px; width: 90%; max-width: 900px; }
        .rayon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .rayon { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .btn-jard-action { width: 100%; margin-bottom: 5px; padding: 6px; background: #e0e0e0; border: 1px solid #999; border-radius: 4px; font-weight: bold; }
        .jard-card { border: 2px solid #ddd; padding: 10px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; position: relative; background: white; }
        .price-tag { position: absolute; top: -8px; right: -8px; background: var(--gold); padding: 2px 6px; border-radius: 10px; font-size: 0.85em; font-weight: bold; border: 1px solid #b8860b; }
    </style>
</head>
<body>

<div class="main-game">
    <div class="hud">
        <div id="season-display">📅 Chargement...</div>
        <div>💰 <span id="res-money">0</span> | ⏳ <span id="res-time">0</span>/<span id="res-timemax">0</span>h</div>
        <div>💩 Compost: <span id="res-compost" class="res-pill">0</span></div>
        <div id="meteo-display" style="color:#1565c0;">🎲 --</div>
        <button class="btn-reset" onclick="confirmReset()" title="Remettre la partie à zéro pour TOUS les joueurs">🧹 Reset</button>
    </div>
    <div id="ravageur-alert" style="background:#ffebee; color:#c62828; padding:5px; font-size:0.8em; text-align:center; display:none; border-radius:5px; margin-bottom:5px;"></div>
    <div class="farm-grid" id="farm-grid"></div>
    <div class="logs" id="game-logs">> Session connectée.</div>
    <div id="action-buttons-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-top:10px;"></div>
</div>

<div class="sidebar">
    <h3>⚙️ Améliorations</h3>
    <div class="up-grid" id="up-grid"></div>
    <h3>🛒 Jardinerie (En Vitrine)</h3>
    <div class="market-preview" id="market-preview"></div>
    <div id="jard-buttons-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
    <h3>🎒 Ma Main</h3>
    <div class="scroll-area" id="player-hand"></div>
</div>

<div class="modal-overlay" id="jardinerie-modal">
    <div class="modal-content" id="modal-content-inner"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
        authDomain: "main-verte-72483.firebaseapp.com",
        databaseURL: "https://main-verte-72483-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "main-verte-72483",
        storageBucket: "main-verte-72483.firebasestorage.app",
        messagingSenderId: "633454274346",
        appId: "1:633454274346:web:7261efcfe1b9cecdd6e053",
        measurementId: "G-5EWS2ZMBCV"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("game-session-001");

    const DECKS = {
        C: [
            { nom: "Radis", prix: 0, e: 1, s: 1, t: 1, g: 3, cat: 'L', semis: ['P','E','A','H'], rec: ['P','E','A','H'] },
            { nom: "Carotte", prix: 1, e: 4, s: 2, t: 1, g: 6, cat: 'L', semis: ['P','E'], rec: ['A','H'] },
            { nom: "Tomate", prix: 1, e: 6, s: 5, t: 1, g: 9, cat: 'L', semis: ['P'], rec: ['E','A'] },
            { nom: "Pommier", prix: 2, e: 12, s: 5, t: 3, g: 15, cat: 'A', semis: ['A','H'], rec: ['E','A'] }
        ],
        S: [{ nom: "Fumier", prix: 2, t: 1, cat: 'Soutien', desc: "+2💩 Compost" }],
        A: [{ nom: "Hérisson", prix: 2, t: 1, cat: 'Auxiliaire', prot: "Limaces" }]
    };
    const UP_NAMES = ["Agrandissement", "Efficacité", "Formation", "Qualité Sol", "Microclimat", "Bricoleur", "Fidélité", "Pass VIP"];
    const ALL_SEASONS = ["P","E","A","H"];

    let state = null;
    let localSelectedId = null;

    db.on("value", (snap) => {
        const val = snap.val();
        if(!val || !val.zones) initNewGame();
        else { state = val; render(); }
    });

    function sync() { if(state) db.set(state); }

    function initNewGame() {
        state = {
            annee: 1, saisonIdx: 0, money: 10, time: 10, timeMax: 10, compost: 3,
            upgrades: Array(8).fill(1), hand: [], auxActifs: [],
            zones: Array(6).fill(null).map((_, i) => ({ id: i, type: i === 0 ? "LIFE" : null, culture: null, batiment: null })),
            market: { C: [draw('C'), draw('C')], S: [draw('S'), draw('S')], A: [draw('A'), draw('A')] },
            picksLeft: 0, modalOpen: false
        };
        addLog("🧹 Partie réinitialisée.");
        sync();
    }

    function confirmReset() {
        if(confirm("⚠️ ATTENTION : Cela va effacer la partie en cours pour tout le monde. Continuer ?")) {
            initNewGame();
        }
    }

    function draw(cat) { return {...DECKS[cat][Math.floor(Math.random()*DECKS[cat].length)]}; }
    function addLog(m) { const l = document.getElementById('game-logs'); l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; }

    function render() {
        if(!state) return;
        document.getElementById('res-money').innerText = state.money;
        document.getElementById('res-time').innerText = state.time;
        document.getElementById('res-timemax').innerText = state.timeMax;
        document.getElementById('res-compost').innerText = state.compost;
        document.getElementById('season-display').innerText = `📅 ${["Printemps","Été","Automne","Hiver"][state.saisonIdx]} - An ${state.annee}`;

        const grid = document.getElementById('farm-grid'); grid.innerHTML = "";
        state.zones.forEach(z => {
            const acc = z.id <= (state.upgrades[0] === 1 ? 3 : (state.upgrades[0] === 2 ? 4 : 5));
            const isS = z.batiment === 'SERRE';
            let tCl = z.type ? 'tuile-'+z.type.toLowerCase() : '';
            if(z.batiment && !isS) tCl = 'tuile-batiment';
            if(isS) tCl += ' has-serre';
            const d = document.createElement('div');
            d.className = `zone ${tCl} ${localSelectedId === z.id ? 'selected' : ''}`;
            d.style.opacity = acc ? "1" : "0.3";
            d.onclick = () => { if(acc) { localSelectedId = z.id; render(); } };
            if(z.id === 0) d.innerHTML = "🏠 MAISON";
            else if(!z.type) d.innerHTML = `ZONE ${z.id}${acc?'':'<br>🔒'}`;
            else {
                d.innerHTML = `<span style="font-size:0.7em; font-weight:bold;">${isS ? "SERRE" : (z.batiment || z.type)}</span>`;
                if(z.culture) {
                    d.innerHTML += `<br><b>${z.culture.nom}</b><br>💧${z.culture.eCur} ☀️${z.culture.sCur}`;
                    if(z.culture.eCur<=0 && z.culture.sCur<=0) d.innerHTML += `<br><button onclick="actionRecolter(${z.id})" style="background:var(--p1); color:white; border:none; padding:2px 5px; font-size:0.8em; cursor:pointer;" ${state.time<2?'disabled':''}>Récolter</button>`;
                }
            }
            grid.appendChild(d);
        });

        renderButtons();
        document.getElementById('market-preview').innerHTML = `🌾 <b>C:</b> ${state.market.C.map(c=>c.nom).join(', ')} | 🦊 <b>A:</b> ${state.market.A.map(c=>c.nom).join(', ')}`;
        const hDiv = document.getElementById('player-hand'); hDiv.innerHTML = "";
        if(state.hand) {
            state.hand.forEach((c, i) => {
                const cost = Math.max(0, (c.t||1) - (state.upgrades[2]-1));
                hDiv.innerHTML += `<div class="card"><b>${c.nom}</b><br><button onclick="playC(${i})" ${state.time<cost?'disabled':''}>Jouer (-${cost}h)</button></div>`;
            });
        }
        document.getElementById('jardinerie-modal').style.display = state.modalOpen ? 'flex' : 'none';
        if(state.modalOpen) renderJardModal();
    }

    function renderButtons() {
        const costT = state.upgrades[5] >= 2 ? (state.upgrades[5] === 3 ? 0 : 1) : 2;
        const btnCont = document.getElementById('action-buttons-container');
        btnCont.innerHTML = `
            <button class="btn-action" style="background:#4caf50" onclick="actT('P')" ${state.time<3||state.money<costT?'disabled':''}>🏗️ Potager <span class="btn-cost">-3h|-${costT}💰</span></button>
            <button class="btn-action" style="background:#fbc02d;color:#333" onclick="actT('V')" ${state.time<3||state.money<costT?'disabled':''}>🏗️ Verger <span class="btn-cost">-3h|-${costT}💰</span></button>
            <button class="btn-action" style="background:#ff5722" onclick="actN()" ${state.time<3||state.money<3?'disabled':''}>🌳 Nature <span class="btn-cost">-3h|-3💰</span></button>
            <button class="btn-action" style="background:#607d8b" onclick="actB()" ${state.time<4||state.money<3?'disabled':''}>🏠 Bâtiment <span class="btn-cost">-4h</span></button>
            <button class="btn-action" style="background:#2196f3" onclick="actArr()" ${state.time<1?'disabled':''}>💧 Arroser <span class="btn-cost">-1h</span></button>
            <button class="btn-action" style="background:#795548" onclick="actAmd()" ${state.time<1||state.compost<1?'disabled':''}>💩 Amender <span class="btn-cost">-1h</span></button>
            <button class="btn-action" style="background:#e53935; grid-column:span 2;" onclick="actFin()">💤 Fin de Saison</button>
        `;
        const redJ = state.upgrades[6]>=2?1:0;
        const jCont = document.getElementById('jard-buttons-container'); jCont.innerHTML = "";
        [[3,5],[2,3],[2,2],[1,1]].forEach((ex, i) => {
            const c = Math.max(0, ex[0]-redJ);
            jCont.innerHTML += `<button class="btn-action" style="background:#8d6e63" onclick="openJard(${c},${ex[1]})" ${state.time<c?'disabled':''}>📦 E${i+1} <span class="btn-cost">-${c}h|${ex[1]}p</span></button>`;
        });
        const upG = document.getElementById('up-grid'); upG.innerHTML = "";
        UP_NAMES.forEach((n, i) => {
            const cost = state.upgrades[i]===1?3:5;
            upG.innerHTML += `<div class="up-card"><b>${n}</b> L${state.upgrades[i]}<br><button class="btn-up" onclick="upgr(${i})" ${state.upgrades[i]>=3||state.time<cost?'disabled':''}>UP (-${cost}h)</button></div>`;
        });
    }

    // --- ACTIONS MODALE ---
    function openJard(h, p) { state.time -= h; state.picksLeft = p; state.modalOpen = true; sync(); }
    function renderJardModal() {
        const inner = document.getElementById('modal-content-inner');
        inner.innerHTML = `<div style="display:flex;justify-content:space-between;"><h2>🛒 Jardinerie</h2><b>Actions: ${state.picksLeft}</b></div><div class="rayon-grid"></div>`;
        const grid = inner.querySelector('.rayon-grid');
        ['C','S','A'].forEach(cat => {
            const r = document.createElement('div'); r.className = "rayon";
            r.innerHTML = `<h3>${cat}</h3><button class="btn-jard-action" onclick="jardP('${cat}')">❓ Pioche</button><button class="btn-jard-action" onclick="jardR('${cat}')">🔄 Flush</button><hr>`;
            state.market[cat].forEach((c, idx) => {
                const can = state.money >= c.prix;
                const d = document.createElement('div'); d.className = "jard-card";
                d.style.opacity = can ? "1" : "0.4";
                d.innerHTML = `${c.prix>0?`<div class="price-tag">${c.prix}💰</div>`:''}<b>${c.nom}</b>`;
                d.onclick = () => { if(can) { state.money -= c.prix; if(!state.hand) state.hand=[]; state.hand.push(c); state.market[cat].splice(idx,1); if(state.upgrades[6]>=3) state.market[cat].push(draw(cat)); consm(); } };
                r.appendChild(d);
            });
            grid.appendChild(r);
        });
    }
    function jardP(cat) { const c = draw(cat); if(c.prix > 0 && state.money >= c.prix) { state.money -= c.prix; if(!state.hand) state.hand=[]; state.hand.push(c); } else if(c.prix === 0) { if(!state.hand) state.hand=[]; state.hand.push(c); } consm(); }
    function jardR(cat) { state.market[cat] = [draw(cat), draw(cat)]; consm(); }
    function consm() { state.picksLeft--; if(state.picksLeft <= 0) { state.modalOpen = false; ['C','S','A'].forEach(cat => { while(state.market[cat].length<2) state.market[cat].push(draw(cat)); }); } sync(); }

    // --- ACTIONS JEU ---
    function actT(t) { if(!localSelectedId || localSelectedId === 0) return; const cost = state.upgrades[5] >= 2 ? (state.upgrades[5] === 3 ? 0 : 1) : 2; state.money -= cost; state.time -= 3; state.zones[localSelectedId].type = (t==='P'?'POTAGER':'VERGER'); sync(); }
    function actN() { if(!localSelectedId) return; state.money -= 3; state.time -= 3; state.zones[localSelectedId].type = 'AMÉNAGEMENT'; sync(); }
    function actB() { const z = state.zones[localSelectedId]; if(!z || z.batiment) return; const ch = prompt("1: Serre(3💰) Potager | 2: Composteur(4💰) | 3: Local(5💰)"); if(ch==="1" && z.type==="POTAGER" && state.money>=3) { state.money-=3; state.time-=4; z.batiment="SERRE"; } else if(ch==="2" && state.money>=4) { state.money-=4; state.time-=4; z.batiment="COMPOSTEUR"; } else if(ch==="3" && state.money>=5) { state.money-=5; state.time-=4; z.batiment="LOCAL OUTILS"; } sync(); }
    function actArr() { const z = state.zones[localSelectedId]; if(z && z.culture) { state.time -= 1; z.culture.eCur = Math.max(0, z.culture.eCur-2); sync(); } }
    function actAmd() { const z = state.zones[localSelectedId]; if(z && z.culture) { state.time -= 1; state.compost -= 1; z.culture.amd = (z.culture.amd||0)+1; sync(); } }
    function upgr(i) { const cost = state.upgrades[i]===1?3:5; state.time -= cost; state.upgrades[i]++; if(i===1) state.timeMax += 4; sync(); }
    function actionRecolter(id) { const z = state.zones[id]; state.time -= 2; state.money += (z.culture.g + (state.upgrades[3]-1) + (z.culture.amd||0)); z.culture = null; sync(); }
    function playC(idx) { const c = state.hand[idx]; const cost = Math.max(0, (c.t||1)-(state.upgrades[2]-1)); const z = state.zones[localSelectedId]; if(c.cat==='Auxiliaire'){ state.time-=cost; if(!state.auxActifs) state.auxActifs=[]; state.auxActifs.push(c.prot); state.hand.splice(idx,1); } else if(c.cat==='Soutien'){ state.time-=cost; if(c.nom==="Fumier") state.compost+=2; state.hand.splice(idx,1); } else { if(!z || z.culture || (c.cat==='L'&&z.type!=='POTAGER') || (c.cat==='A'&&z.type!=='VERGER')) return; state.time-=cost; z.culture={...c, eCur:c.e, sCur:c.s, amd:0}; state.hand.splice(idx,1); } sync(); }
    function actFin() { state.saisonIdx++; if(state.saisonIdx > 3) { state.saisonIdx = 0; state.annee++; } state.zones.forEach(z => { if(z && z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur-2); z.culture.sCur = Math.max(0, z.culture.sCur-1); }}); state.time = state.timeMax; state.compost++; sync(); }
</script>
</body>
</html>
