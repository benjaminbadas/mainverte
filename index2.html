<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - V7.2 Logs Partagés</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --p1: #2e7d32; --bg: #f4f7f1; --potager: #81c784; --verger: #fff176; --amenag: #ffccbc; --batiment: #455a64; --dark: #263238; --gold: #ffd700; --serre: #e1f5fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main-game { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .sidebar { width: 420px; background: white; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; overflow-y: auto;}
        .hud { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; font-weight: bold; font-size: 0.9em; }
        .farm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #d7ccc8; padding: 10px; border-radius: 12px; }
        .zone { min-height: 140px; background: #efebe9; border: 2px dashed #bcaaa4; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 0.75em; cursor: pointer; text-align: center; }
        .zone.selected { border: 3px solid #ff9800 !important; box-shadow: 0 0 8px rgba(255,152,0,0.4); }
        .tuile-potager { background: var(--potager) !important; border: 2px solid #2e7d32 !important; }
        .tuile-verger { background: var(--verger) !important; border: 2px solid #fbc02d !important; }
        .tuile-amenag { background: var(--amenag) !important; border: 2px solid #ff5722 !important; }
        .tuile-batiment { background: var(--batiment) !important; border: 2px solid #263238 !important; color: white; }
        .has-serre { box-shadow: inset 0 0 15px rgba(3, 169, 244, 0.6); border: 3px solid #03a9f4 !important; background: var(--serre) !important; }
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 6px; margin-bottom: 4px; background: white; font-size: 0.75em; border-left: 4px solid var(--p1); cursor: help; position: relative;}
        .btn-action { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.75em; margin-bottom: 3px; }
        .res-pill { background: #e8f5e9; padding: 2px 6px; border-radius: 10px; color: var(--p1); border: 1px solid var(--p1); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 15px; border-radius: 12px; width: 95%; max-width: 1000px; max-height: 90vh; overflow-y: auto; }
        .rayon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .rayon { background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px solid #ccc; }
        .btn-jard-action { width: 100%; margin-bottom: 5px; padding: 4px; font-size: 0.8em; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
        .jard-card { border: 2px solid #ddd; padding: 6px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; background: white; position: relative; font-size: 0.85em; }
        .price-tag { position: absolute; top: -6px; right: -6px; background: var(--gold); padding: 1px 5px; border-radius: 8px; font-size: 0.8em; font-weight: bold; border: 1px solid #b8860b; }
        .alert-rav { background: #ffebee; color: #c62828; padding: 4px; border-radius: 4px; font-size: 0.75em; margin-bottom: 5px; border: 1px solid #ef9a9a; text-align: center; font-weight: bold;}
        button:disabled { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; }
        .logs { height: 95px; background: var(--dark); color: #a5d6a7; padding: 8px; font-family: monospace; font-size: 0.75em; overflow-y: auto; border-radius: 6px; margin-top:5px;}
    </style>
</head>
<body>

<div class="main-game">
    <div class="hud">
        <div id="season-display">📅 Saison...</div>
        <div title="Cagnotte Commune / Heures Restantes">💰 <span id="res-money">0</span> | ⏳ <span id="res-time">0</span>/<span id="res-timemax">10</span>h</div>
        <div title="Stock de Compost">💩 <span id="res-compost" class="res-pill">0</span></div>
        <div id="meteo-display" title="Météo actuelle (Réduit les besoins)" style="background:#e3f2fd; padding:3px 10px; border-radius:10px;">🎲 --</div>
        <button onclick="confirmReset()" style="background:#ff5252; color:white; border:none; border-radius:4px; padding:3px 6px; cursor:pointer;">🧹 Reset</button>
    </div>
    
    <div id="ravageur-zone" class="alert-rav" style="display:none;"></div>
    <div id="aux-tray" style="display:none; gap:5px; margin-bottom:8px; background:#e3f2fd; padding:5px; border-radius:5px; border:1px solid #90caf9; flex-wrap:wrap; font-size:0.8em; color:#1565c0;"></div>
    
    <div class="farm-grid" id="farm-grid"></div>
    <div class="logs" id="game-logs"></div>
    <div id="action-buttons-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-top:10px;"></div>
</div>

<div class="sidebar">
    <div style="background:#f0f4f7; padding:8px; border-radius:6px; margin-bottom:10px; font-size:0.8em; text-align:center;">
        <b>🎴 Cartes restantes :</b> <span id="deck-count">C:0 | S:0 | A:0</span>
    </div>
    <h3 style="margin:0 0 5px 0;">⚙️ Améliorations</h3>
    <div id="up-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px; margin-bottom:10px;"></div>
    
    <h3 style="margin:0 0 5px 0;">🛒 Marché (Vitrine)</h3>
    <div id="market-preview" style="background:#fffde7; padding:6px; border:1px solid #ffd54f; border-radius:6px; font-size:0.75em; margin-bottom:6px;"></div>
    <div id="jard-buttons-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
    
    <h3 style="margin:10px 0 5px 0;">🎒 Ma Main</h3>
    <div id="player-hand" style="flex:1; overflow-y:auto;"></div>
</div>

<div class="modal-overlay" id="jardinerie-modal"><div class="modal-content" id="modal-content-inner"></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
        authDomain: "main-verte-72483.firebaseapp.com",
        databaseURL: "https://main-verte-72483-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "main-verte-72483",
        storageBucket: "main-verte-72483.firebasestorage.app",
        messagingSenderId: "633454274346",
        appId: "1:633454274346:web:7261efcfe1b9cecdd6e053"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("game-session-001");

    // --- LE DECK COMPLET (40+ Cartes) ---
    const DECK_MASTER = {
        C: [
            {nom:"Radis",p:0,e:1,s:1,t:1,g:3,cat:'L',sm:['P','E','A','H'],rc:['P','E','A','H']}, {nom:"Laitue",p:0,e:2,s:1,t:1,g:4,cat:'L',sm:['P','A'],rc:['P','E','A']}, 
            {nom:"Carotte",p:1,e:4,s:2,t:1,g:6,cat:'L',sm:['P','E'],rc:['A','H']}, {nom:"Tomate",p:1,e:6,s:5,t:1,g:9,cat:'L',sm:['P'],rc:['E','A']}, 
            {nom:"Courgette",p:1,e:5,s:4,t:1,g:8,cat:'L',sm:['P'],rc:['E','A']}, {nom:"Aubergine",p:2,e:7,s:6,t:1,g:11,cat:'L',sm:['P'],rc:['E','A']},
            {nom:"Poireau",p:1,e:4,s:2,t:1,g:6,cat:'L',sm:['P','A'],rc:['E','H']}, {nom:"Patate",p:1,e:3,s:4,t:1,g:8,cat:'L',sm:['P','E'],rc:['A','H']},
            {nom:"Pommier",p:3,e:12,s:6,t:3,g:18,cat:'A',sm:['A','H'],rc:['E','A']}, {nom:"Cerisier",p:3,e:10,s:6,t:3,g:18,cat:'A',sm:['A','H'],rc:['E']},
            {nom:"Fraise",p:2,e:3,s:4,t:1,g:8,cat:'A',sm:['P','A'],rc:['E']}, {nom:"Noisetier",p:2,e:8,s:4,t:3,g:12,cat:'A',sm:['A','H'],rc:['A']},
            {nom:"Épinard",p:0,e:2,s:1,t:1,g:4,cat:'L',sm:['P','A'],rc:['P','A','H']}, {nom:"Navet",p:1,e:3,s:2,t:1,g:5,cat:'L',sm:['P','A'],rc:['A','H']},
            {nom:"Oignon",p:1,e:2,s:3,t:1,g:6,cat:'L',sm:['P','A'],rc:['E','A']}, {nom:"Haricot",p:1,e:3,s:3,t:1,g:6,cat:'L',sm:['P','E'],rc:['E','A']},
            {nom:"Tournesol",p:1,e:3,s:6,t:1,g:7,cat:'F',sm:['P'],rc:['E','A']}, {nom:"Pleurote",p:2,e:6,s:0,t:1,g:8,cat:'M',sm:['A'],rc:['H']}
        ],
        S: [{nom:"Fumier",p:2,t:1,cat:'S',desc:'+2💩 Compost'}, {nom:"Purin d'Ortie",p:1,t:1,cat:'S',desc:'-4💧 (Zone)'}, {nom:"Corne Broyée",p:2,t:1,cat:'S',desc:'+2💰 récolte (Zone)'}, {nom:"Paillage",p:1,t:1,cat:'S',desc:'-2💧 -1☀️ (Zone)'}],
        A: [{nom:"Hérisson",p:2,t:1,cat:'X',prot:'Limaces'}, {nom:"Coccinelle",p:1,t:1,cat:'X',prot:'Pucerons'}, {nom:"Mésange",p:2,t:1,cat:'X',prot:'Carpocapses'}, {nom:"Crapaud",p:1,t:1,cat:'X',prot:'Campagnols'}]
    };
    const RAV_TYPES = [{n:"Limaces",d:3}, {n:"Pucerons",d:2}, {n:"Carpocapses",d:4}, {n:"Campagnols",d:4}];
    const UP_NAMES = ["Terrain", "Énergie", "Savoir", "Sol", "Climat", "Outils", "Vente", "VIP"];
    const ALL_SEASONS = ["P","E","A","H"];

    let state = null, localSelectedId = null;

    db.on("value", snap => {
        const val = snap.val();
        if(!val || !val.zones) initNewGame(); else { state = val; render(); }
    });

    function sync() { if(state) db.set(state); }

    // FONCTION DE LOG MULTIJOUEUR
    function addLog(msg) {
        if(!state.gameLogs) state.gameLogs = [];
        state.gameLogs.unshift("> " + msg);
        if(state.gameLogs.length > 20) state.gameLogs.pop(); // Garde les 20 derniers logs
    }

    function initNewGame() {
        state = {
            annee: 1, saisonIdx: 0, money: 10, time: 10, timeMax: 10, compost: 3,
            upgrades: Array(8).fill(1), hand: [], auxActifs: [],
            zones: Array(6).fill(null).map((_, i) => ({ id: i, type: i === 0 ? "LIFE" : null, culture: null, batiment: null })),
            decks: JSON.parse(JSON.stringify(DECK_MASTER)), market: { C: [], S: [], A: [] },
            picksLeft: 0, modalOpen: false, currentMeteo: {p:0, s:0}, currentRav: null,
            gameLogs: ["> Partie initialisée."]
        };
        ['C','S','A'].forEach(cat => { for(let i=0;i<2;i++) { let d = draw(cat); if(d) state.market[cat].push(d); } });
        sync();
    }

    function draw(cat) {
        if(!state.decks[cat] || state.decks[cat].length === 0) return null;
        return state.decks[cat].splice(Math.floor(Math.random()*state.decks[cat].length), 1)[0];
    }

    function render() {
        if(!state) return;
        const setTxt = (id, txt) => { const el = document.getElementById(id); if(el) el.innerText = txt; };
        setTxt('res-money', state.money); setTxt('res-time', state.time); setTxt('res-timemax', state.timeMax); setTxt('res-compost', state.compost);
        setTxt('season-display', `📅 ${["Printemps","Été","Automne","Hiver"][state.saisonIdx]} - An ${state.annee}`);
        setTxt('meteo-display', `🌧️ ${state.currentMeteo.p} | ☀️ ${state.currentMeteo.s}`);
        setTxt('deck-count', `C:${(state.decks.C||[]).length} | S:${(state.decks.S||[]).length} | A:${(state.decks.A||[]).length}`);

        // Rendu Logs
        const logBox = document.getElementById('game-logs');
        if(logBox && state.gameLogs) logBox.innerHTML = state.gameLogs.map(l => `<div>${l}</div>`).join('');

        const rZone = document.getElementById('ravageur-zone');
        if(state.currentRav) { rZone.innerText = `⚠️ RAVAGEUR : ${state.currentRav.n} actif ! (-${state.currentRav.d}💰)`; rZone.style.display = 'block'; }
        else rZone.style.display = 'none';

        const tray = document.getElementById('aux-tray');
        if(state.auxActifs && state.auxActifs.length > 0) {
            tray.style.display="flex"; tray.innerHTML = '<b>🛡️ Boucliers Actifs : </b> ' + state.auxActifs.map(a => `<span style="background:white; padding:2px 4px; border-radius:4px; margin-left:4px;">🦊 Anti-${a}</span>`).join('');
        } else tray.style.display="none";

        const grid = document.getElementById('farm-grid'); grid.innerHTML = "";
        state.zones.forEach(z => {
            const acc = z.id <= (state.upgrades[0] === 1 ? 3 : (state.upgrades[0] === 2 ? 4 : 5));
            const isS = z.batiment === 'SERRE';
            const d = document.createElement('div');
            d.className = `zone ${z.type ? 'tuile-'+z.type.toLowerCase() : ''} ${z.batiment && !isS ? 'tuile-batiment' : ''} ${isS ? 'has-serre' : ''} ${localSelectedId === z.id ? 'selected' : ''}`;
            d.style.opacity = acc ? "1" : "0.3";
            d.onclick = () => { if(acc) { localSelectedId = z.id; render(); } };
            
            if(z.id === 0) { d.innerHTML = "🏠 MAISON"; d.title = "La maison principale."; }
            else if(!z.type) { d.innerHTML = `ZONE ${z.id}${acc?'':'<br>🔒'}`; d.title = acc ? "Zone vierge. Aménagez-la." : "Zone verrouillée."; }
            else {
                d.innerHTML = `<b>${isS ? "SERRE" : (z.batiment || z.type)}</b>`;
                if(z.culture) {
                    d.innerHTML += `<br>${z.culture.nom}<br>💧${z.culture.eCur} ☀️${z.culture.sCur}`;
                    d.title = `${z.culture.nom}\nBesoins actuels : ${z.culture.eCur}💧 | ${z.culture.sCur}☀️\nGain espéré : ${z.culture.g + (state.upgrades[3]-1) + (z.culture.amd||0)}💰`;
                    if(z.culture.eCur <= 0 && z.culture.sCur <= 0) {
                        d.innerHTML += `<br><button onclick="actionRecolter(${z.id})" style="background:var(--p1); color:white; border:none; padding:4px 8px; cursor:pointer; border-radius:4px; margin-top:4px;" title="Récolter (-2h)" ${state.time<2?'disabled':''}>🧺 Récolter</button>`;
                    }
                } else d.title = `${isS ? "Serre (sur Potager)" : z.type}. Prêt pour un semis.`;
            }
            grid.appendChild(d);
        });

        const prev = document.getElementById('market-preview');
        if(prev && state.market) {
            prev.innerHTML = `
                🌾 ${(state.market.C||[]).map(c=>c.nom).join(', ')||'Vidé'}<br>
                🛠️ ${(state.market.S||[]).map(c=>c.nom).join(', ')||'Vidé'}<br>
                🦊 ${(state.market.A||[]).map(c=>c.nom).join(', ')||'Vidé'}
            `;
        }

        const hDiv = document.getElementById('player-hand'); hDiv.innerHTML = "";
        (state.hand || []).forEach((c, i) => {
            const cost = Math.max(0, (c.t||1) - (state.upgrades[2]-1));
            const card = document.createElement('div'); card.className = "card";
            card.innerHTML = `<b>${c.nom}</b><br><span style="font-size:0.9em;">${c.cat==='S'?c.desc:(c.cat==='X'?c.prot:'💧'+c.e+' ☀️'+c.s)}</span><br><button onclick="playC(${i})" style="width:100%; margin-top:4px; padding:3px; cursor:pointer;" ${state.time<cost?'disabled':''}>Jouer (-${cost}h)</button>`;
            card.title = c.cat === 'L' || c.cat === 'A' ? `Semis : ${c.sm.join(',')}\nRécolte : ${c.rc.join(',')}\nGain : ${c.g}💰` : `Effet : ${c.desc || c.prot}`;
            hDiv.appendChild(card);
        });

        renderButtons();
        document.getElementById('jardinerie-modal').style.display = state.modalOpen ? 'flex' : 'none';
        if(state.modalOpen) renderJardModal();
    }

    function renderButtons() {
        const costT = state.upgrades[5] >= 2 ? (state.upgrades[5] === 3 ? 0 : 1) : 2;
        document.getElementById('action-buttons-container').innerHTML = `
            <button class="btn-action" style="background:#4caf50" onclick="actT('POTAGER')" title="Aménage un Potager (pour les Légumes L)" ${state.time<3||state.money<costT?'disabled':''}>🏗️ Potager (-${costT}💰)</button>
            <button class="btn-action" style="background:#fbc02d;color:#333" onclick="actT('VERGER')" title="Aménage un Verger (pour les Arbres A)" ${state.time<3||state.money<costT?'disabled':''}>🏗️ Verger (-${costT}💰)</button>
            <button class="btn-action" style="background:#ff5722" onclick="actT('AMÉNAGEMENT')" title="Aménage la Nature (Champignons/Bâtiments)" ${state.time<3||state.money<3?'disabled':''}>🌳 Nature (-3💰)</button>
            <button class="btn-action" style="background:#607d8b" onclick="actB()" title="Construit Serre, Composteur ou Local" ${state.time<4?'disabled':''}>🏠 Bâtiment</button>
            <button class="btn-action" style="background:#2196f3" onclick="actArr()" title="Arrose manuellement (-2💧) la culture." ${state.time<1?'disabled':''}>💧 Arroser (-1h)</button>
            <button class="btn-action" style="background:#795548" onclick="actAmd()" title="Amende (-1☀️) la culture avec du Compost." ${state.time<1||(state.compost||0)<1?'disabled':''}>☀️ Amender (-1h)</button>
            <button class="btn-action" style="background:#e53935; grid-column:span 2;" onclick="actFin()" title="Termine la saison.">💤 Fin de Saison</button>
        `;

        const upG = document.getElementById('up-grid'); upG.innerHTML = "";
        UP_NAMES.forEach((n, i) => {
            const cost = state.upgrades[i]===1?3:5;
            upG.innerHTML += `<div style="font-size:0.7em; background:#fafafa; padding:4px; border:1px solid #ddd; border-radius:4px;"><b>${n}</b> L${state.upgrades[i]} <button onclick="upgr(${i})" style="float:right;" ${state.upgrades[i]>=3||state.time<cost?'disabled':''}>UP</button></div>`;
        });

        const jCont = document.getElementById('jard-buttons-container'); jCont.innerHTML = "";
        const redJ = state.upgrades[6]>=2?1:0;
        [[3,5],[2,3],[2,2],[1,1]].forEach((ex, i) => {
            const c = Math.max(0, ex[0]-redJ);
            jCont.innerHTML += `<button class="btn-action" style="background:#8d6e63" onclick="openJard(${c},${ex[1]})" title="Va à la Jardinerie." ${state.time<c?'disabled':''}>📦 Empl. ${i+1} (${ex[1]} Cartes)</button>`;
        });
    }

    // --- JARDINERIE MODALE ---
    function openJard(h, p) { state.time -= h; state.picksLeft = p; state.modalOpen = true; addLog(`📦 Voyage à la Jardinerie (${p} actions).`); sync(); }
    
    function renderJardModal() {
        const inner = document.getElementById('modal-content-inner');
        inner.innerHTML = `<div style="display:flex;justify-content:space-between; align-items:center;"><h2>🛒 Jardinerie</h2><div style="font-size:1.2em; color:#d32f2f;"><b>Actions: ${state.picksLeft}</b> | 💰 ${state.money}</div></div><div class="rayon-grid"></div>`;
        ['C','S','A'].forEach(cat => {
            const r = document.createElement('div'); r.className = "rayon";
            r.innerHTML = `<h3>${cat==='C'?'🌾 Cultures':(cat==='S'?'🛠️ Soutiens':'🦊 Auxiliaires')}</h3>
                <button class="btn-jard-action" onclick="jardP('${cat}')">🎲 Pioche Aveugle</button>
                <button class="btn-jard-action" onclick="jardR('${cat}')">🔄 Renouveler</button><hr>`;
            (state.market[cat] || []).forEach((c, idx) => {
                const can = state.money >= c.p;
                const d = document.createElement('div'); d.className = "jard-card"; d.style.opacity = can?"1":"0.4";
                d.innerHTML = `<div class="price-tag">${c.p}💰</div><b>${c.nom}</b><br><small>${c.cat==='S'?c.desc:(c.cat==='X'?c.prot:'💧'+c.e+' ☀️'+c.s)}</small>`;
                d.onclick = () => { if(can) { state.money-=c.p; if(!state.hand) state.hand=[]; state.hand.push(c); state.market[cat].splice(idx,1); addLog(`🛒 Achat : ${c.nom}`); consm(); } };
                r.appendChild(d);
            });
            inner.querySelector('.rayon-grid').appendChild(r);
        });
    }

    function jardP(cat) { const c = draw(cat); if(c) { if(c.p <= state.money) { if(confirm(`Tiré : ${c.nom} (${c.p}💰). L'acheter ?`)) { state.money-=c.p; if(!state.hand) state.hand=[]; state.hand.push(c); addLog(`🛒 Pioche : ${c.nom}`); consm(); } else { consm(); } } else { alert(`Tiré : ${c.nom}. Pas assez de sous !`); consm(); } } }
    function jardR(cat) { state.market[cat] = []; for(let i=0; i<2; i++) { let d = draw(cat); if(d) state.market[cat].push(d); } addLog(`🔄 Rayon renouvelé.`); consm(); }
    function consm() { state.picksLeft--; if(state.picksLeft<=0) { state.modalOpen=false; ['C','S','A'].forEach(cat => { while((state.market[cat]||[]).length<2) { let c = draw(cat); if(c) state.market[cat].push(c); else break; } }); } sync(); }

    // --- ACTIONS JEU (AVEC LOGS) ---
    function actT(t) { if(!localSelectedId || localSelectedId===0) return alert("Sélectionnez une zone !"); const cost = state.upgrades[5]>=2 ? (state.upgrades[5]===3?0:1) : 2; state.money -= (t==='AMÉNAGEMENT'?3:cost); state.time -= 3; state.zones[localSelectedId].type = t; addLog(`🏗️ Zone ${localSelectedId} aménagée en ${t}.`); sync(); }
    function actB() { 
        const z = state.zones[localSelectedId]; if(!z || z.batiment) return alert("Zone invalide.");
        const ch = prompt("1: Serre (3💰) sur Potager\n2: Composteur (4💰)\n3: Local Outils (5💰)");
        if(ch==="1" && z.type==="POTAGER") { if(state.money<3) return; state.money-=3; state.time-=4; z.batiment="SERRE"; addLog("🏠 Serre construite."); }
        else if(ch==="2" && (z.type==="POTAGER"||z.type==="AMÉNAGEMENT")) { if(state.money<4) return; state.money-=4; state.time-=4; z.batiment="COMPOSTEUR"; addLog("🏠 Composteur construit."); }
        else if(ch==="3" && (z.type==="POTAGER"||z.type==="AMÉNAGEMENT")) { if(state.money<5) return; state.money-=5; state.time-=4; z.batiment="LOCAL OUTILS"; addLog("🏠 Local Outils construit."); }
        sync(); 
    }
    function actArr() { const z = state.zones[localSelectedId]; if(z && z.culture) { state.time--; z.culture.eCur = Math.max(0, z.culture.eCur-2); addLog(`💧 Arrosage manuel sur ${z.culture.nom}.`); sync(); } }
    function actAmd() { const z = state.zones[localSelectedId]; if(z && z.culture && state.compost>0) { state.time--; state.compost--; z.culture.sCur = Math.max(0, z.culture.sCur-1); addLog(`☀️ Amendement sur ${z.culture.nom}.`); sync(); } }
    function upgr(i) { state.time -= (state.upgrades[i]===1?3:5); state.upgrades[i]++; if(i===1) state.timeMax += 4; addLog(`⚙️ Amélioration : ${UP_NAMES[i]} niveau ${state.upgrades[i]}`); sync(); }
    function actionRecolter(id) { const z = state.zones[id]; if(state.time<2) return; state.time-=2; state.money += (z.culture.g + (state.upgrades[3]-1) + (z.culture.amd||0)); addLog(`🧺 Récolte : ${z.culture.nom} vendue !`); z.culture = null; sync(); }

    function playC(idx) { 
        const c = state.hand[idx], z = state.zones[localSelectedId], cost = Math.max(0, (c.t||1)-(state.upgrades[2]-1));
        
        if(c.cat === 'X') { 
            state.time-=cost; if(!state.auxActifs) state.auxActifs=[]; state.auxActifs.push(c.prot); 
            state.hand.splice(idx,1); addLog(`🦊 Auxiliaire Anti-${c.prot} activé.`);
        } 
        else if(c.cat === 'S') { 
            state.time-=cost; 
            if(c.nom.includes("Fumier")) { state.compost=(state.compost||0)+2; addLog("✨ Soutien : +2 Compost"); }
            if(c.nom.includes("Ortie") && z && z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur-4); addLog("✨ Soutien : Arrosage Express !"); }
            if(c.nom.includes("Paillage") && z && z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur-2); z.culture.sCur = Math.max(0, z.culture.sCur-1); addLog("✨ Soutien : Paillage posé."); }
            if(c.nom.includes("Corne") && z && z.culture) { z.culture.amd = (z.culture.amd||0)+2; addLog("✨ Soutien : Corne Broyée appliquée."); }
            state.hand.splice(idx,1); 
        } 
        else { 
            if(!z || !z.type) return alert("Aménagez la zone d'abord !");
            if(z.culture) return alert("Zone occupée !");
            if(c.cat==='L' && z.type!=='POTAGER') return alert("Les Légumes (L) vont dans un Potager !");
            if(c.cat==='A' && z.type!=='VERGER') return alert("Les Arbres (A) vont dans un Verger !");
            if(c.cat==='F' && z.type==='AMÉNAGEMENT') return alert("Les Fleurs vont dans un Potager/Verger !");
            if(c.cat==='M' && z.type!=='AMÉNAGEMENT') return alert("Les Champignons (M) vont dans la Nature !");
            
            let curS = ALL_SEASONS[state.saisonIdx];
            let smValid = z.batiment === 'SERRE' ? c.sm.map(s => ALL_SEASONS[(ALL_SEASONS.indexOf(s)+3)%4]).concat(c.sm) : c.sm;
            if(!smValid.includes(curS)) return alert(`Saison incorrecte ! Semis en : ${smValid.join(', ')}`);

            state.time-=cost; z.culture={...c, eCur:c.e, sCur:c.s, amd:0}; state.hand.splice(idx,1); addLog(`🌱 Semis : ${c.nom}`);
        }
        sync(); 
    }

    // --- LE MOTEUR DE SAISON CORRIGÉ (REFERENCE ERROR) ---
    function actFin() {
        state.saisonIdx++; if(state.saisonIdx > 3) { state.saisonIdx = 0; state.annee++; }
        let curS = ALL_SEASONS[state.saisonIdx];
        addLog(`💤 Fin de saison. Bienvenue en ${curS} !`);

        let p = Math.floor(Math.random()*3)+1 + (state.upgrades[4]>1?1:0); 
        let s = Math.floor(Math.random()*2)+1 + (state.upgrades[4]>1?1:0);
        state.currentMeteo = {p, s};
        
        state.zones.forEach(z => { 
            if(z && z.culture) { 
                z.culture.eCur = Math.max(0, z.culture.eCur - p); 
                z.culture.sCur = Math.max(0, z.culture.sCur - s); 
                
                let isS = z.batiment === 'SERRE';
                let c = z.culture; // LA CORRECTION EST ICI
                let survie = isS ? c.rc.map(s => ALL_SEASONS[(ALL_SEASONS.indexOf(s)+3)%4]).concat(c.rc).concat(c.sm) : c.rc.concat(c.sm);
                if(!survie.includes(curS)) { addLog(`🥀 ${c.nom} est mort (hors-saison).`); z.culture = null; }
            } 
        });

        if(Math.random() < 0.3) { 
            state.currentRav = RAV_TYPES[Math.floor(Math.random()*RAV_TYPES.length)]; 
            if(!state.auxActifs || !state.auxActifs.includes(state.currentRav.n)) {
                state.money = Math.max(0, state.money - state.currentRav.d); 
                addLog(`⚠️ Dégâts : ${state.currentRav.n} (-${state.currentRav.d}💰)`);
            } else addLog(`🛡️ Bouclier efficace contre ${state.currentRav.n} !`);
        } else state.currentRav = null;

        state.time = state.timeMax; state.compost=(state.compost||0)+1; sync();
    }
    
    function confirmReset() { if(confirm("Voulez-vous réinitialiser ?")) initNewGame(); }
</script>
