<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - V5.1 Multijoueur Intégral</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --p1: #2e7d32; --bg: #f4f7f1; --potager: #81c784; --verger: #fff176; --amenag: #ffccbc; --batiment: #455a64; --dark: #263238; --gold: #ffd700; --serre: #e1f5fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .main-game { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .sidebar { width: 420px; background: white; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; }
        .hud { display: flex; justify-content: space-between; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; font-weight: bold; }
        .farm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #d7ccc8; padding: 10px; border-radius: 12px; }
        .zone { min-height: 155px; background: #efebe9; border: 2px dashed #bcaaa4; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 0.72em; cursor: pointer; text-align: center; }
        .zone.selected { border: 3px solid #ff9800 !important; box-shadow: 0 0 8px rgba(255,152,0,0.4); }
        .tuile-potager { background: var(--potager) !important; border: 2px solid #2e7d32 !important; }
        .tuile-verger { background: var(--verger) !important; border: 2px solid #fbc02d !important; }
        .tuile-amenag { background: var(--amenag) !important; border: 2px solid #ff5722 !important; }
        .tuile-batiment { background: var(--batiment) !important; border: 2px solid #263238 !important; color: white; }
        .has-serre { box-shadow: inset 0 0 15px rgba(3, 169, 244, 0.6); border: 3px solid #03a9f4 !important; background: var(--serre) !important; }
        .up-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
        .up-card { background: #f1f1f1; padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.75em; cursor: help; }
        .btn-up { width: 100%; font-size: 0.85em; cursor: pointer; margin-top: 4px; background: white; border: 1px solid #999; border-radius: 3px; font-weight: bold; }
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin-bottom: 5px; background: white; font-size: 0.75em; cursor: help; position: relative; }
        .scroll-area { flex: 1; overflow-y: auto; border: 1px solid #eee; padding: 5px; border-radius: 4px; }
        .logs { height: 80px; background: var(--dark); color: #a5d6a7; padding: 8px; font-family: monospace; font-size: 0.7em; overflow-y: auto; border-radius: 6px; }
        .btn-action { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.72em; margin-bottom: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-action:hover:not(:disabled) { filter: brightness(1.1); }
        .btn-cost { font-size: 0.8em; font-weight: normal; margin-top: 2px; opacity: 0.9; }
        .res-pill { background: #e8f5e9; padding: 2px 8px; border-radius: 10px; color: var(--p1); border: 1px solid var(--p1); }
        button:disabled { background: #cfd8dc !important; color: #78909c !important; cursor: not-allowed !important; }
        .market-preview { background: #fffde7; padding: 6px; border: 1px solid #ffd54f; border-radius: 6px; font-size: 0.72em; margin-bottom: 6px; line-height: 1.4; }
        .aux-tray { display: flex; gap: 5px; margin-bottom: 8px; min-height: 25px; background: #e3f2fd; padding: 5px 10px; border-radius: 5px; border: 1px solid #90caf9; flex-wrap: wrap; align-items: center; }
        .aux-icon { background: white; border: 1px solid #90caf9; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; font-weight: bold; color: #1565c0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 12px; width: 90%; max-width: 900px; }
        .rayon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .rayon { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
        .jard-card { border: 2px solid #ddd; padding: 10px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; background: #fafafa; position: relative; }
        .price-tag { position: absolute; top: -8px; right: -8px; background: var(--gold); padding: 3px 6px; border-radius: 10px; font-size: 0.9em; font-weight: bold; border: 1px solid #b8860b; }
        .disabled-card { filter: grayscale(100%); opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="main-game">
    <div class="hud">
        <div id="season-display">📅 Saison...</div>
        <div>💰 <span id="res-money">0</span> | ⏳ <span id="res-time">0</span>/<span id="res-timemax">0</span>h</div>
        <div>💩 Compost: <span id="res-compost" class="res-pill">0</span></div>
        <div id="meteo-display" style="color:#1565c0;">🎲 --</div>
    </div>
    <div id="ravageur-alert" style="background:#ffebee; color:#c62828; padding:5px; font-size:0.8em; text-align:center; display:none; border-radius:5px; margin-bottom:5px;"></div>
    <div id="aux-tray" class="aux-tray" style="display:none;"></div>
    <div class="farm-grid" id="farm-grid"></div>
    <div class="logs" id="game-logs">> Initialisation multijoueur...</div>
    <div id="action-buttons-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-top:10px;"></div>
</div>

<div class="sidebar">
    <h3>⚙️ Améliorations</h3>
    <div class="up-grid" id="up-grid"></div>
    <h3>🛒 Jardinerie (En Vitrine)</h3>
    <div class="market-preview" id="market-preview"></div>
    <div id="jard-buttons-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
    <h3>🎒 Ma Main</h3>
    <div class="scroll-area" id="player-hand"></div>
</div>

<div class="modal-overlay" id="jardinerie-modal">
    <div class="modal-content" id="modal-content-inner"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
  authDomain: "main-verte-72483.firebaseapp.com",
  projectId: "main-verte-72483",
  storageBucket: "main-verte-72483.firebasestorage.app",
  messagingSenderId: "633454274346",
  appId: "1:633454274346:web:7261efcfe1b9cecdd6e053",
  measurementId: "G-5EWS2ZMBCV"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("la-main-verte-shared");

    // --- DATA STATIQUE ---
    const DECKS = {
        C: [
            { nom: "Radis", prix: 0, e: 1, s: 1, t: 1, g: 3, cat: 'L', semis: ['P','E','A','H'], rec: ['P','E','A','H'] },
            { nom: "Carotte", prix: 1, e: 4, s: 2, t: 1, g: 6, cat: 'L', semis: ['P','E'], rec: ['A','H'] },
            { nom: "Tomate", prix: 1, e: 6, s: 5, t: 1, g: 9, cat: 'L', semis: ['P'], rec: ['E','A'] },
            { nom: "Pommier", prix: 2, e: 12, s: 5, t: 3, g: 15, cat: 'A', semis: ['A','H'], rec: ['E','A'] },
            { nom: "Fraise", prix: 2, e: 3, s: 4, t: 1, g: 8, cat: 'A', semis: ['P','A'], rec: ['E'] }
        ],
        S: [
            { nom: "Purin d'Ortie", prix: 1, t: 1, cat: 'Soutien', desc: "Eau: -4💧" },
            { nom: "Fumier", prix: 2, t: 1, cat: 'Soutien', desc: "+2💩 Compost" }
        ],
        A: [
            { nom: "Hérisson", prix: 2, t: 1, cat: 'Auxiliaire', prot: "Limaces" },
            { nom: "Coccinelle", prix: 1, t: 1, cat: 'Auxiliaire', prot: "Pucerons" }
        ]
    };
    const UP_NAMES = ["Agrandissement", "Efficacité", "Formation", "Qualité Sol", "Microclimat", "Bricoleur", "Fidélité", "Pass VIP"];
    const UP_DESC = ["Zones 4-5", "+ Temps Max", "- Temps Semis", "+💰 Récolte", "+🎲 Météo", "-💰 Tuiles", "Jardinerie +", "Revente"];
    const RAV_LIST = [{n:"Limaces",d:3,c:'L'}, {n:"Pucerons",d:2,c:'L'}];
    const ALL_SEASONS = ["P","E","A","H"];

    let state = null;
    let localSelectedZoneId = null;

    // --- LOGIQUE MULTIJOUEUR ---
    db.on("value", (snap) => {
        state = snap.val();
        if(!state) initNewGame(); else render();
    });

    function sync() { db.set(state); }

    function initNewGame() {
        state = {
            annee: 1, saisonIdx: 0, money: 10, time: 10, timeMax: 10, compost: 3,
            upgrades: Array(8).fill(1), hand: [], auxActifs: [],
            zones: Array(6).fill(null).map((_, i) => ({ id: i, type: i === 0 ? "LIFE" : null, culture: null, batiment: null })),
            market: { C: [draw('C'), draw('C')], S: [draw('S'), draw('S')], A: [draw('A'), draw('A')] },
            picksLeft: 0, modalOpen: false
        };
        sync();
    }

    function draw(cat) { return {...DECKS[cat][Math.floor(Math.random()*DECKS[cat].length)]}; }
    function addLog(m) { const l = document.getElementById('game-logs'); l.innerHTML = `<div>> ${m}</div>` + l.innerHTML; }

    // --- RENDU ---
    function render() {
        if(!state) return;

        // HUD
        document.getElementById('res-money').innerText = state.money;
        document.getElementById('res-time').innerText = state.time;
        document.getElementById('res-timemax').innerText = state.timeMax;
        document.getElementById('res-compost').innerText = state.compost;
        document.getElementById('season-display').innerText = `📅 ${["Printemps","Été","Automne","Hiver"][state.saisonIdx]} - An ${state.annee}`;

        // Ravageurs & Auxiliaires
        const alertBox = document.getElementById('ravageur-alert');
        if(state.currentRav) { alertBox.style.display="block"; alertBox.innerText=`👾 RAVAGEUR : ${state.currentRav.n} actif !`; }
        else alertBox.style.display="none";

        const tray = document.getElementById('aux-tray');
        if(state.auxActifs && state.auxActifs.length > 0) {
            tray.style.display="flex"; tray.innerHTML = '🛡️ Actifs : ' + state.auxActifs.map(a => `<div class="aux-icon">🦊 ${a}</div>`).join('');
        } else tray.style.display="none";

        // Grille
        const grid = document.getElementById('farm-grid'); grid.innerHTML = "";
        state.zones.forEach(z => {
            const acc = z.id <= (state.upgrades[0] === 1 ? 3 : (state.upgrades[0] === 2 ? 4 : 5));
            const isS = z.batiment === 'SERRE';
            let tCl = z.type ? 'tuile-'+z.type.toLowerCase() : '';
            if(z.batiment && !isS) tCl = 'tuile-batiment';
            if(isS) tCl += ' has-serre';

            const d = document.createElement('div');
            d.className = `zone ${tCl} ${localSelectedZoneId === z.id ? 'selected' : ''}`;
            d.style.opacity = acc ? "1" : "0.3";
            d.onclick = () => { if(acc) { localSelectedZoneId = z.id; render(); } };
            
            if(z.id === 0) d.innerHTML = "🏠 MAISON";
            else if(!z.type) d.innerHTML = `ZONE ${z.id}${acc?'':'<br>🔒'}`;
            else {
                let txt = isS ? "POTAGER+SERRE" : (z.batiment || z.type);
                d.innerHTML = `<span style="font-size:0.7em; font-weight:bold;">${txt}</span>`;
                if(z.culture) {
                    d.innerHTML += `<br><b>${z.culture.nom}</b><br>💧${z.culture.eCur} ☀️${z.culture.sCur}`;
                    const r_val = calcSaisons(z.culture.rec, isS, false);
                    if(z.culture.eCur<=0 && z.culture.sCur<=0 && r_val.includes(ALL_SEASONS[state.saisonIdx])) {
                        d.innerHTML += `<br><button onclick="actionRecolter(${z.id})" style="background:var(--p1); color:white; border:none; padding:2px 5px; font-size:0.8em; cursor:pointer;" ${state.time<2?'disabled':''}>🧺 Récolter</button>`;
                    }
                }
            }
            grid.appendChild(d);
        });

        // Boutons actions
        const costT = state.upgrades[5] >= 2 ? (state.upgrades[5] === 3 ? 0 : 1) : 2;
        const btnCont = document.getElementById('action-buttons-container');
        btnCont.innerHTML = `
            <button class="btn-action" style="background:#4caf50" onclick="actT('P')" ${state.time<3||state.money<costT?'disabled':''}>🏗️ Potager <span class="btn-cost">-3h|-${costT}💰</span></button>
            <button class="btn-action" style="background:#fbc02d;color:#333" onclick="actT('V')" ${state.time<3||state.money<costT?'disabled':''}>🏗️ Verger <span class="btn-cost">-3h|-${costT}💰</span></button>
            <button class="btn-action" style="background:#ff5722" onclick="actN()" ${state.time<3||state.money<3?'disabled':''}>🌳 Nature <span class="btn-cost">-3h|-3💰</span></button>
            <button class="btn-action" style="background:#607d8b" onclick="actB()" ${state.time<4||state.money<3?'disabled':''}>🏠 Bâtiment <span class="btn-cost">-4h|-3💰+</span></button>
            <button class="btn-action" style="background:#2196f3" onclick="actArr()" ${state.time<1?'disabled':''}>💧 Arroser <span class="btn-cost">-1h</span></button>
            <button class="btn-action" style="background:#795548" onclick="actAmd()" ${state.time<1||state.compost<1?'disabled':''}>💩 Amender <span class="btn-cost">-1h|-1💩</span></button>
            <button class="btn-action" style="background:#e53935; grid-column:span 2;" onclick="actFin()">💤 Fin de Saison</button>
        `;

        // Jardinerie Vitrine
        const pDiv = document.getElementById('market-preview');
        pDiv.innerHTML = `🌾 <b>C:</b> ${state.market.C.map(c=>c.nom).join(', ')}<br>🛠️ <b>S:</b> ${state.market.S.map(c=>c.nom).join(', ')}<br>🦊 <b>A:</b> ${state.market.A.map(c=>c.nom).join(', ')}`;
        
        const redJ = state.upgrades[6]>=2?1:0;
        const jCont = document.getElementById('jard-buttons-container');
        jCont.innerHTML = "";
        [[3,5],[2,3],[2,2],[1,1]].forEach((ex, i) => {
            const c = Math.max(0, ex[0]-redJ);
            jCont.innerHTML += `<button class="btn-action" style="background:#8d6e63" onclick="openJard(${c},${ex[1]})" ${state.time<c?'disabled':''}>📦 Empl.${i+1} <span class="btn-cost">-${c}h|${ex[1]}p</span></button>`;
        });

        // Upgrades
        const upG = document.getElementById('up-grid'); upG.innerHTML = "";
        UP_NAMES.forEach((n, i) => {
            const cost = state.upgrades[i]===1?3:5;
            upG.innerHTML += `<div class="up-card" title="${UP_DESC[i]}"><b>${n}</b> L${state.upgrades[i]}<br><button class="btn-up" onclick="upgr(${i})" ${state.upgrades[i]>=3||state.time<cost?'disabled':''}>UP (-${cost}h)</button></div>`;
        });

        // Main
        const hDiv = document.getElementById('player-hand'); hDiv.innerHTML = "";
        state.hand.forEach((c, i) => {
            const cost = Math.max(0, c.t - (state.upgrades[2]-1));
            hDiv.innerHTML += `<div class="card"><b>${c.nom}</b><br><button onclick="playC(${i})" ${state.time<cost?'disabled':''}>Jouer (-${cost}h)</button></div>`;
        });

        // Modale si ouverte
        if(state.modalOpen) document.getElementById('jardinerie-modal').style.display = 'flex';
        else document.getElementById('jardinerie-modal').style.display = 'none';
        renderJardModal();
    }

    // --- LOGIQUE JARDINERIE MODALE ---
    function openJard(h, p) { state.time -= h; state.picksLeft = p; state.modalOpen = true; sync(); }
    
    function renderJardModal() {
        const inner = document.getElementById('modal-content-inner');
        if(!state.modalOpen) return;
        inner.innerHTML = `<div style="display:flex;justify-content:space-between;border-bottom:1px solid #ddd;padding-bottom:10px;margin-bottom:10px;"><h2>🛒 Jardinerie</h2><b>Actions: ${state.picksLeft} | 💰: ${state.money}</b></div><div class="rayon-grid"></div>`;
        const grid = inner.querySelector('.rayon-grid');
        ['C','S','A'].forEach(cat => {
            const r = document.createElement('div'); r.className = "rayon";
            r.innerHTML = `<h3>${cat==='C'?'🌾 Cultures':(cat==='S'?'🛠️ Soutiens':'🦊 Aux.')}</h3><button class="btn-jard-action" onclick="jardP('${cat}')">❓ Pioche Aveugle</button><button class="btn-jard-action" onclick="jardR('${cat}')">🔄 Renouveler Rayon</button><hr>`;
            state.market[cat].forEach((c, idx) => {
                const can = state.money >= c.prix;
                const d = document.createElement('div'); d.className = `jard-card ${can?'':'disabled-card'}`;
                d.innerHTML = `${c.prix>0?`<div class="price-tag">${c.prix}💰</div>`:''}<b>${c.nom}</b><br><small>${c.cat==='S'?c.desc:''}</small>`;
                d.onclick = () => { if(can) buyV(cat, idx); };
                r.appendChild(d);
            });
            grid.appendChild(r);
        });
    }

    function buyV(cat, idx) {
        const c = state.market[cat][idx]; state.money -= c.prix; state.hand.push(c); state.market[cat].splice(idx,1);
        if(state.upgrades[6]>=3) state.market[cat].push(draw(cat));
        consm();
    }
    function jardP(cat) {
        const c = draw(cat);
        if(c.prix > 0) {
            if(state.money >= c.prix && confirm(`Pioche: ${c.nom} (${c.prix}💰). Acheter ?`)) { state.money -= c.prix; state.hand.push(c); }
        } else state.hand.push(c);
        consm();
    }
    function jardR(cat) { state.market[cat] = [draw(cat), draw(cat)]; consm(); }
    function consm() {
        state.picksLeft--;
        if(state.picksLeft <= 0) {
            state.modalOpen = false;
            ['C','S','A'].forEach(cat => { while(state.market[cat].length<2) state.market[cat].push(draw(cat)); });
        }
        sync();
    }

    // --- ACTIONS JEU ---
    function actT(t) {
        if(localSelectedZoneId === null || localSelectedZoneId === 0) return;
        const cost = state.upgrades[5] >= 2 ? (state.upgrades[5] === 3 ? 0 : 1) : 2;
        state.money -= cost; state.time -= 3;
        state.zones[localSelectedZoneId].type = (t==='P'?'POTAGER':'VERGER');
        sync();
    }
    function actN() { if(!localSelectedZoneId) return; state.money -= 3; state.time -= 3; state.zones[localSelectedZoneId].type = 'AMÉNAGEMENT'; sync(); }
    function actB() {
        const z = state.zones[localSelectedZoneId]; if(!z || z.batiment) return;
        const ch = prompt("1: Serre (3💰) sur Potager\n2: Composteur (4💰) sur Potager/Nature\n3: Local (5💰) sur Potager/Nature");
        if(ch==="1" && z.type==="POTAGER" && state.money>=3) { state.money-=3; state.time-=4; z.batiment="SERRE"; }
        else if(ch==="2" && (z.type==="POTAGER"||z.type==="AMÉNAGEMENT") && state.money>=4) { state.money-=4; state.time-=4; z.batiment="COMPOSTEUR"; }
        else if(ch==="3" && (z.type==="POTAGER"||z.type==="AMÉNAGEMENT") && state.money>=5) { state.money-=5; state.time-=4; z.batiment="LOCAL OUTILS"; }
        sync();
    }
    function actArr() { const z = state.zones[localSelectedZoneId]; if(z && z.culture) { state.time -= 1; z.culture.eCur = Math.max(0, z.culture.eCur-2); sync(); } }
    function actAmd() { const z = state.zones[localSelectedZoneId]; if(z && z.culture) { state.time -= 1; state.compost -= 1; z.culture.amd = (z.culture.amd||0)+1; sync(); } }
    function upgr(i) { const cost = state.upgrades[i]===1?3:5; state.time -= cost; state.upgrades[i]++; if(i===1) state.timeMax += 4; sync(); }
    
    function playC(idx) {
        const c = state.hand[idx]; const cost = Math.max(0, c.t - (state.upgrades[2]-1));
        if(c.cat === 'Auxiliaire') { state.time -= cost; if(!state.auxActifs) state.auxActifs=[]; state.auxActifs.push(c.prot); state.hand.splice(idx,1); }
        else if(c.cat === 'Soutien') {
            const z = state.zones[localSelectedZoneId]; state.time -= cost;
            if(c.nom==="Fumier") state.compost+=2;
            if(c.nom.includes("Ortie") && z && z.culture) z.culture.eCur = Math.max(0, z.culture.eCur-4);
            state.hand.splice(idx,1);
        } else {
            const z = state.zones[localSelectedZoneId];
            if(!z || z.culture || (c.cat==='L'&&z.type!=='POTAGER') || (c.cat==='A'&&z.type!=='VERGER')) return;
            const s_v = calcSaisons(c.semis, z.batiment==='SERRE', true);
            if(!s_v.includes(ALL_SEASONS[state.saisonIdx])) return;
            state.time -= cost; z.culture = {...c, eCur:c.e, sCur:c.s, amd:0}; state.hand.splice(idx,1);
        }
        sync();
    }

    function actionRecolter(id) {
        const z = state.zones[id]; state.time -= 2;
        let g = z.culture.g + (state.upgrades[3]-1) + (z.culture.amd||0);
        if(state.currentRav && state.currentRav.c === z.culture.cat && !state.auxActifs.includes(state.currentRav.n)) g -= state.currentRav.d;
        state.money += Math.max(1, g); z.culture = null; sync();
    }

    function actFin() {
        state.saisonIdx++; if(state.saisonIdx > 3) { state.saisonIdx = 0; state.annee++; }
        let p = Math.floor(Math.random()*2)+1; let s = Math.floor(Math.random()*2);
        state.zones.forEach(z => { if(z.culture) { 
            z.culture.eCur = Math.max(0, z.culture.eCur-p); z.culture.sCur = Math.max(0, z.culture.sCur-s);
            const r_v = calcSaisons(z.culture.rec, z.batiment==='SERRE', false);
            const s_v = calcSaisons(z.culture.semis, z.batiment==='SERRE', true);
            if(!r_v.includes(ALL_SEASONS[state.saisonIdx]) && !s_v.includes(ALL_SEASONS[state.saisonIdx])) z.culture = null;
        }});
        state.currentRav = Math.random() > 0.5 ? RAV_LIST[Math.floor(Math.random()*RAV_LIST.length)] : null;
        state.time = state.timeMax; state.compost++; sync();
    }

    function calcSaisons(arr, isS, isSem) {
        if(!isS) return arr; let res = new Set(arr);
        arr.forEach(c => { let i = ALL_SEASONS.indexOf(c); if(isSem) res.add(ALL_SEASONS[(i+3)%4]); else res.add(ALL_SEASONS[(i+1)%4]); });
        return Array.from(res);
    }
</script>
