<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - V15.1 (Infos-Bulles)</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --p1: #2e7d32; --p2: #1565c0; --bg: #f4f7f1; --potager: #81c784; --verger: #fff176; --amenag: #ffccbc; --batiment: #455a64; --dark: #263238; --gold: #ffd700; --serre: #e1f5fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #lobby { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-lobby { background: var(--p1); color: white; border: none; padding: 12px 25px; font-size: 1.1em; border-radius: 8px; margin: 8px; cursor: pointer; width: 320px; transition: 0.2s; font-weight: bold;}
        .btn-lobby:hover { filter: brightness(1.2); transform: scale(1.05); }

        #game-over-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .score-box { background: white; color: #263238; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); min-width: 400px; }
        .score-row { display: flex; justify-content: space-between; font-size: 1.5em; margin: 15px 0; padding: 10px; background: #f0f4f7; border-radius: 8px; font-weight: bold; }
        .score-winner { color: var(--p1); font-size: 2em; margin-bottom: 20px; }

        .main-game { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .sidebar { width: 420px; background: white; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; overflow-y: auto;}
        
        .hud { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 5px; font-weight: bold; font-size: 0.9em; border-top: 4px solid var(--p1); }
        .hud-opp { background: #e3f2fd; padding: 6px 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8em; color: #1565c0; border: 1px solid #bbdefb; display: flex; justify-content: space-between; align-items: center;}
        
        .farm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #d7ccc8; padding: 10px; border-radius: 12px; }
        .zone { min-height: 140px; background: #efebe9; border: 2px dashed #bcaaa4; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 0.75em; cursor: pointer; text-align: center; transition: 0.2s; }
        .zone.selected { border: 3px solid #ff9800 !important; box-shadow: 0 0 10px rgba(255,152,0,0.6); transform: scale(1.02); z-index: 10;}
        .tuile-potager { background: var(--potager) !important; border: 2px solid #2e7d32 !important; }
        .tuile-verger { background: var(--verger) !important; border: 2px solid #fbc02d !important; }
        .tuile-amenag { background: var(--amenag) !important; border: 2px solid #ff5722 !important; }
        .tuile-batiment { background: var(--batiment) !important; border: 2px solid #263238 !important; color: white; }
        .has-serre { box-shadow: inset 0 0 15px rgba(3, 169, 244, 0.6); border: 3px solid #03a9f4 !important; background: var(--serre) !important; }
        
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 6px; margin-bottom: 4px; background: white; font-size: 0.75em; border-left: 4px solid var(--p1); cursor: help; position: relative;}
        .btn-action { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.75em; margin-bottom: 3px; transition: 0.2s; }
        .btn-action:hover:not(:disabled) { filter: brightness(1.1); }
        .res-pill { background: #e8f5e9; padding: 2px 6px; border-radius: 10px; color: var(--p1); border: 1px solid var(--p1); }
        button:disabled { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 15px; border-radius: 12px; width: 95%; max-width: 1000px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .rayon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .rayon { background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px solid #ccc; }
        .btn-jard-action { width: 100%; margin-bottom: 5px; padding: 4px; font-size: 0.8em; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
        .jard-card { border: 2px solid #ddd; padding: 6px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; background: white; position: relative; font-size: 0.85em; transition: 0.2s;}
        .price-tag { position: absolute; top: -6px; right: -6px; background: var(--gold); padding: 1px 5px; border-radius: 8px; font-size: 0.8em; font-weight: bold; border: 1px solid #b8860b; }
        
        .alert-rav { background: #ffebee; color: #c62828; padding: 4px; border-radius: 4px; font-size: 0.75em; margin-bottom: 5px; border: 1px solid #ef9a9a; text-align: center; font-weight: bold;}
        .logs { height: 180px; background: var(--dark); color: #a5d6a7; padding: 8px; font-family: monospace; font-size: 0.75em; overflow-y: auto; border-radius: 6px; margin-top:5px; border: 2px solid #455a64;}
        
        .turn-banner { background: #ff9800; color: white; text-align: center; padding: 5px; font-weight: bold; display: none; border-radius: 4px; margin-bottom: 5px;}
        .turn-banner.active { display: block; background: #4caf50; }

        #season-anim-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 2000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .anim-box { background: white; border: 5px solid var(--p1); border-radius: 20px; padding: 40px 80px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); text-align: center; transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #anim-title { font-size: 3.5em; font-weight: bold; color: var(--p1); margin-bottom: 10px; }
        #anim-subtitle { font-size: 1.5em; color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3em; margin-bottom: 10px;">🌱 La Main Verte</h1>
    <p style="font-size: 1.2em; margin-bottom: 30px;">Choisissez un mode de jeu :</p>
    
    <button class="btn-lobby" onclick="startNewGame('SOLO')">👤 Jouer en Solo</button>
    <button class="btn-lobby" style="background:#8e24aa" onclick="startNewGame('IA_SOLO')">🤖 Mode Spectateur (IA Solo)</button>
    <button class="btn-lobby" style="background:#0288d1" onclick="startNewGame('VS_IA')">🤖 Jouer contre l'Ordinateur</button>
    <button class="btn-lobby" style="background:#ff9800" onclick="startNewGame('IA_VS_IA')">🍿 Mode Spectateur (IA vs IA)</button>
    <button class="btn-lobby" style="background:var(--p1)" onclick="startNewGame('MULTI')">🌍 Créer une partie à 2 Joueurs</button>
    
    <hr style="width: 50%; border-color: #555; margin: 15px 0;">
    <button class="btn-lobby" style="background:#546e7a;" onclick="joinGame(2)">🚜 Rejoindre la partie (Joueur 2)</button>
    <button class="btn-lobby" style="background:#d32f2f; width:250px; font-size:0.9em; margin-top:20px;" onclick="confirmReset(true)">⚠️ Reset Global du Serveur</button>
</div>

<div id="game-over-screen">
    <div class="score-box">
        <h1 style="margin-top:0;">🏁 Fin de la Partie !</h1>
        <div id="winner-text" class="score-winner"></div>
        <div class="score-row"><span>Joueur 1 :</span> <span id="final-score-1">0💰</span></div>
        <div class="score-row" id="score-row-2"><span>Joueur 2 :</span> <span id="final-score-2">0💰</span></div>
        
        <div style="display:flex; gap:10px; justify-content:center; margin-top:30px;">
            <button class="btn-lobby" style="width:auto; font-size:0.9em;" onclick="document.getElementById('lobby').style.display='flex'">Menu Principal</button>
            <button class="btn-lobby" style="background:#607d8b; width:auto; font-size:0.9em;" onclick="document.getElementById('game-over-screen').style.display='none'">🔍 Voir Plateau & Logs</button>
        </div>
    </div>
</div>

<div id="season-anim-overlay">
    <div class="anim-box" id="anim-box"><div id="anim-title"></div><div id="anim-subtitle"></div></div>
</div>

<div class="main-game">
    <div id="turn-banner" class="turn-banner">Veuillez patienter, c'est le tour de l'adversaire...</div>
    
    <div class="hud" id="my-hud">
        <div id="season-display">📅 Saison...</div>
        <div>💰 <span id="res-money">0</span> | ⏳ <span id="res-time">0</span>/<span id="res-timemax">10</span>h</div>
        <div title="Déchets verts accumulés dans le Composteur">💩 <span id="res-compost" class="res-pill">0</span></div>
        <div id="meteo-display" style="background:#e3f2fd; padding:3px 10px; border-radius:10px;">🎲 --</div>
        <button id="bot-btn" onclick="toggleBot()" style="background:#9c27b0; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-weight:bold; transition:0.3s;" title="Laisser l'ordinateur jouer à votre place">🤖 Bot: OFF</button>
        <button onclick="confirmReset()" style="background:#ff5252; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-weight:bold;">🧹 Reset</button>
    </div>
    
    <div class="hud-opp" id="opp-hud">
        <b>👀 Adversaire :</b> <span>💰 <span id="opp-money">0</span> | ⏳ <span id="opp-time">0</span>h | 💩 <span id="opp-compost">0</span></span>
    </div>
    
    <div id="ravageur-zone" class="alert-rav" style="display:none;"></div>
    <div id="aux-tray" style="display:none; gap:5px; margin-bottom:8px; background:#e3f2fd; padding:5px; border-radius:5px; border:1px solid #90caf9; flex-wrap:wrap; font-size:0.8em; color:#1565c0;"></div>
    
    <div class="farm-grid" id="farm-grid"></div>
    <div class="logs" id="game-logs"></div>
    <div id="action-buttons-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-top:10px;"></div>
</div>

<div class="sidebar">
    <div style="background:#f0f4f7; padding:8px; border-radius:6px; margin-bottom:10px; font-size:0.8em; text-align:center;">
        <b>🎴 Cartes Pioche :</b> <span id="deck-count">C:0 | S:0 | A:0</span>
    </div>
    <h3 style="margin:0 0 5px 0;">⚙️ Mes Améliorations</h3>
    <div id="up-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px; margin-bottom:10px;"></div>
    
    <h3 style="margin:0 0 5px 0;">🛒 Marché Commun</h3>
    <div id="market-preview" style="background:#fffde7; padding:6px; border:1px solid #ffd54f; border-radius:6px; font-size:0.75em; margin-bottom:6px;"></div>
    <div id="jard-buttons-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
    
    <h3 style="margin:10px 0 5px 0;">🎒 Ma Main</h3>
    <div id="player-hand" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
</div>

<div class="modal-overlay" id="jardinerie-modal"><div class="modal-content" id="modal-content-inner"></div></div>

<script src="bot.js"></script>

<script>
    // --- CONNEXION FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
        authDomain: "main-verte-72483.firebaseapp.com",
        databaseURL: "https://main-verte-72483-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "main-verte-72483",
        storageBucket: "main-verte-72483.firebasestorage.app",
        messagingSenderId: "633454274346",
        appId: "1:633454274346:web:7261efcfe1b9cecdd6e053"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("game-session-001");
    const dbConfig = firebase.database().ref("game-config");

    // --- VARIABLES GLOBALES ---
    const UP_NAMES = ["Terrain", "Énergie", "Savoir", "Sol", "Climat", "Outils", "Vente", "VIP"];
    const SAISON_NOMS = ["🌷 Printemps", "☀️ Été", "🍂 Automne", "❄️ Hiver"];
    const ALL_SEASONS = ["P","E","A","H"];

    let state = null;
    let myId = null; 
    let localSelectedId = null;
    let localModalOpen = false;
    let localPicksLeft = 0;
    let isInitializing = false;

    // --- GESTION DU LOBBY & CONNEXION ---
    function startNewGame(mode) {
        myId = 1;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('my-hud').style.borderTopColor = 'var(--p1)';
        
        if (mode === 'IA_SOLO' || mode === 'IA_VS_IA' || mode === 'VS_IA') {
            botEnabled = true;
        } else {
            botEnabled = false;
        }
        
        initNewGame(1, mode);
    }

    function joinGame(id) {
        myId = id;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('my-hud').style.borderTopColor = id === 1 ? 'var(--p1)' : 'var(--p2)';
        if(state) render();
    }

    db.on("value", snap => {
        const val = snap.val();
        if(!val || !val.p1) {
            // En attente
        } else {
            if (state && (state.saisonIdx !== val.saisonIdx || state.annee !== val.annee) && !val.gameOver) {
                playSeasonAnimation(val.saisonIdx, val.annee);
            }
            state = val; 
            render(); 
        }
    });

    function sync() { if(state) db.set(state); }

    function addLog(msg, pid = myId) {
        if(!state.gameLogs) state.gameLogs = [];
        state.gameLogs.unshift(`[J${pid}] ` + msg);
        if(state.gameLogs.length > 200) state.gameLogs.pop(); 
    }

    function generatePlayer() {
        return { money: 10, time: 10, timeMax: 10, compost: 0, upgrades: Array(8).fill(1), hand: [], auxActifs: [], zones: Array(6).fill(null).map((_, i) => ({ id: i, type: i === 0 ? "LIFE" : null, culture: null, batiment: null })) };
    }

    // --- INITIALISATION DU JEU ---
    async function initNewGame(creatorId = null, mode = 'MULTI') {
        if(isInitializing) return;
        isInitializing = true;
        let msg = creatorId ? `> 🧹 Partie (Mode: ${mode}) initialisée.` : "> Nouvelle partie initialisée.";

        try {
            const snapConf = await dbConfig.once("value");
            let config = snapConf.val();
            if(!config || !config.decks) { alert("ERREUR: Base Admin vide !"); isInitializing = false; return; }

            let builtDecks = { C: [], S: [], A: [] };
            ['C','S','A'].forEach(cat => { (config.decks[cat] || []).forEach(c => { let q = c.qte || 1; for(let i=0; i<q; i++) builtDecks[cat].push({...c}); }); });
            let builtRavs = [];
            (config.ravageurs || []).forEach(r => { let q = r.qte || 1; for(let i=0; i<q; i++) builtRavs.push({...r}); });

            state = { 
                mode: mode, turn: 1, annee: 1, saisonIdx: 0, gameOver: false, 
                decks: builtDecks, ravPool: builtRavs, market: { C: [], S: [], A: [] }, 
                currentMeteo: {p:0, s:0}, currentRav: null, p1: generatePlayer(), p2: generatePlayer(), gameLogs: [msg] 
            };
            ['C','S','A'].forEach(cat => { for(let i=0; i<2; i++) { let d = draw(cat); if(d) state.market[cat].push(d); } });
            
            document.getElementById('game-over-screen').style.display = 'none';
            await db.set(state);
        } catch(e) { console.error(e); }
        finally { isInitializing = false; } 
    }

    function draw(cat) {
        if(!state.decks[cat] || state.decks[cat].length === 0) return null;
        return state.decks[cat].splice(Math.floor(Math.random()*state.decks[cat].length), 1)[0];
    }

    function playSeasonAnimation(sIdx, annee) {
        if(state.gameOver) return;
        const overlay = document.getElementById('season-anim-overlay');
        document.getElementById('anim-title').innerText = SAISON_NOMS[sIdx];
        document.getElementById('anim-subtitle').innerText = "Année " + annee;
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.opacity = '1'; document.getElementById('anim-box').style.transform = 'scale(1)'; }, 50);
        setTimeout(() => { overlay.style.opacity = '0'; document.getElementById('anim-box').style.transform = 'scale(0.8)'; setTimeout(() => overlay.style.display = 'none', 500); }, 2500);
    }

    function showGameOver() {
        document.getElementById('game-over-screen').style.display = 'flex';
        document.getElementById('final-score-1').innerText = state.p1.money + " 💰";
        
        if(state.mode === 'SOLO' || state.mode === 'IA_SOLO') {
            document.getElementById('score-row-2').style.display = 'none';
            document.getElementById('winner-text').innerText = "🎉 Ferme terminée !";
        } else {
            document.getElementById('score-row-2').style.display = 'flex';
            document.getElementById('final-score-2').innerText = state.p2.money + " 💰";
            let w = "Égalité !";
            if(state.p1.money > state.p2.money) w = "🏆 Le Joueur 1 Gagne !";
            if(state.p2.money > state.p1.money) w = "🏆 Le Joueur 2 Gagne !";
            document.getElementById('winner-text').innerText = w;
        }
    }

    // --- MOTEUR D'AFFICHAGE PRINCIPAL ---
    function render() {
        if(!state || !myId) return;
        
        if(state.gameOver && document.getElementById('game-over-screen').style.display !== 'none') {
            showGameOver();
        }

        const me = state['p'+myId];
        const opp = state['p'+(myId === 1 ? 2 : 1)];
        const isMyTurn = state.turn === myId;

        if(state.mode === 'SOLO' || state.mode === 'IA_SOLO') {
            document.getElementById('opp-hud').style.display = 'none';
        } else {
            document.getElementById('opp-hud').style.display = 'flex';
        }

        const banner = document.getElementById('turn-banner');
        if(isMyTurn) { banner.innerText = "🎮 C'est à votre tour !"; banner.className = "turn-banner active"; }
        else { banner.innerText = `⏳ Veuillez patienter, c'est le tour du Joueur ${state.turn}...`; banner.className = "turn-banner"; }

        const setTxt = (id, txt) => { const el = document.getElementById(id); if(el) el.innerText = txt; };
        setTxt('res-money', me.money); setTxt('res-time', me.time); setTxt('res-timemax', me.timeMax); setTxt('res-compost', me.compost);
        setTxt('season-display', `📅 ${SAISON_NOMS[state.saisonIdx]} - An ${state.annee}/3`);
        setTxt('meteo-display', `🌧️ ${state.currentMeteo.p} | ☀️ ${state.currentMeteo.s}`);
        setTxt('opp-money', opp.money); setTxt('opp-time', opp.time); setTxt('opp-compost', opp.compost);
        setTxt('deck-count', `C:${(state.decks.C||[]).length} | S:${(state.decks.S||[]).length} | A:${(state.decks.A||[]).length}`);
        
        const logBox = document.getElementById('game-logs');
        if(logBox && state.gameLogs) logBox.innerHTML = state.gameLogs.map(l => `<div>${l}</div>`).join('');

        const rZone = document.getElementById('ravageur-zone');
        if(state.currentRav) { rZone.innerText = `⚠️ RAVAGEUR : ${state.currentRav.n || state.currentRav.nom} (-${state.currentRav.d}💰)`; rZone.style.display = 'block'; }
        else rZone.style.display = 'none';

        const tray = document.getElementById('aux-tray');
        if(me.auxActifs && me.auxActifs.length > 0) {
            tray.style.display="flex"; tray.innerHTML = '<b>🛡️ Boucliers : </b> ' + me.auxActifs.map(a => `<span style="background:white; padding:2px; border-radius:4px; margin-left:4px;">🦊 Anti-${a}</span>`).join('');
        } else tray.style.display="none";

        const grid = document.getElementById('farm-grid'); grid.innerHTML = "";
        me.zones.forEach(z => {
            const acc = z.id <= (me.upgrades[0] === 1 ? 3 : (me.upgrades[0] === 2 ? 4 : 5));
            const isS = z.batiment === 'SERRE';
            const d = document.createElement('div');
            d.className = `zone ${z.type ? 'tuile-'+z.type.toLowerCase() : ''} ${z.batiment && !isS ? 'tuile-batiment' : ''} ${isS ? 'has-serre' : ''} ${localSelectedId === z.id ? 'selected' : ''}`;
            d.style.opacity = acc ? "1" : "0.3";
            d.onclick = () => { if(acc && isMyTurn && !botEnabled && !state.gameOver) { localSelectedId = z.id; render(); } };
            
            if(z.id === 0) { d.innerHTML = "🏠 MAISON"; }
            else if(!z.type) { d.innerHTML = `ZONE ${z.id}${acc?'':'<br>🔒'}`; }
            else {
                let header = z.type; if(z.batiment) header += ` + ${z.batiment}`;
                d.innerHTML = `<b>${header}</b>`;
                if(z.culture) {
                    let yieldInfo = `${z.culture.nom}`;
                    if(z.culture.amd && z.culture.amd > 0) yieldInfo += ` <span style="background:var(--p1);color:white;padding:1px 4px;border-radius:4px;font-size:0.8em;" title="Bonus de rendement lié à l'amendement">+${z.culture.amd}💰</span>`;
                    
                    d.innerHTML += `<br>${yieldInfo}<br>💧${z.culture.eCur} ☀️${z.culture.sCur}`;
                    if(z.culture.eCur <= 0 && z.culture.sCur <= 0) {
                        d.innerHTML += `<br><button onclick="actionRecolter(${z.id})" style="background:var(--p1); color:white; border:none; padding:4px; border-radius:4px; margin-top:4px;" title="Récolter et gagner de l'argent" ${!isMyTurn || me.time<2 || botEnabled || state.gameOver ? 'disabled':''}>🧺 Récolter</button>`;
                    }
                }
            }
            grid.appendChild(d);
        });

        const prev = document.getElementById('market-preview');
        if(prev && state.market) { prev.innerHTML = `🌾 ${(state.market.C||[]).map(c=>c.nom).join(', ')||'Vidé'}<br>🛠️ ${(state.market.S||[]).map(c=>c.nom).join(', ')||'Vidé'}<br>🦊 ${(state.market.A||[]).map(c=>c.nom).join(', ')||'Vidé'}`; }

        const hDiv = document.getElementById('player-hand'); hDiv.innerHTML = "";
        (me.hand || []).forEach((c, i) => {
            const cost = Math.max(0, (c.t||1) - (me.upgrades[2]-1));
            const card = document.createElement('div'); card.className = "card";
            let details = c.cat==='S' ? c.desc : (c.cat==='X' ? c.prot : `💧${c.e} ☀️${c.s}<br>🌱 ${(c.sm||[]).join(',')} | 🧺 ${(c.rc||[]).join(',')}`);
            card.innerHTML = `<b>${c.nom}</b><br><span style="font-size:0.9em;">${details}</span><br><button onclick="playC(${i})" title="Déployer cette carte sur le plateau. Coût : ${cost}h" style="width:100%; margin-top:4px; padding:4px; cursor:pointer;" ${!isMyTurn || me.time<cost || botEnabled || state.gameOver ? 'disabled':''}>Jouer (-${cost}h)</button>`;
            hDiv.appendChild(card);
        });

        renderButtons(me, isMyTurn);
        document.getElementById('jardinerie-modal').style.display = localModalOpen ? 'flex' : 'none';
        if(localModalOpen) renderJardModal(me);

        // --- GESTION DES BOTS (Hooks) ---
        if(typeof triggerBot === "function" && !state.gameOver) {
            let shouldRunBot = false;
            if(state.turn === myId && botEnabled) shouldRunBot = true; 
            if((state.mode === 'VS_IA' || state.mode === 'IA_VS_IA') && state.turn === 2 && myId === 1) shouldRunBot = true; 

            if(shouldRunBot && !localModalOpen) triggerBot(state.turn);
        }
    }

    // --- ACTIONS ET INFOS-BULLES ---
    function renderButtons(me, isMyTurn) {
        const costT = me.upgrades[5] >= 2 ? (me.upgrades[5] === 3 ? 0 : 1) : 2;
        const dis = !isMyTurn || botEnabled || state.gameOver || (state.mode === 'IA_VS_IA' || state.mode === 'IA_SOLO'); 
        const hasComposteur = me.zones.some(z => z.batiment === 'COMPOSTEUR');
        
        let finTexte = (state.mode === 'SOLO' || state.mode === 'IA_SOLO') ? '💤 Fin de Saison' : (state.turn===1 ? '⏭️ Terminer le Tour' : '💤 Fin de Saison');

        document.getElementById('action-buttons-container').innerHTML = `
            <button class="btn-action" style="background:#4caf50" onclick="actT('POTAGER')" title="Aménage la zone sélectionnée en Potager pour y semer des Légumes. Coût : ${costT}💰, 3h." ${dis||me.time<3||me.money<costT?'disabled':''}>🏗️ Potager (-${costT}💰)</button>
            <button class="btn-action" style="background:#fbc02d;color:#333" onclick="actT('VERGER')" title="Aménage la zone sélectionnée en Verger pour y planter des Arbres. Coût : ${costT}💰, 3h." ${dis||me.time<3||me.money<costT?'disabled':''}>🏗️ Verger (-${costT}💰)</button>
            <button class="btn-action" style="background:#ff5722" onclick="actT('AMÉNAGEMENT')" title="Crée une zone Nature, indispensable pour bâtir un Composteur ou un Local Outils. Coût : 3💰, 3h." ${dis||me.time<3||me.money<3?'disabled':''}>🌳 Nature (-3💰)</button>
            <button class="btn-action" style="background:#607d8b" onclick="actB()" title="Construit un Bâtiment (Serre sur Potager, Composteur ou Local sur zone Nature). Coût : Temps et 💰 variables." ${dis||me.time<4?'disabled':''}>🏠 Bâtiment</button>
            <button class="btn-action" style="background:#2196f3" onclick="actArr()" title="Réduit le besoin en Eau (💧) de la culture sélectionnée de 2. Coût : 1h." ${dis||me.time<1?'disabled':''}>💧 Arroser (-1h)</button>
            <button class="btn-action" style="background:#795548" onclick="actAmd()" title="Utilise 1 point de Compost (💩) pour augmenter le gain à la revente de la culture de +1💰. Nécessite un Composteur ! Coût : 1h." ${dis||me.time<1||me.compost<1||!hasComposteur?'disabled':''}>💩 Amender (-1h)</button>
            <button class="btn-action" style="background:#5d4037" onclick="actComposter()" title="Sacrifie le légume sélectionné pour gagner +2 Compost (💩), ou réinitialise les besoins d'un Arbre récolté. Coût : 1h." ${dis||!hasComposteur||!me.zones[localSelectedId]?.culture||me.time<1?'disabled':''}>♻️ Composter (-1h)</button>
            <button class="btn-action" style="background:#e53935; font-size:1em; grid-column:span 1;" onclick="actFin()" title="Termine vos actions pour ce tour. Laisse la main à l'adversaire ou passe à la saison suivante." ${dis?'disabled':''}>${finTexte}</button>
        `;

        const upG = document.getElementById('up-grid'); upG.innerHTML = "";
        UP_NAMES.forEach((n, i) => {
            const cost = me.upgrades[i]===1?3:5;
            let desc = "";
            if(n === "Terrain") desc = "Déverrouille de nouvelles zones de votre plateau pour vous étendre.";
            if(n === "Énergie") desc = "Augmente votre réserve de temps maximum (+4h par niveau).";
            if(n === "Savoir") desc = "Réduit le coût en temps (h) nécessaire pour semer des graines ou utiliser des soutiens.";
            if(n === "Sol") desc = "Augmente le prix de revente (+1💰) de toutes vos récoltes.";
            if(n === "Climat") desc = "Réduit les pertes d'Eau et de Soleil infligées par la météo en fin de saison.";
            if(n === "Outils") desc = "Réduit le coût en 💰 pour aménager des Potagers et des Vergers.";
            if(n === "Vente") desc = "Réduit le coût en temps (h) du voyage vers la Jardinerie.";
            if(n === "VIP") desc = "Vous donne accès à des emplacements de Jardinerie plus avantageux.";

            upG.innerHTML += `<div style="font-size:0.7em; background:#fafafa; padding:4px; border:1px solid #ddd; border-radius:4px;" title="Niv. ${me.upgrades[i]} : ${desc}"><b>${n}</b> L${me.upgrades[i]} <button onclick="upgr(${i})" style="float:right;" title="Passer au Niveau ${me.upgrades[i]+1}. Coût : ${cost}h" ${dis||me.upgrades[i]>=3||me.time<cost?'disabled':''}>UP</button></div>`;
        });

        const jCont = document.getElementById('jard-buttons-container'); jCont.innerHTML = "";
        const redJ = me.upgrades[6]>=2?1:0;
        [[3,5],[2,3],[2,2],[1,1]].forEach((ex, i) => {
            const c = Math.max(0, ex[0]-redJ);
            jCont.innerHTML += `<button class="btn-action" style="background:#8d6e63" onclick="openJard(${c},${ex[1]})" title="Voyage à la jardinerie. Coûte ${c}h et vous donne droit à ${ex[1]} actions d'achat." ${dis||me.time<c?'disabled':''}>📦 Empl. ${i+1} (${ex[1]} Pioches)</button>`;
        });
    }

    // --- ACTIONS DYNAMIQUES (AVEC LOGS DÉTAILLÉS) ---
    function openJard(h, p) { const me = state['p'+state.turn]; me.time -= h; localPicksLeft = p; localModalOpen = true; addLog(`📦 Voyage à la Jardinerie pour piocher ${p} cartes (-${h}h).`, state.turn); sync(); }
    
    function renderJardModal(me) {
        const inner = document.getElementById('modal-content-inner');
        inner.innerHTML = `<div style="display:flex;justify-content:space-between; align-items:center;"><h2>🛒 Marché</h2><div style="font-size:1.2em; color:#d32f2f;"><b>Actions : ${localPicksLeft}</b> | 💰 ${me.money}</div></div><div class="rayon-grid"></div>`;
        ['C','S','A'].forEach(cat => {
            const r = document.createElement('div'); r.className = "rayon";
            r.innerHTML = `<h3>${cat==='C'?'🌾 Cultures':(cat==='S'?'🛠️ Soutiens':'🦊 Auxiliaires')}</h3>
                <button class="btn-jard-action" onclick="jardP('${cat}')">🎲 Pioche à l'aveugle</button>
                <button class="btn-jard-action" onclick="jardR('${cat}')">🔄 Renouveler le Rayon</button><hr>`;
            (state.market[cat] || []).forEach((c, idx) => {
                const can = me.money >= c.p;
                const d = document.createElement('div'); d.className = "jard-card"; d.style.opacity = can?"1":"0.4";
                let details = c.cat==='S' ? c.desc : (c.cat==='X' ? c.prot : `💧${c.e} ☀️${c.s}<br>🌱 ${(c.sm||[]).join(',')} | 🧺 ${(c.rc||[]).join(',')}`);
                d.innerHTML = `<div class="price-tag">${c.p}💰</div><b>${c.nom}</b><br><small>${details}</small>`;
                d.onclick = () => { if(can) { me.money-=c.p; if(!me.hand) me.hand=[]; me.hand.push(c); state.market[cat].splice(idx,1); if(!state.market[cat]) state.market[cat] = []; if(me.upgrades[6]>=3) { let nc = draw(cat); if(nc) state.market[cat].push(nc); } addLog(`🛒 Achat au marché : ${c.nom} (-${c.p}💰).`, state.turn); consm(); } };
                r.appendChild(d);
            });
            inner.querySelector('.rayon-grid').appendChild(r);
        });
    }

    function jardP(cat) { const pId=state.turn, me=state['p'+pId], c=draw(cat); if(c) { if(c.p<=me.money) { if(confirm(`Tiré : ${c.nom} (${c.p}💰). L'acheter ?`)) { me.money-=c.p; if(!me.hand) me.hand=[]; me.hand.push(c); addLog(`🎲 Pioche à l'aveugle : ${c.nom} achetée (-${c.p}💰).`, pId); consm(); } else { consm(); } } else { alert(`Fonds insuffisants.`); consm(); } } else alert("Pioche vide !"); }
    function jardR(cat) { state.market[cat] = []; for(let i=0; i<2; i++) { let d = draw(cat); if(d) state.market[cat].push(d); } addLog(`🔄 Renouvellement du rayon ${cat}.`, state.turn); consm(); }
    function consm() { localPicksLeft--; if(localPicksLeft<=0) { localModalOpen=false; ['C','S','A'].forEach(cat => { if(!state.market[cat]) state.market[cat] = []; while(state.market[cat].length < 2) { let c = draw(cat); if(c) state.market[cat].push(c); else break; } }); } sync(); }

    function actT(t, zId = localSelectedId) { const pId = state.turn; const me = state['p'+pId]; if(!zId || zId===0) return; const cost = me.upgrades[5]>=2 ? (me.upgrades[5]===3?0:1) : 2; if(me.money < (t==='AMÉNAGEMENT'?3:cost)) return; me.money -= (t==='AMÉNAGEMENT'?3:cost); me.time -= 3; me.zones[zId].type = t; addLog(`🏗️ Aménagement d'un ${t} sur la Zone ${zId} (-${t==='AMÉNAGEMENT'?3:cost}💰, -3h).`, pId); sync(); }
    function actB(zId = localSelectedId) { 
        const pId = state.turn; const me = state['p'+pId], z=me.zones[zId]; if(!z || z.batiment) return;
        const ch = prompt("Choisissez le bâtiment :\n1: Serre (3💰 - Nécessite Potager)\n2: Composteur (4💰 - Nécessite Nature)\n3: Local Outils (5💰 - Nécessite Nature)");
        if(ch==="1" && z.type==="POTAGER") { if(me.money<3) return alert("Fonds insuffisants."); me.money-=3; me.time-=4; z.batiment="SERRE"; addLog(`🏠 Bâtiment SERRE construit sur Zone ${zId} (-3💰, -4h).`, pId); }
        else if(ch==="2" && z.type==="AMÉNAGEMENT") { if(me.money<4) return alert("Fonds insuffisants."); me.money-=4; me.time-=4; z.batiment="COMPOSTEUR"; addLog(`🏠 Bâtiment COMPOSTEUR construit sur Zone ${zId} (-4💰, -4h).`, pId); }
        else if(ch==="3" && z.type==="AMÉNAGEMENT") { if(me.money<5) return alert("Fonds insuffisants."); me.money-=5; me.time-=4; z.batiment="LOCAL OUTILS"; addLog(`🏠 Bâtiment LOCAL OUTILS construit sur Zone ${zId} (-5💰, -4h).`, pId); }
        else if(ch) { alert("❌ Erreur d'emplacement !\nLa Serre se construit sur un Potager. Le Composteur et le Local se construisent sur une zone Nature (Aménagement)."); }
        sync(); 
    }
    
    function actArr(zId = localSelectedId) { const pId = state.turn; const me=state['p'+pId], z=me.zones[zId]; if(z && z.culture) { me.time--; z.culture.eCur = Math.max(0, z.culture.eCur-2); addLog(`💧 Arrosage manuel de ${z.culture.nom} sur Zone ${zId} (-2💧, -1h).`, pId); sync(); } }
    
    function actAmd(zId = localSelectedId) { 
        const pId = state.turn; const me=state['p'+pId], z=me.zones[zId]; 
        const hasComp = me.zones.some(x => x.batiment === 'COMPOSTEUR');
        if(!hasComp) return alert("Construisez un Composteur d'abord !");
        if(z && z.culture && me.compost > 0 && me.time >= 1) { 
            me.time--; me.compost--; 
            z.culture.amd = (z.culture.amd || 0) + 1; 
            addLog(`💩 Amendement de ${z.culture.nom} sur Zone ${zId} (+1💰 futur, -1💩, -1h).`, pId); 
            sync(); 
        } 
    }

    function actComposter(zId = localSelectedId) {
        const pId = state.turn; const me = state['p'+pId], z = me.zones[zId]; 
        const hasComp = me.zones.some(x => x.batiment === 'COMPOSTEUR');
        if(!hasComp) return alert("Il vous faut un Composteur !");
        if(!z || !z.culture) return;

        me.time--; // Coûte 1h
        if(z.culture.cat === 'A') {
            z.culture.eCur = z.culture.e;
            z.culture.sCur = z.culture.s;
            z.culture.amd = 0;
            addLog(`♻️ Entretien de l'arbre sur Zone ${zId} (Besoins réinitialisés, -1h).`, pId);
        } else {
            me.compost = (me.compost || 0) + 2;
            addLog(`♻️ Compostage volontaire de ${z.culture.nom} sur Zone ${zId} (+2💩, -1h).`, pId);
            z.culture = null;
        }
        sync();
    }
    
    function upgr(i) { const pId = state.turn; const me=state['p'+pId]; const cost = me.upgrades[i]===1?3:5; me.time -= cost; me.upgrades[i]++; if(i===1) me.timeMax += 4; addLog(`⚙️ Amélioration ${UP_NAMES[i]} au niveau ${me.upgrades[i]} (-${cost}h).`, pId); sync(); }
    
    function actionRecolter(id) { 
        const pId = state.turn; const me = state['p'+pId], z = me.zones[id]; 
        me.time -= 2; 
        const moneyGained = z.culture.g + (me.upgrades[3]-1) + (z.culture.amd||0);
        me.money += moneyGained; 
        
        let msg = `🧺 Récolte de ${z.culture.nom} sur Zone ${id} ! Gain : +${moneyGained}💰 (-2h).`;

        if(z.culture.cat === 'A') {
            z.culture.eCur = z.culture.e;
            z.culture.sCur = z.culture.s;
            z.culture.amd = 0;
            msg += " L'arbre reste en place pour un nouveau cycle.";
        } else {
            z.culture = null; 
        }
        addLog(msg, pId); 
        sync(); 
    }

    function playC(idx, zId = localSelectedId) { 
        const pId = state.turn; const me = state['p'+pId], c = me.hand[idx], z = me.zones[zId], cost = Math.max(0, (c.t||1)-(me.upgrades[2]-1));
        if(c.cat === 'X') { me.time-=cost; if(!me.auxActifs) me.auxActifs=[]; me.auxActifs.push(c.prot); me.hand.splice(idx,1); addLog(`🦊 Auxiliaire déployé : Anti-${c.prot} (-${cost}h).`, pId); } 
        else if(c.cat === 'S') { 
            me.time-=cost; 
            if(c.nom.includes("Fumier")) { me.compost=(me.compost||0)+2; addLog(`✨ Soutien joué : ${c.nom} (+2💩, -${cost}h).`, pId); }
            if(c.nom.includes("Ortie") && z && z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur-4); addLog(`✨ Soutien joué : ${c.nom} (-4💧 sur ${z.culture.nom}, -${cost}h).`, pId); }
            if(c.nom.includes("Paillage") && z && z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur-2); z.culture.sCur = Math.max(0, z.culture.sCur-1); addLog(`✨ Soutien joué : ${c.nom} (-2💧 -1☀️ sur ${z.culture.nom}, -${cost}h).`, pId); }
            if(c.nom.includes("Corne") && z && z.culture) { z.culture.amd = (z.culture.amd||0)+2; addLog(`✨ Soutien joué : ${c.nom} (+2💰 de rendement sur ${z.culture.nom}, -${cost}h).`, pId); }
            me.hand.splice(idx,1); 
        } else { 
            if(!z || !z.type || z.culture) return;
            if(c.cat==='L' && z.type!=='POTAGER') return;
            if(c.cat==='A' && z.type!=='VERGER') return;
            let curS = ALL_SEASONS[state.saisonIdx];
            let smValid = z.batiment === 'SERRE' ? (c.sm||[]).map(s => ALL_SEASONS[(ALL_SEASONS.indexOf(s)+3)%4]).concat(c.sm||[]) : (c.sm||[]);
            if(!smValid.includes(curS)) return;
            me.time-=cost; z.culture={...c, eCur:c.e, sCur:c.s, amd:0}; me.hand.splice(idx,1); addLog(`🌱 Semis de ${c.nom} sur Zone ${zId} (-${cost}h).`, pId);
        }
        sync(); 
    }

    function resolveSeason() {
        let curS = ALL_SEASONS[state.saisonIdx];
        let pBase = Math.floor(Math.random()*3)+1; 
        let sBase = Math.floor(Math.random()*2)+1;
        state.currentMeteo = {p: pBase, s: sBase};

        let ravPool = state.ravPool || [];
        if(ravPool.length > 0 && Math.random() < 0.3) { 
            state.currentRav = ravPool[Math.floor(Math.random()*ravPool.length)]; 
        } else { state.currentRav = null; }

        let isFinalTurn = (state.saisonIdx === 3 && state.annee === 3);

        [1, 2].forEach(pid => {
            let pData = state['p'+pid];
            let bClimat = pData.upgrades[4] > 1 ? 1 : 0; 
            
            pData.zones.forEach(z => { 
                if(z && z.culture) { 
                    z.culture.eCur = Math.max(0, z.culture.eCur - (pBase + bClimat)); 
                    z.culture.sCur = Math.max(0, z.culture.sCur - (sBase + bClimat)); 
                    
                    if (isFinalTurn && z.culture.eCur === 0 && z.culture.sCur === 0) {
                        const mGain = (z.culture.g + (pData.upgrades[3]-1) + (z.culture.amd||0));
                        pData.money += mGain;
                        addLog(`🧺 Auto-Récolte de Fin de Partie : +${mGain}💰 !`, pid);
                        z.culture = null; 
                    }
                } 
            });

            if(state.currentRav && (!pData.auxActifs || !pData.auxActifs.includes(state.currentRav.n || state.currentRav.nom))) {
                pData.money = Math.max(0, pData.money - state.currentRav.d);
            }
            pData.time = pData.timeMax; 
        });

        state.saisonIdx++; 
        if(state.saisonIdx > 3) { 
            state.saisonIdx = 0; 
            state.annee++; 
        }

        if(state.annee > 3) {
            state.gameOver = true;
            addLog("🏁 Fin des 3 années de jeu.", myId);
            sync();
            return;
        }

        let newSeason = ALL_SEASONS[state.saisonIdx];
        [1, 2].forEach(pid => {
            let pData = state['p'+pid];
            pData.zones.forEach(z => { 
                if(z && z.culture) { 
                    let rc = z.culture.rc || []; let sm = z.culture.sm || [];
                    let survie = z.batiment === 'SERRE' ? rc.map(s => ALL_SEASONS[(ALL_SEASONS.indexOf(s)+3)%4]).concat(rc).concat(sm) : rc.concat(sm);
                    
                    if(!survie.includes(newSeason)) {
                        if(z.culture.cat === 'A') {
                            z.culture.eCur = z.culture.e;
                            z.culture.sCur = z.culture.s;
                            z.culture.amd = 0;
                            addLog(`🍂 L'arbre sur Zone ${z.id} se repose et réinitialise ses besoins.`, pid);
                        } else {
                            let msg = `🥀 Mort de ${z.culture.nom} sur Zone ${z.id} (Périmé).`;
                            z.culture = null;
                            if(pData.zones.some(x => x.batiment === 'COMPOSTEUR')) {
                                pData.compost = (pData.compost||0) + 2;
                                msg += " Recyclé en compost (+2💩).";
                            }
                            addLog(msg, pid);
                        }
                    }
                }
            });
        });

        state.turn = 1;
        addLog(`💤 Résolution de la saison. Météo: 🌧️${pBase} ☀️${sBase}.`, state.mode === 'SOLO' || state.mode === 'IA_SOLO' ? 1 : 2);
        sync();
    }

    function actFin() {
        if(state.mode === 'SOLO' || state.mode === 'IA_SOLO') {
            resolveSeason();
        } else {
            if(state.turn === 1) {
                state.turn = 2;
                addLog(`⏭️ Fin de tour.`, 1);
                sync();
            } else {
                resolveSeason();
            }
        }
    }
    
    async function confirmReset(force = false) { 
        if(confirm("⚠️ Réinitialiser complètement le serveur ?")) {
            let currentMode = state ? state.mode : 'MULTI';
            await initNewGame(myId || "Serveur", currentMode);
        }
    }
</script>
</body>
</html>
