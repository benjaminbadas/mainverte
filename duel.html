<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>La Main Verte - V9.1 LiveOps Safe</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --p1: #2e7d32; --p2: #1565c0; --bg: #f4f7f1; --potager: #81c784; --verger: #fff176; --amenag: #ffccbc; --batiment: #455a64; --dark: #263238; --gold: #ffd700; --serre: #e1f5fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* LOBBY */
        #lobby { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .btn-lobby { background: var(--p1); color: white; border: none; padding: 15px 30px; font-size: 1.2em; border-radius: 8px; margin: 10px; cursor: pointer; width: 300px; transition: 0.2s; font-weight: bold;}
        .btn-lobby:hover { filter: brightness(1.2); transform: scale(1.05); }
        .btn-lobby.j2 { background: var(--p2); }

        /* JEU */
        .main-game { flex: 1; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .sidebar { width: 420px; background: white; border-left: 2px solid #ddd; padding: 10px; display: flex; flex-direction: column; overflow-y: auto;}
        
        .hud { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 5px; font-weight: bold; font-size: 0.9em; border-top: 4px solid var(--p1); }
        .hud-opp { background: #e3f2fd; padding: 6px 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.8em; color: #1565c0; border: 1px solid #bbdefb; display: flex; justify-content: space-between; align-items: center;}
        
        .farm-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #d7ccc8; padding: 10px; border-radius: 12px; }
        .zone { min-height: 140px; background: #efebe9; border: 2px dashed #bcaaa4; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-size: 0.75em; cursor: pointer; text-align: center; transition: 0.2s; }
        .zone.selected { border: 3px solid #ff9800 !important; box-shadow: 0 0 10px rgba(255,152,0,0.6); transform: scale(1.02); z-index: 10;}
        .tuile-potager { background: var(--potager) !important; border: 2px solid #2e7d32 !important; }
        .tuile-verger { background: var(--verger) !important; border: 2px solid #fbc02d !important; }
        .tuile-amenag { background: var(--amenag) !important; border: 2px solid #ff5722 !important; }
        .tuile-batiment { background: var(--batiment) !important; border: 2px solid #263238 !important; color: white; }
        .has-serre { box-shadow: inset 0 0 15px rgba(3, 169, 244, 0.6); border: 3px solid #03a9f4 !important; background: var(--serre) !important; }
        
        .card { border: 1px solid #ddd; border-radius: 6px; padding: 6px; margin-bottom: 4px; background: white; font-size: 0.75em; border-left: 4px solid var(--p1); cursor: help; position: relative;}
        .btn-action { width: 100%; padding: 8px; border: none; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 0.75em; margin-bottom: 3px; transition: 0.2s; }
        .btn-action:hover:not(:disabled) { filter: brightness(1.1); }
        .res-pill { background: #e8f5e9; padding: 2px 6px; border-radius: 10px; color: var(--p1); border: 1px solid var(--p1); }
        button:disabled { filter: grayscale(100%); opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 15px; border-radius: 12px; width: 95%; max-width: 1000px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .rayon-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .rayon { background: #f9f9f9; padding: 8px; border-radius: 8px; border: 1px solid #ccc; }
        .btn-jard-action { width: 100%; margin-bottom: 5px; padding: 4px; font-size: 0.8em; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
        .jard-card { border: 2px solid #ddd; padding: 6px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; background: white; position: relative; font-size: 0.85em; transition: 0.2s;}
        .jard-card:hover:not([style*="opacity: 0.4"]) { border-color: var(--p1); transform: scale(1.02); }
        .price-tag { position: absolute; top: -6px; right: -6px; background: var(--gold); padding: 1px 5px; border-radius: 8px; font-size: 0.8em; font-weight: bold; border: 1px solid #b8860b; }
        
        .alert-rav { background: #ffebee; color: #c62828; padding: 4px; border-radius: 4px; font-size: 0.75em; margin-bottom: 5px; border: 1px solid #ef9a9a; text-align: center; font-weight: bold;}
        .logs { height: 95px; background: var(--dark); color: #a5d6a7; padding: 8px; font-family: monospace; font-size: 0.75em; overflow-y: auto; border-radius: 6px; margin-top:5px; border: 2px solid #455a64;}
        
        .turn-banner { background: #ff9800; color: white; text-align: center; padding: 5px; font-weight: bold; display: none; border-radius: 4px; margin-bottom: 5px;}
        .turn-banner.active { display: block; background: #4caf50; }

        /* ANIMATION SAISON */
        #season-anim-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7); z-index: 2000; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease-in-out;
        }
        .anim-box {
            background: white; border: 5px solid var(--p1); border-radius: 20px; padding: 40px 80px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); text-align: center;
            transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #anim-title { font-size: 3.5em; font-weight: bold; color: var(--p1); margin-bottom: 10px; }
        #anim-subtitle { font-size: 1.5em; color: #555; font-weight: bold; }
    </style>
</head>
<body>

<div id="lobby">
    <h1 style="font-size: 3em; margin-bottom: 10px;">🌱 La Main Verte</h1>
    <p style="font-size: 1.2em; margin-bottom: 40px;">Mode Multijoueur En Ligne</p>
    <button class="btn-lobby" onclick="joinGame(1)">Rejoindre en tant que JOUEUR 1</button>
    <button class="btn-lobby j2" onclick="joinGame(2)">Rejoindre en tant que JOUEUR 2</button>
    <hr style="width: 50%; border-color: #555; margin: 30px 0;">
    <button class="btn-lobby" style="background:#d32f2f; width:250px; font-size:0.9em;" onclick="confirmReset(true)">⚠️ Forcer le Reset Global</button>
</div>

<div id="season-anim-overlay">
    <div class="anim-box" id="anim-box">
        <div id="anim-title">🌷 Printemps</div>
        <div id="anim-subtitle">Année 1</div>
    </div>
</div>

<div class="main-game">
    <div id="turn-banner" class="turn-banner">Veuillez patienter, c'est le tour de l'adversaire...</div>
    
    <div class="hud" id="my-hud">
        <div id="season-display">📅 Saison...</div>
        <div title="Cagnotte Commune / Heures Restantes du Joueur">💰 <span id="res-money">0</span> | ⏳ <span id="res-time">0</span>/<span id="res-timemax">10</span>h</div>
        <div title="Stock de Compost (Utilisé pour l'action ☀️ Amender)">💩 <span id="res-compost" class="res-pill">0</span></div>
        <div id="meteo-display" title="Météo tirée cette saison" style="background:#e3f2fd; padding:3px 10px; border-radius:10px;">🎲 --</div>
        <button onclick="confirmReset()" style="background:#ff5252; color:white; border:none; border-radius:4px; padding:4px 8px; cursor:pointer; font-weight:bold;" title="Réinitialiser entièrement la partie pour tous les joueurs">🧹 Reset</button>
    </div>
    
    <div class="hud-opp" id="opp-hud">
        <b>👀 Adversaire :</b> 
        <span>💰 <span id="opp-money">0</span> | ⏳ <span id="opp-time">0</span>h | 💩 <span id="opp-compost">0</span></span>
    </div>
    
    <div id="ravageur-zone" class="alert-rav" style="display:none;"></div>
    <div id="aux-tray" style="display:none; gap:5px; margin-bottom:8px; background:#e3f2fd; padding:5px; border-radius:5px; border:1px solid #90caf9; flex-wrap:wrap; font-size:0.8em; color:#1565c0;"></div>
    
    <div class="farm-grid" id="farm-grid"></div>
    <div class="logs" id="game-logs"></div>
    <div id="action-buttons-container" style="display: grid; grid-template-columns: repeat(4, 1fr); gap:4px; margin-top:10px;"></div>
</div>

<div class="sidebar">
    <div style="background:#f0f4f7; padding:8px; border-radius:6px; margin-bottom:10px; font-size:0.8em; text-align:center;">
        <b>🎴 Cartes Pioche :</b> <span id="deck-count">C:0 | S:0 | A:0</span>
    </div>
    <h3 style="margin:0 0 5px 0;">⚙️ Mes Améliorations</h3>
    <div id="up-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px; margin-bottom:10px;"></div>
    
    <h3 style="margin:0 0 5px 0;">🛒 Marché Commun</h3>
    <div id="market-preview" style="background:#fffde7; padding:6px; border:1px solid #ffd54f; border-radius:6px; font-size:0.75em; margin-bottom:6px;"></div>
    <div id="jard-buttons-container" style="display:grid; grid-template-columns: 1fr 1fr; gap:4px;"></div>
    
    <h3 style="margin:10px 0 5px 0;">🎒 Ma Main</h3>
    <div id="player-hand" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
</div>

<div class="modal-overlay" id="jardinerie-modal"><div class="modal-content" id="modal-content-inner"></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_OHv6TDiVsn4PwM9s25gij8lBwQH8xrg",
        authDomain: "main-verte-72483.firebaseapp.com",
        databaseURL: "https://main-verte-72483-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "main-verte-72483",
        storageBucket: "main-verte-72483.firebasestorage.app",
        messagingSenderId: "633454274346",
        appId: "1:633454274346:web:7261efcfe1b9cecdd6e053"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("game-session-001");
    const dbConfig = firebase.database().ref("game-config");

    const UP_NAMES = ["Terrain", "Énergie", "Savoir", "Sol", "Climat", "Outils", "Vente", "VIP"];
    const SAISON_NOMS = ["🌷 Printemps", "☀️ Été", "🍂 Automne", "❄️ Hiver"];
    const ALL_SEASONS = ["P","E","A","H"];

    let state = null;
    let myId = null; 
    let localSelectedId = null;
    let localModalOpen = false;
    let localPicksLeft = 0;
    let isInitializing = false;

    function joinGame(id) {
        myId = id;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('my-hud').style.borderTopColor = id === 1 ? 'var(--p1)' : 'var(--p2)';
        if(!state) initNewGame(myId);
        else render();
    }

    db.on("value", snap => {
        const val = snap.val();
        if(!val || !val.p1) {
            if(myId !== null && !isInitializing) initNewGame(myId);
        } else {
            if (state && (state.saisonIdx !== val.saisonIdx || state.annee !== val.annee)) {
                playSeasonAnimation(val.saisonIdx, val.annee);
            }
            state = val; 
            render(); 
        }
    });

    function sync() { if(state) db.set(state); }

    function addLog(msg) {
        if(!state.gameLogs) state.gameLogs = [];
        state.gameLogs.unshift(`[J${myId}] ` + msg);
        if(state.gameLogs.length > 25) state.gameLogs.pop();
    }

    function generatePlayer() {
        return {
            money: 10, time: 10, timeMax: 10, compost: 3, upgrades: Array(8).fill(1), hand: [], auxActifs: [],
            zones: Array(6).fill(null).map((_, i) => ({ id: i, type: i === 0 ? "LIFE" : null, culture: null, batiment: null }))
        };
    }

    async function initNewGame(creatorId = null) {
        if(isInitializing) return;
        isInitializing = true;
        let msg = creatorId ? `> 🧹 La partie a été réinitialisée par le Joueur ${creatorId}.` : "> Nouvelle partie initialisée.";

        try {
            const snapConf = await dbConfig.once("value");
            let config = snapConf.val();

            if(!config || !config.decks) {
                alert("ERREUR CRITIQUE : La base de données de cartes est vide ! Allez sur la page admin.html et cliquez sur 'Injecter le Deck de base'.");
                isInitializing = false;
                return;
            }

            let builtDecks = { C: [], S: [], A: [] };
            ['C','S','A'].forEach(cat => {
                (config.decks[cat] || []).forEach(c => {
                    let q = c.qte || 1;
                    for(let i=0; i<q; i++) builtDecks[cat].push({...c});
                });
            });

            let builtRavs = [];
            (config.ravageurs || []).forEach(r => {
                let q = r.qte || 1;
                for(let i=0; i<q; i++) builtRavs.push({...r});
            });

            state = {
                turn: 1, annee: 1, saisonIdx: 0,
                decks: builtDecks, 
                ravPool: builtRavs,
                market: { C: [], S: [], A: [] },
                currentMeteo: {p:0, s:0}, currentRav: null,
                p1: generatePlayer(), p2: generatePlayer(),
                gameLogs: [msg]
            };

            ['C','S','A'].forEach(cat => { 
                for(let i=0; i<2; i++) { let d = draw(cat); if(d) state.market[cat].push(d); } 
            });

            await db.set(state);
        } catch(e) {
            console.error(e);
            alert("Erreur de connexion à Firebase lors du chargement des cartes.");
        }
        
        isInitializing = false;
    }

    function draw(cat) {
        if(!state.decks[cat] || state.decks[cat].length === 0) return null;
        return state.decks[cat].splice(Math.floor(Math.random()*state.decks[cat].length), 1)[0];
    }

    function playSeasonAnimation(sIdx, annee) {
        const overlay = document.getElementById('season-anim-overlay');
        const box = document.getElementById('anim-box');
        document.getElementById('anim-title').innerText = SAISON_NOMS[sIdx];
        document.getElementById('anim-subtitle').innerText = "Année " + annee;
        
        overlay.style.display = 'flex';
        setTimeout(() => { overlay.style.opacity = '1'; box.style.transform = 'scale(1)'; }, 50);
        setTimeout(() => { overlay.style.opacity = '0'; box.style.transform = 'scale(0.8)'; setTimeout(() => { overlay.style.display = 'none'; }, 500); }, 2500);
    }

    function render() {
        if(!state || !myId) return;
        const me = state['p'+myId];
        const opp = state['p'+(myId === 1 ? 2 : 1)];
        const isMyTurn = state.turn === myId;

        const banner = document.getElementById('turn-banner');
        if(isMyTurn) { banner.innerText = "🎮 C'est à votre tour de jouer !"; banner.className = "turn-banner active"; }
        else { banner.innerText = `⏳ Veuillez patienter, le Joueur ${state.turn} réfléchit...`; banner.className = "turn-banner"; }

        const setTxt = (id, txt) => { const el = document.getElementById(id); if(el) el.innerText = txt; };
        
        setTxt('res-money', me.money); setTxt('res-time', me.time); setTxt('res-timemax', me.timeMax); setTxt('res-compost', me.compost);
        setTxt('season-display', `📅 ${SAISON_NOMS[state.saisonIdx]} - An ${state.annee}`);
        setTxt('meteo-display', `🌧️ ${state.currentMeteo.p} | ☀️ ${state.currentMeteo.s}`);
        
        setTxt('opp-money', opp.money); setTxt('opp-time', opp.time); setTxt('opp-compost', opp.compost);
        setTxt('deck-count', `C:${(state.decks.C||[]).length} | S:${(state.decks.S||[]).length} | A:${(state.decks.A||[]).length}`);
        
        const logBox = document.getElementById('game-logs');
        if(logBox && state.gameLogs) logBox.innerHTML = state.gameLogs.map(l => `<div>${l}</div>`).join('');

        const rZone = document.getElementById('ravageur-zone');
        if(state.currentRav) { rZone.innerText = `⚠️ RAVAGEUR GLOBAL : ${state.currentRav.n || state.currentRav.nom} ! (-${state.currentRav.d}💰 si non protégé)`; rZone.style.display = 'block'; }
        else rZone.style.display = 'none';

        const tray = document.getElementById('aux-tray');
        if(me.auxActifs && me.auxActifs.length > 0) {
            tray.style.display="flex"; tray.innerHTML = '<b>🛡️ Mes Boucliers : </b> ' + me.auxActifs.map(a => `<span style="background:white; padding:2px 4px; border-radius:4px; margin-left:4px; border:1px solid #90caf9;">🦊 Anti-${a}</span>`).join('');
        } else tray.style.display="none";

        const grid = document.getElementById('farm-grid'); grid.innerHTML = "";
        me.zones.forEach(z => {
            const acc = z.id <= (me.upgrades[0] === 1 ? 3 : (me.upgrades[0] === 2 ? 4 : 5));
            const isS = z.batiment === 'SERRE';
            const d = document.createElement('div');
            d.className = `zone ${z.type ? 'tuile-'+z.type.toLowerCase() : ''} ${z.batiment && !isS ? 'tuile-batiment' : ''} ${isS ? 'has-serre' : ''} ${localSelectedId === z.id ? 'selected' : ''}`;
            d.style.opacity = acc ? "1" : "0.3";
            d.onclick = () => { if(acc && isMyTurn) { localSelectedId = z.id; render(); } };
            
            if(z.id === 0) { d.innerHTML = "🏠 MAISON"; d.title = "La maison principale."; }
            else if(!z.type) { d.innerHTML = `ZONE ${z.id}${acc?'':'<br>🔒'}`; d.title = acc ? "Zone vierge. Aménagez-la avec les boutons verts/oranges." : "Zone verrouillée."; }
            else {
                let header = z.type; if(z.batiment) header += ` + ${z.batiment}`;
                d.innerHTML = `<b>${header}</b>`;
                if(z.culture) {
                    d.innerHTML += `<br>${z.culture.nom}<br>💧${z.culture.eCur} ☀️${z.culture.sCur}`;
                    d.title = `${z.culture.nom}\nBesoins: ${z.culture.eCur}💧 | ${z.culture.sCur}☀️\nGain: ${z.culture.g + (me.upgrades[3]-1) + (z.culture.amd||0)}💰`;
                    if(z.culture.eCur <= 0 && z.culture.sCur <= 0) {
                        d.innerHTML += `<br><button onclick="actionRecolter(${z.id})" style="background:var(--p1); color:white; border:none; padding:4px 8px; cursor:pointer; border-radius:4px; margin-top:4px;" ${!isMyTurn || me.time<2 ? 'disabled':''}>🧺 Récolter</button>`;
                    }
                } else d.title = `${header}. Prêt pour un semis.`;
            }
            grid.appendChild(d);
        });

        const prev = document.getElementById('market-preview');
        if(prev && state.market) {
            prev.innerHTML = `🌾 ${(state.market.C||[]).map(c=>c.nom).join(', ')||'Vidé'}<br>🛠️ ${(state.market.S||[]).map(c=>c.nom).join(', ')||'Vidé'}<br>🦊 ${(state.market.A||[]).map(c=>c.nom).join(', ')||'Vidé'}`;
        }

        const hDiv = document.getElementById('player-hand'); hDiv.innerHTML = "";
        (me.hand || []).forEach((c, i) => {
            const cost = Math.max(0, (c.t||1) - (me.upgrades[2]-1));
            const card = document.createElement('div'); card.className = "card";
            let details = c.cat==='S' ? c.desc : (c.cat==='X' ? c.prot : `💧${c.e} ☀️${c.s}<br>🌱 ${(c.sm||[]).join(',')} | 🧺 ${(c.rc||[]).join(',')}`);
            card.innerHTML = `<b>${c.nom}</b><br><span style="font-size:0.9em;">${details}</span><br><button onclick="playC(${i})" style="width:100%; margin-top:4px; padding:4px; cursor:pointer; background:#e8eaf6; border:1px solid #ccc; font-weight:bold;" ${!isMyTurn || me.time<cost ? 'disabled':''}>Jouer (-${cost}h)</button>`;
            hDiv.appendChild(card);
        });

        renderButtons(me, isMyTurn);
        document.getElementById('jardinerie-modal').style.display = localModalOpen ? 'flex' : 'none';
        if(localModalOpen) renderJardModal(me);
    }

    function renderButtons(me, isMyTurn) {
        const costT = me.upgrades[5] >= 2 ? (me.upgrades[5] === 3 ? 0 : 1) : 2;
        const dis = !isMyTurn;
        document.getElementById('action-buttons-container').innerHTML = `
            <button class="btn-action" style="background:#4caf50" onclick="actT('POTAGER')" ${dis||me.time<3||me.money<costT?'disabled':''}>🏗️ Potager (-${costT}💰)</button>
            <button class="btn-action" style="background:#fbc02d;color:#333" onclick="actT('VERGER')" ${dis||me.time<3||me.money<costT?'disabled':''}>🏗️ Verger (-${costT}💰)</button>
            <button class="btn-action" style="background:#ff5722" onclick="actT('AMÉNAGEMENT')" ${dis||me.time<3||me.money<3?'disabled':''}>🌳 Nature (-3💰)</button>
            <button class="btn-action" style="background:#607d8b" onclick="actB()" ${dis||me.time<4?'disabled':''}>🏠 Bâtiment</button>
            <button class="btn-action" style="background:#2196f3" onclick="actArr()" ${dis||me.time<1?'disabled':''}>💧 Arroser (-1h)</button>
            <button class="btn-action" style="background:#795548" onclick="actAmd()" ${dis||me.time<1||(me.compost||0)<1?'disabled':''}>☀️ Amender (-1h)</button>
            <button class="btn-action" style="background:#e53935; grid-column:span 2; font-size:1em;" onclick="actFin()" ${dis?'disabled':''}>${state.turn===1 ? '⏭️ Terminer le Tour' : '💤 Fin de Saison (Résoudre)'}</button>
        `;

        const upG = document.getElementById('up-grid'); upG.innerHTML = "";
        UP_NAMES.forEach((n, i) => {
            const cost = me.upgrades[i]===1?3:5;
            upG.innerHTML += `<div style="font-size:0.7em; background:#fafafa; padding:4px; border:1px solid #ddd; border-radius:4px;"><b>${n}</b> L${me.upgrades[i]} <button onclick="upgr(${i})" style="float:right;" ${dis||me.upgrades[i]>=3||me.time<cost?'disabled':''}>UP</button></div>`;
        });

        const jCont = document.getElementById('jard-buttons-container'); jCont.innerHTML = "";
        const redJ = me.upgrades[6]>=2?1:0;
        [[3,5],[2,3],[2,2],[1,1]].forEach((ex, i) => {
            const c = Math.max(0, ex[0]-redJ);
            jCont.innerHTML += `<button class="btn-action" style="background:#8d6e63" onclick="openJard(${c},${ex[1]})" ${dis||me.time<c?'disabled':''}>📦 Empl. ${i+1} (${ex[1]} Pioches)</button>`;
        });
    }

    function openJard(h, p) { const me = state['p'+myId]; me.time -= h; localPicksLeft = p; localModalOpen = true; addLog(`📦 Visite la Jardinerie.`); sync(); }
    
    function renderJardModal(me) {
        const inner = document.getElementById('modal-content-inner');
        inner.innerHTML = `<div style="display:flex;justify-content:space-between; align-items:center;"><h2>🛒 Marché</h2><div style="font-size:1.2em; color:#d32f2f;"><b>Actions : ${localPicksLeft}</b> | 💰 ${me.money}</div></div><div class="rayon-grid"></div>`;
        ['C','S','A'].forEach(cat => {
            const r = document.createElement('div'); r.className = "rayon";
            r.innerHTML = `<h3>${cat==='C'?'🌾 Cultures':(cat==='S'?'🛠️ Soutiens':'🦊 Auxiliaires')}</h3>
                <button class="btn-jard-action" onclick="jardP('${cat}')">🎲 Pioche Aveugle</button>
                <button class="btn-jard-action" onclick="jardR('${cat}')">🔄 Renouveler le Rayon</button><hr>`;
            (state.market[cat] || []).forEach((c, idx) => {
                const can = me.money >= c.p;
                const d = document.createElement('div'); d.className = "jard-card"; d.style.opacity = can?"1":"0.4";
                let details = c.cat==='S' ? c.desc : (c.cat==='X' ? c.prot : `💧${c.e} ☀️${c.s}<br>🌱 ${(c.sm||[]).join(',')} | 🧺 ${(c.rc||[]).join(',')}`);
                d.innerHTML = `<div class="price-tag">${c.p}💰</div><b>${c.nom}</b><br><small>${details}</small>`;
                
                // --- LA CORRECTION ANTI-BUG FIREBASE EST ICI ---
                d.onclick = () => { 
                    if(can) { 
                        me.money -= c.p; 
                        if(!me.hand) me.hand = []; 
                        me.hand.push(c); 
                        state.market[cat].splice(idx, 1); 
                        if(!state.market[cat]) state.market[cat] = []; // Sécurité Firebase
                        if(me.upgrades[6] >= 3) { 
                            let nc = draw(cat); 
                            if(nc) state.market[cat].push(nc); 
                        } 
                        addLog(`🛒 Achat : ${c.nom}`); 
                        consm(); 
                    } 
                };
                r.appendChild(d);
            });
            inner.querySelector('.rayon-grid').appendChild(r);
        });
    }

    function jardP(cat) { const me=state['p'+myId], c=draw(cat); if(c) { if(c.p<=me.money) { if(confirm(`Tiré : ${c.nom} (${c.p}💰). L'acheter ?`)) { me.money-=c.p; if(!me.hand) me.hand=[]; me.hand.push(c); addLog(`🛒 Pioche : ${c.nom}`); consm(); } else { consm(); } } else { alert(`Tiré : ${c.nom}. Fonds insuffisants.`); consm(); } } else alert("Pioche vide !"); }
    function jardR(cat) { state.market[cat] = []; for(let i=0; i<2; i++) { let d = draw(cat); if(d) state.market[cat].push(d); } addLog(`🔄 Rayon renouvelé.`); consm(); }
    
    // --- CORRECTION DU BUG PUSH ICI ---
    function consm() { 
        localPicksLeft--; 
        if(localPicksLeft <= 0) { 
            localModalOpen = false; 
            ['C','S','A'].forEach(cat => { 
                if(!state.market[cat]) state.market[cat] = []; // Sécurité Firebase
                while(state.market[cat].length < 2) { 
                    let c = draw(cat); 
                    if(c) state.market[cat].push(c); 
                    else break; 
                } 
            }); 
        } 
        sync(); 
    }

    function actT(t) { const me=state['p'+myId]; if(!localSelectedId || localSelectedId===0) return alert("Sélectionnez une zone !"); const cost = me.upgrades[5]>=2 ? (me.upgrades[5]===3?0:1) : 2; me.money -= (t==='AMÉNAGEMENT'?3:cost); me.time -= 3; me.zones[localSelectedId].type = t; addLog(`🏗️ Aménagement : ${t}.`); sync(); }
    function actB() { 
        const me=state['p'+myId], z=me.zones[localSelectedId]; if(!z || z.batiment) return alert("Zone invalide.");
        const ch = prompt("1: Serre (3💰) sur Potager\n2: Composteur (4💰)\n3: Local Outils (5💰)");
        if(ch==="1" && z.type==="POTAGER") { if(me.money<3) return; me.money-=3; me.time-=4; z.batiment="SERRE"; addLog("🏠 Construit : Serre."); }
        else if(ch==="2" && (z.type==="POTAGER"||z.type==="AMÉNAGEMENT")) { if(me.money<4) return; me.money-=4; me.time-=4; z.batiment="COMPOSTEUR"; addLog("🏠 Construit : Composteur."); }
        else if(ch==="3" && (z.type==="POTAGER"||z.type==="AMÉNAGEMENT")) { if(me.money<5) return; me.money-=5; me.time-=4; z.batiment="LOCAL OUTILS"; addLog("🏠 Construit : Local Outils."); }
        sync(); 
    }
    function actArr() { const me=state['p'+myId], z=me.zones[localSelectedId]; if(z && z.culture) { me.time--; z.culture.eCur = Math.max(0, z.culture.eCur-2); addLog(`💧 Arrosage manuel.`); sync(); } }
    function actAmd() { const me=state['p'+myId], z=me.zones[localSelectedId]; if(z && z.culture && me.compost>0) { me.time--; me.compost--; z.culture.sCur = Math.max(0, z.culture.sCur-1); addLog(`☀️ Amendement au Compost.`); sync(); } }
    function upgr(i) { const me=state['p'+myId]; me.time -= (me.upgrades[i]===1?3:5); me.upgrades[i]++; if(i===1) me.timeMax += 4; addLog(`⚙️ Upgrade : ${UP_NAMES[i]}`); sync(); }
    function actionRecolter(id) { const me=state['p'+myId], z=me.zones[id]; me.time-=2; me.money += (z.culture.g + (me.upgrades[3]-1) + (z.culture.amd||0)); addLog(`🧺 Récolte : ${z.culture.nom} !`); z.culture = null; sync(); }

    function playC(idx) { 
        const me = state['p'+myId], c = me.hand[idx], z = me.zones[localSelectedId], cost = Math.max(0, (c.t||1)-(me.upgrades[2]-1));
        if(c.cat === 'X') { me.time-=cost; if(!me.auxActifs) me.auxActifs=[]; me.auxActifs.push(c.prot); me.hand.splice(idx,1); addLog(`🦊 Bouclier Anti-${c.prot} activé.`); } 
        else if(c.cat === 'S') { 
            me.time-=cost; 
            if(c.nom.includes("Fumier")) { me.compost=(me.compost||0)+2; addLog("✨ +2 Compost"); }
            if(c.nom.includes("Ortie") && z && z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur-4); addLog("✨ Arrosage Express !"); }
            if(c.nom.includes("Paillage") && z && z.culture) { z.culture.eCur = Math.max(0, z.culture.eCur-2); z.culture.sCur = Math.max(0, z.culture.sCur-1); addLog("✨ Paillage posé."); }
            if(c.nom.includes("Corne") && z && z.culture) { z.culture.amd = (z.culture.amd||0)+2; addLog("✨ Corne Broyée appliquée."); }
            me.hand.splice(idx,1); 
        } else { 
            if(!z || !z.type) return alert("Zone vierge !"); if(z.culture) return alert("Zone occupée !");
            if(c.cat==='L' && z.type!=='POTAGER') return alert("Légumes (L) = Potager !");
            if(c.cat==='A' && z.type!=='VERGER') return alert("Arbres (A) = Verger !");
            let curS = ALL_SEASONS[state.saisonIdx];
            let smValid = z.batiment === 'SERRE' ? (c.sm||[]).map(s => ALL_SEASONS[(ALL_SEASONS.indexOf(s)+3)%4]).concat(c.sm||[]) : (c.sm||[]);
            if(!smValid.includes(curS)) return alert(`Saison incorrecte !`);
            me.time-=cost; z.culture={...c, eCur:c.e, sCur:c.s, amd:0}; me.hand.splice(idx,1); addLog(`🌱 Semis : ${c.nom}`);
        }
        sync(); 
    }

    function actFin() {
        if(state.turn === 1) {
            state.turn = 2;
            addLog(`⏭️ Tour terminé.`);
            sync();
        } else {
            state.saisonIdx++; if(state.saisonIdx > 3) { state.saisonIdx = 0; state.annee++; }
            let curS = ALL_SEASONS[state.saisonIdx];
            
            let pBase = Math.floor(Math.random()*3)+1; 
            let sBase = Math.floor(Math.random()*2)+1;
            state.currentMeteo = {p: pBase, s: sBase};

            let ravPool = state.ravPool || [];
            if(ravPool.length > 0 && Math.random() < 0.3) { 
                state.currentRav = ravPool[Math.floor(Math.random()*ravPool.length)]; 
            } else { state.currentRav = null; }

            [1, 2].forEach(pid => {
                let pData = state['p'+pid];
                let bClimat = pData.upgrades[4] > 1 ? 1 : 0; 
                
                pData.zones.forEach(z => { 
                    if(z && z.culture) { 
                        z.culture.eCur = Math.max(0, z.culture.eCur - (pBase + bClimat)); 
                        z.culture.sCur = Math.max(0, z.culture.sCur - (sBase + bClimat)); 
                        
                        let rc = z.culture.rc || [];
                        let sm = z.culture.sm || [];
                        let survie = z.batiment === 'SERRE' ? rc.map(s => ALL_SEASONS[(ALL_SEASONS.indexOf(s)+3)%4]).concat(rc).concat(sm) : rc.concat(sm);
                        if(!survie.includes(curS)) z.culture = null;
                    } 
                });

                if(state.currentRav && (!pData.auxActifs || !pData.auxActifs.includes(state.currentRav.n || state.currentRav.nom))) {
                    pData.money = Math.max(0, pData.money - state.currentRav.d);
                }

                pData.time = pData.timeMax; 
                pData.compost = (pData.compost||0)+1;
            });

            state.turn = 1;
            addLog(`💤 Résolution de la saison effectuée.`);
            sync();
        }
    }
    
    async function confirmReset(force = false) { 
        if(confirm("⚠️ Êtes-vous sûr de vouloir réinitialiser la partie pour LES DEUX joueurs ?")) {
            await initNewGame(myId || "Serveur");
        } 
    }

// ==========================================
// 🤖 MOTEUR D'INTELLIGENCE ARTIFICIELLE (BOT)
// ==========================================

// 1. Ajouter le bouton Bot dans le HUD
setTimeout(() => {
    const hud = document.getElementById('my-hud');
    if(hud) {
        const botBtn = document.createElement('button');
        botBtn.innerHTML = "🤖 Activer le Bot";
        botBtn.style = "background:#9c27b0; color:white; border:none; padding:4px 8px; border-radius:4px; font-weight:bold; cursor:pointer; margin-left:10px;";
        botBtn.onclick = runBotLoop;
        hud.appendChild(botBtn);
    }
}, 1000);

let botRunning = false;

function runBotLoop() {
    if(botRunning) return; // Évite les lancements multiples
    if(state.turn !== myId) return alert("Attendez votre tour pour lancer le bot !");
    
    botRunning = true;
    addLog("🤖 Le Bot prend le contrôle...");
    botThinkAndAct();
}

function botThinkAndAct() {
    if(state.turn !== myId || !botRunning) { botRunning = false; return; }

    const me = state['p'+myId];
    let bestAction = { type: 'FIN_TOUR', score: 10 }; // Action par défaut
    
    // --- EVALUATION DES ACTIONS POSSIBLES ---
    
    const costT = me.upgrades[5] >= 2 ? (me.upgrades[5] === 3 ? 0 : 1) : 2;

    // A. Parcourir les Zones (Récolte, Arrosage, Semis, Aménagement)
    me.zones.forEach(z => {
        if(z.culture) {
            // Stratégie 1 : Récolter (Urgence max)
            if(z.culture.eCur <= 0 && z.culture.sCur <= 0 && me.time >= 2) {
                if(1000 > bestAction.score) bestAction = { type: 'RECOLTER', zoneId: z.id, score: 1000 };
            }
            // Stratégie 2 : Sauver une plante de la soif
            else if(z.culture.eCur >= 2 && me.time >= 1) {
                if(800 > bestAction.score) bestAction = { type: 'ARROSER', zoneId: z.id, score: 800 + z.culture.eCur };
            }
        } 
        else if (z.type && z.id !== 0) {
            // Stratégie 3 : Planter depuis la main
            (me.hand || []).forEach((c, idx) => {
                const costH = Math.max(0, (c.t||1)-(me.upgrades[2]-1));
                let curS = ALL_SEASONS[state.saisonIdx];
                let smValid = z.batiment === 'SERRE' ? (c.sm||[]).map(s => ALL_SEASONS[(ALL_SEASONS.indexOf(s)+3)%4]).concat(c.sm||[]) : (c.sm||[]);
                
                if(c.cat === 'L' && z.type === 'POTAGER' && smValid.includes(curS) && me.time >= costH) {
                    let scorePlanter = 600 + c.g; // Privilégie les plantes qui rapportent gros
                    if(scorePlanter > bestAction.score) bestAction = { type: 'PLANTER', handIdx: idx, zoneId: z.id, score: scorePlanter };
                }
            });
        }
        else if (!z.type && z.id !== 0 && z.id <= (me.upgrades[0] === 1 ? 3 : (me.upgrades[0] === 2 ? 4 : 5))) {
            // Stratégie 4 : Aménager un Potager si zone vide
            if(me.time >= 3 && me.money >= costT) {
                if(500 > bestAction.score) bestAction = { type: 'AMENAGER', zoneId: z.id, terrain: 'POTAGER', score: 500 };
            }
        }
    });

    // B. Aller à la Jardinerie (Si main vide et riche)
    if((!me.hand || me.hand.length === 0) && me.time >= 3 && me.money >= 2) {
        if(400 > bestAction.score) bestAction = { type: 'JARDINERIE', score: 400 };
    }

    // --- EXECUTION DE L'ACTION ---
    
    setTimeout(() => {
        if(bestAction.type === 'RECOLTER') {
            actionRecolter(bestAction.zoneId);
            render(); botThinkAndAct();
        }
        else if(bestAction.type === 'ARROSER') {
            localSelectedId = bestAction.zoneId; actArr();
            render(); botThinkAndAct();
        }
        else if(bestAction.type === 'AMENAGER') {
            localSelectedId = bestAction.zoneId; actT(bestAction.terrain);
            render(); botThinkAndAct();
        }
        else if(bestAction.type === 'PLANTER') {
            localSelectedId = bestAction.zoneId; playC(bestAction.handIdx);
            render(); botThinkAndAct();
        }
        else if(bestAction.type === 'JARDINERIE') {
            // Le Bot achète automatiquement la culture la plus chère qu'il peut s'offrir
            let cat = 'C';
            if(!state.market[cat]) state.market[cat] = [];
            while(state.market[cat].length < 2) { let c = draw(cat); if(c) state.market[cat].push(c); else break; }
            
            let carteAAcheter = state.market[cat].find(c => c.p <= me.money);
            if(carteAAcheter) {
                me.time -= 3; // Coût du voyage expédition 1
                me.money -= carteAAcheter.p;
                if(!me.hand) me.hand = [];
                me.hand.push(carteAAcheter);
                state.market[cat] = state.market[cat].filter(c => c.nom !== carteAAcheter.nom); // Retire du marché
                addLog(`🤖 Le Bot a acheté ${carteAAcheter.nom}`);
                sync(); render(); botThinkAndAct();
            } else {
                // S'il ne peut rien acheter, il passe son tour pour ne pas boucler à l'infini
                actFin(); botRunning = false;
            }
        }
        else if(bestAction.type === 'FIN_TOUR') {
            addLog("🤖 Le Bot a terminé son tour.");
            actFin();
            botRunning = false; // S'arrête jusqu'au prochain tour
        }
    }, 800); // Délai de 0.8s pour que tu aies le temps de voir ce qu'il fait
}
    
</script>
